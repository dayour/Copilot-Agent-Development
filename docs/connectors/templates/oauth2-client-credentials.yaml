swagger: "2.0"
info:
  title: OAuth 2.0 Client Credentials Connector Template
  description: >
    Reusable custom connector template for service-to-service OAuth 2.0 Client
    Credentials flow. Use this pattern for backend system APIs that do not require
    user identity context, such as ERP systems, data pipelines, and internal
    platform APIs. Replace all placeholder values (marked with angle brackets)
    before importing into Power Platform.
  version: "1.0"
  contact:
    name: Platform Engineering
host: "<api-host>"
basePath: "/"
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json

securityDefinitions:
  oauth2_client_credentials:
    type: oauth2
    flow: application
    tokenUrl: "https://login.microsoftonline.com/<tenant-id>/oauth2/v2.0/token"
    scopes:
      "<scope>/.default": "Default scope for the target resource"
    x-ms-client-id: "<client-id>"
    x-ms-client-secret-name: EV_CC_CLIENT_SECRET

security:
  - oauth2_client_credentials:
      - "<scope>/.default"

x-ms-connector-metadata:
  - propertyName: Website
    propertyValue: "https://<api-host>"
  - propertyName: Privacy policy
    propertyValue: "https://<api-host>/privacy"
  - propertyName: Categories
    propertyValue: "Business Intelligence;IT Operations"

x-ms-capabilities:
  testConnection: true

# DLP Classification Recommendation:
#   Business - service-to-service connectors accessing organizational backend systems.
#   Restrict to Business Data Only policy environments.
#   Block from non-business or unmanaged environments.
x-ms-dlp-classification: Business

# Rate Limit Handling:
#   Check for Retry-After header on 429 responses.
#   Implement exponential backoff: wait 2^attempt seconds, capped at 64 seconds.
#   Maximum retry attempts: 5.
#   Token lifetime is typically 3600 seconds; refresh before expiry.
x-ms-rate-limit:
  retryAfterHeader: Retry-After
  maxRetries: 5
  backoffBase: 2
  backoffCapSeconds: 64
  tokenLifetimeSeconds: 3600

paths:
  /health:
    get:
      summary: Health check
      description: Probe endpoint to verify service-to-service connectivity and token validity.
      operationId: HealthCheck
      x-ms-summary: Health Check
      x-ms-visibility: internal
      parameters: []
      responses:
        "200":
          description: Service is healthy.
          schema:
            type: object
            properties:
              status:
                type: string
                x-ms-summary: Status
        "401":
          description: Unauthorized. Client credentials token is missing or expired.
        "403":
          description: Forbidden. Insufficient application permissions.

  /records:
    get:
      summary: List records
      description: Retrieve a paginated list of records from the backend system.
      operationId: ListRecords
      x-ms-summary: List Records
      x-ms-visibility: important
      parameters:
        - name: $top
          in: query
          required: false
          type: integer
          default: 100
          x-ms-summary: Page Size
          description: Maximum number of records to return per page.
        - name: $skip
          in: query
          required: false
          type: integer
          default: 0
          x-ms-summary: Skip Count
          description: Number of records to skip for pagination.
        - name: filter
          in: query
          required: false
          type: string
          x-ms-summary: Filter
          description: OData-style filter expression to narrow results.
      responses:
        "200":
          description: Records retrieved successfully.
          schema:
            $ref: "#/definitions/RecordList"
        "400":
          description: Bad request. Validate filter expression syntax.
        "401":
          description: Unauthorized. Rotate client credentials and re-authenticate.
        "403":
          description: Forbidden. Check application permission grants in Entra admin center.
        "429":
          description: Rate limit exceeded. Retry after the interval in Retry-After header.
        "500":
          description: Internal server error. Log correlation ID and notify operations.

  /records/{id}:
    get:
      summary: Get record
      description: Retrieve a single record by its unique identifier.
      operationId: GetRecord
      x-ms-summary: Get Record
      x-ms-visibility: important
      parameters:
        - name: id
          in: path
          required: true
          type: string
          x-ms-summary: Record ID
          description: Unique identifier of the record.
      responses:
        "200":
          description: Record retrieved successfully.
          schema:
            $ref: "#/definitions/Record"
        "404":
          description: Record not found.
        "429":
          description: Rate limit exceeded.
        "500":
          description: Internal server error.

    patch:
      summary: Update record
      description: Partially update a record by its unique identifier.
      operationId: UpdateRecord
      x-ms-summary: Update Record
      x-ms-visibility: important
      parameters:
        - name: id
          in: path
          required: true
          type: string
          x-ms-summary: Record ID
          description: Unique identifier of the record to update.
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/RecordUpdate"
      responses:
        "200":
          description: Record updated successfully.
          schema:
            $ref: "#/definitions/Record"
        "400":
          description: Bad request. Validate the request body schema.
        "404":
          description: Record not found.
        "429":
          description: Rate limit exceeded.
        "500":
          description: Internal server error.

definitions:
  Record:
    type: object
    properties:
      id:
        type: string
        x-ms-summary: ID
        description: Unique record identifier.
      name:
        type: string
        x-ms-summary: Name
        description: Display name of the record.
      status:
        type: string
        x-ms-summary: Status
        description: Current status of the record.
      modifiedAt:
        type: string
        format: date-time
        x-ms-summary: Modified At
        description: UTC timestamp of the last modification.

  RecordList:
    type: object
    properties:
      value:
        type: array
        items:
          $ref: "#/definitions/Record"
        x-ms-summary: Records
      totalCount:
        type: integer
        x-ms-summary: Total Count
        description: Total number of records matching the query.

  RecordUpdate:
    type: object
    properties:
      name:
        type: string
        x-ms-summary: Name
        description: Updated display name.
      status:
        type: string
        x-ms-summary: Status
        description: Updated status value.

# Environment Variables Required:
#   EV_CC_CLIENT_ID     - type: string  - Application ID for client credentials
#   EV_CC_CLIENT_SECRET - type: secret  - Client secret for the service principal
#   EV_CC_TENANT_ID     - type: string  - Entra tenant ID for token authority
#   EV_API_BASE_URL     - type: string  - Base URL of the target API

# Test Flow Steps:
#   1. Import this connector definition into the target Power Platform environment.
#   2. Create a new connection using service principal credentials.
#   3. Run HealthCheck and verify HTTP 200 response.
#   4. Run ListRecords with a small page size and verify the response payload.
#   5. Run GetRecord with a known valid ID and verify the response.
#   6. Expire or revoke the client secret and confirm a 401 response is returned.
#   7. Restore the secret, re-authenticate, and confirm recovery.

# Error Handling Patterns:
#   401 - Token expired: Rotate client secret. Update EV_CC_CLIENT_SECRET.
#         Re-authenticate the connector connection in Power Platform Admin Center.
#   403 - Missing app permissions: Add required application permissions in Entra
#         app registration and grant admin consent.
#   429 - Rate limit: Apply exponential backoff. Reduce concurrent flow branches.
#   500 - Server error: Log correlationId and Retry-After if present.
#         Alert operations channel via Teams notification.
