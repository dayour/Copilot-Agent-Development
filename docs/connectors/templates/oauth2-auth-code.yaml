swagger: "2.0"
info:
  title: OAuth 2.0 Authorization Code Connector Template
  description: >
    Reusable custom connector template for user-delegated OAuth 2.0 Authorization Code
    flow. Use this pattern for APIs that require user identity context, such as
    Microsoft Graph, Salesforce, and ServiceNow. Replace all placeholder values
    (marked with angle brackets) before importing into Power Platform.
  version: "1.0"
  contact:
    name: Platform Engineering
host: "<api-host>"
basePath: "/"
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json

securityDefinitions:
  oauth2_auth_code:
    type: oauth2
    flow: accessCode
    authorizationUrl: "https://login.microsoftonline.com/<tenant-id>/oauth2/v2.0/authorize"
    tokenUrl: "https://login.microsoftonline.com/<tenant-id>/oauth2/v2.0/token"
    scopes:
      "<scope-1>": "<Scope 1 description>"
      "<scope-2>": "<Scope 2 description>"
    x-ms-client-id: "<client-id>"
    x-ms-client-secret-name: EV_OAUTH_CLIENT_SECRET

security:
  - oauth2_auth_code:
      - "<scope-1>"

x-ms-connector-metadata:
  - propertyName: Website
    propertyValue: "https://<api-host>"
  - propertyName: Privacy policy
    propertyValue: "https://<api-host>/privacy"
  - propertyName: Categories
    propertyValue: "Business Intelligence;Productivity"

x-ms-capabilities:
  testConnection: true

# DLP Classification Recommendation:
#   Business - user-delegated APIs containing organizational data.
#   Apply Business Data Only or Business and Non-Business environment policy.
#   Do NOT classify as Non-Business or Blocked for production environments.
x-ms-dlp-classification: Business

# Rate Limit Handling:
#   Check for Retry-After header on 429 responses.
#   Implement exponential backoff: wait 2^attempt seconds, capped at 64 seconds.
#   Maximum retry attempts: 5.
x-ms-rate-limit:
  retryAfterHeader: Retry-After
  maxRetries: 5
  backoffBase: 2
  backoffCapSeconds: 64

paths:
  /health:
    get:
      summary: Health check
      description: Probe endpoint to verify connectivity and authentication.
      operationId: HealthCheck
      x-ms-summary: Health Check
      x-ms-visibility: internal
      parameters: []
      responses:
        "200":
          description: Service is healthy.
          schema:
            type: object
            properties:
              status:
                type: string
                x-ms-summary: Status
        "401":
          description: Unauthorized. Token is missing or expired.
        "403":
          description: Forbidden. Insufficient scopes.

  /resource:
    get:
      summary: Get resource
      description: Retrieve a resource by identifier.
      operationId: GetResource
      x-ms-summary: Get Resource
      x-ms-visibility: important
      parameters:
        - name: id
          in: query
          required: true
          type: string
          x-ms-summary: Resource ID
          description: Unique identifier of the resource.
      responses:
        "200":
          description: Resource retrieved successfully.
          schema:
            $ref: "#/definitions/Resource"
        "400":
          description: Bad request. Validate required parameters.
        "401":
          description: Unauthorized. Re-authenticate the connector connection.
        "403":
          description: Forbidden. Check OAuth scopes and delegated permissions.
        "404":
          description: Resource not found.
        "429":
          description: Rate limit exceeded. Retry after the interval in Retry-After header.
        "500":
          description: Internal server error. Log correlation ID and notify operations.

definitions:
  Resource:
    type: object
    properties:
      id:
        type: string
        x-ms-summary: ID
        description: Unique resource identifier.
      name:
        type: string
        x-ms-summary: Name
        description: Display name of the resource.
      createdAt:
        type: string
        format: date-time
        x-ms-summary: Created At
        description: UTC timestamp when the resource was created.

# Environment Variables Required:
#   EV_OAUTH_CLIENT_ID    - type: string   - Client/Application ID of the Entra app registration
#   EV_OAUTH_CLIENT_SECRET - type: secret  - Client secret from the Entra app registration
#   EV_API_BASE_URL       - type: string   - Base URL of the target API (https://<api-host>)
#   EV_OAUTH_TENANT_ID    - type: string   - Entra tenant ID for authority URL

# Test Flow Steps:
#   1. Import this connector definition into the target Power Platform environment.
#   2. Create a new connection using a pilot user account.
#   3. Consent to the required OAuth scopes when prompted.
#   4. Run the HealthCheck operation and verify HTTP 200 response.
#   5. Run GetResource with a known valid ID and verify the response payload.
#   6. Revoke the OAuth token and confirm a 401 response is returned.
#   7. Restore the connection and confirm the token refresh succeeds.

# Error Handling Patterns:
#   401 - Token expired: Power Platform re-authenticates automatically on next run.
#         For persistent 401, re-consent the connection in Admin Center.
#   403 - Insufficient scope: Update OAuth scope list and re-consent.
#   429 - Rate limit: Apply exponential backoff. Reduce parallelism in calling flows.
#   500 - Server error: Log correlationId, alert operations channel, do not retry immediately.
