agentName: "Power Platform Advisor"
description: |-
  Enterprise Copilot Studio advisor for Power Platform architecture, governance, delivery, and troubleshooting.
  Covers ALM, environments, apps, connectors, Dataverse, flows, MCP, topic design, Power Fx, variable strategy,
  feature discovery, escalation, and fallback recovery with production-focused recommendations.
model: "gpt-4o"
instructions:
  constraints: |-
    Stay within Microsoft Power Platform and Copilot Studio scope. Do not fabricate tenant-specific facts, credent
    ials, or unsupported product behavior. If information is missing, ask concise clarification questions before p
    rescribing irreversible actions. Always call out governance, licensing, and security implications when relevan
    t.
  responseFormat: |-
    Respond using: 1) short diagnosis, 2) recommended approach, 3) implementation steps, 4) validation checks, 5) 
    rollback or mitigation notes. Prefer numbered steps and include concrete artifacts such as YAML snippets, Powe
    r Fx formulas, CLI commands, flow mappings, or test cases when useful.
  guidance: |-
    Prioritize production-ready guidance for ALM, environments, Dataverse, connectors, flows, and Copilot Studio t
    opics. Default to solution-aware practices, environment variables, connection references, and Dev/Test/Prod pr
    omotion. For uncertainty, provide bounded options with tradeoffs and a recommended path.
defaults:
  locale: "en-US"
  timezone: "UTC"
  orchestrationMode: "Generative"
  allowToolAutoSelection: true
  askBeforeToolExecution: false
topics:
  - name: "ALM Operations Advisor"
    description: |-
      Handles solution lifecycle planning, managed versus unmanaged strategy, import and export mechan
      ics, pipeline promotion, patching, hotfixes, semantic versioning, connection references, and env
      ironment variable governance across Dev, Test, and Production.
    triggerPhrases:
      - "How should I structure ALM for Power Platform solutions"
      - "Help me move a solution from dev to test to prod"
      - "What is the right way to version managed solutions"
      - "I need guidance for export, import, and release pipelines"
    nodes:
      - kind: "SendActivity"
        id: "t01_n01_intro"
        activity: |-
          You are in ALM Operations Advisor. I can provide implementation guidance, governance checks,
          and practical next steps aligned to enterprise Power Platform delivery.
      - kind: "Question"
        id: "t01_n02_goal"
        variable: "Topic.Goal"
        prompt: "What outcome do you need to achieve in this area?"
        entity: "Text"
        retryCount: 2
      - kind: "Question"
        id: "t01_n03_stage"
        variable: "Topic.Stage"
        prompt: "Which stage are you in: discovery, build, test, release, or operate?"
        entity: "ClosedList"
        options:
          - "discovery"
          - "build"
          - "test"
          - "release"
          - "operate"
      - kind: "SetVariable"
        id: "t01_n04_summary"
        variable: "Topic.ContextSummary"
        value: '=Concatenate(Topic.Goal, " | stage=", Topic.Stage)'
      - kind: "ConditionGroup"
        id: "t01_n05_pathing"
        conditions:
          - id: "t01_c01_discovery"
            condition: '=Topic.Stage = "discovery"'
            actions:
              - kind: "SendActivity"
                id: "t01_a01"
                activity: "I will provide decision criteria, target architecture, and risk checkpoints first."
          - id: "t01_c02_build"
            condition: '=Topic.Stage = "build" || Topic.Stage = "test"'
            actions:
              - kind: "SendActivity"
                id: "t01_a02"
                activity: "I will focus on implementation patterns, examples, and validation steps."
        elseActions:
          - kind: "SendActivity"
            id: "t01_a03"
            activity: "I will focus on deployment safety, monitoring, and rollback guidance."
      - kind: "InvokeFlowAction"
        id: "t01_n06_domain_tool"
        flowName: "alm_release_assistant_flow"
        inputs:
          goal: "=Topic.Goal"
          stage: "=Topic.Stage"
        outputVariable: "Topic.ToolResult"
      - kind: "SendActivity"
        id: "t01_n07_recommendation"
        activity: |-
          Recommended plan:
          1) Confirm non-functional constraints and ownership boundaries.
          2) Implement with solution-aware assets and explicit dependencies.
          3) Validate with automated checks and rollback readiness.
      - kind: "Question"
        id: "t01_n08_template"
        variable: "Topic.NeedsTemplate"
        prompt: "Do you want a starter template or checklist for this recommendation?"
        entity: "Boolean"
      - kind: "ConditionGroup"
        id: "t01_n09_template_branch"
        conditions:
          - id: "t01_c03_template_yes"
            condition: "=Topic.NeedsTemplate = true"
            actions:
              - kind: "SendActivity"
                id: "t01_a04"
                activity: "I will provide a ready-to-edit template with assumptions and validation criteria."
        elseActions:
          - kind: "SendActivity"
            id: "t01_a05"
            activity: "I will keep guidance concise and focus on decision points only."
      - kind: "Question"
        id: "t01_n10_escalate"
        variable: "Topic.RequestEscalation"
        prompt: "Do you want to escalate this to a human specialist now?"
        entity: "Boolean"
      - kind: "ConditionGroup"
        id: "t01_n11_escalation_branch"
        conditions:
          - id: "t01_c04_escalate_yes"
            condition: "=Topic.RequestEscalation = true"
            actions:
              - kind: "RedirectToTopic"
                id: "t01_a06"
                topic: "Escalation Advisor"
        elseActions:
          - kind: "SendActivity"
            id: "t01_a07"
            activity: "Continuing self-service guidance. Ask follow-up questions anytime."
      - kind: "EndConversation"
        id: "t01_n12_end"
        reason: "Completed"
