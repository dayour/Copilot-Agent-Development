        id: "t12_n12_end"
        reason: "Completed"
  - name: "Fallback Intent Recovery"
    description: |-
      Handles unrecognized or low-confidence user intents by clarifying the request, offering supporte
      d capability options, attempting one guided re-route, and then escalating if the issue remains u
      nresolved.
    triggerPhrases:
      - "I do not know where to start"
      - "Can you help with something else"
      - "That was not what I asked"
      - "I need a different type of support"
    nodes:
      - kind: "SendActivity"
        id: "t13_n01_intro"
        activity: |-
          You are in Fallback Intent Recovery. I can provide implementation guidance, governance checks,
          and practical next steps aligned to enterprise Power Platform delivery.
      - kind: "Question"
        id: "t13_n02_goal"
        variable: "Topic.Goal"
        prompt: "What outcome do you need to achieve in this area?"
        entity: "Text"
        retryCount: 2
      - kind: "Question"
        id: "t13_n03_stage"
        variable: "Topic.Stage"
        prompt: "Which stage are you in: discovery, build, test, release, or operate?"
        entity: "ClosedList"
        options:
          - "discovery"
          - "build"
          - "test"
          - "release"
          - "operate"
      - kind: "SetVariable"
        id: "t13_n04_summary"
        variable: "Topic.ContextSummary"
        value: '=Concatenate(Topic.Goal, " | stage=", Topic.Stage)'
      - kind: "ConditionGroup"
        id: "t13_n05_pathing"
        conditions:
          - id: "t13_c01_discovery"
            condition: '=Topic.Stage = "discovery"'
            actions:
              - kind: "SendActivity"
                id: "t13_a01"
                activity: "I will provide decision criteria, target architecture, and risk checkpoints first."
          - id: "t13_c02_build"
            condition: '=Topic.Stage = "build" || Topic.Stage = "test"'
            actions:
              - kind: "SendActivity"
                id: "t13_a02"
                activity: "I will focus on implementation patterns, examples, and validation steps."
        elseActions:
          - kind: "SendActivity"
            id: "t13_a03"
            activity: "I will focus on deployment safety, monitoring, and rollback guidance."
      - kind: "GenerativeAnswer"
        id: "t13_n06_domain_tool"
        grounding:
          - "Knowledge.PowerPlatformDocs"
          - "Knowledge.InternalPlaybooks"
        prompt: "Generate targeted recommendations using Topic.Goal and Topic.Stage."
        outputVariable: "Topic.ToolResult"
      - kind: "SendActivity"
        id: "t13_n07_recommendation"
        activity: |-
          Recommended plan:
          1) Confirm non-functional constraints and ownership boundaries.
          2) Implement with solution-aware assets and explicit dependencies.
          3) Validate with automated checks and rollback readiness.
      - kind: "Question"
        id: "t13_n08_template"
        variable: "Topic.NeedsTemplate"
        prompt: "Do you want a starter template or checklist for this recommendation?"
        entity: "Boolean"
      - kind: "ConditionGroup"
        id: "t13_n09_template_branch"
        conditions:
          - id: "t13_c03_template_yes"
            condition: "=Topic.NeedsTemplate = true"
            actions:
              - kind: "SendActivity"
                id: "t13_a04"
                activity: "I will provide a ready-to-edit template with assumptions and validation criteria."
        elseActions:
          - kind: "SendActivity"
            id: "t13_a05"
            activity: "I will keep guidance concise and focus on decision points only."
      - kind: "Question"
        id: "t13_n10_escalate"
        variable: "Topic.RequestEscalation"
        prompt: "Do you want to escalate this to a human specialist now?"
        entity: "Boolean"
      - kind: "ConditionGroup"
        id: "t13_n11_escalation_branch"
        conditions:
          - id: "t13_c04_escalate_yes"
            condition: "=Topic.RequestEscalation = true"
            actions:
              - kind: "RedirectToTopic"
                id: "t13_a06"
                topic: "Escalation Advisor"
        elseActions:
          - kind: "SendActivity"
            id: "t13_a07"
            activity: "Continuing self-service guidance. Ask follow-up questions anytime."
      - kind: "EndConversation"
        id: "t13_n12_end"
        reason: "Completed"
