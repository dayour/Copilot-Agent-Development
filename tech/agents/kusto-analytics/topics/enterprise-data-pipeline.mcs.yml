  ###  IoT Hub & Event Hub Configuration
  **Event Hub Optimization:**
  ```csharp
  // High-performance Event Hub producer configuration
  var connectionString = "Endpoint=sb://namespace.servicebus.windows.net/;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=key";
  var eventHubName = "telemetry-events";
  
  var producerOptions = new EventHubProducerClientOptions
  {
      RetryOptions = new EventHubsRetryOptions
      {
          Mode = EventHubsRetryMode.Exponential,
          MaximumRetries = 5,
          Delay = TimeSpan.FromSeconds(1),
          MaximumDelay = TimeSpan.FromSeconds(60)
      }
  };
  
  var producer = new EventHubProducerClient(connectionString, eventHubName, producerOptions);
  
  // Batch sending for optimal throughput
  var eventBatch = await producer.CreateBatchAsync();
  foreach (var telemetryData in telemetryBatch)
  {
      var eventData = new EventData(Encoding.UTF8.GetBytes(JsonSerializer.Serialize(telemetryData)));
      eventData.Properties.Add("deviceType", telemetryData.DeviceType);
      eventData.Properties.Add("priority", telemetryData.Priority);
      
      if (!eventBatch.TryAdd(eventData))
      {
          await producer.SendAsync(eventBatch);
          eventBatch = await producer.CreateBatchAsync();
          eventBatch.TryAdd(eventData);
      }
  }
  
  if (eventBatch.Count > 0)
  {
      await producer.SendAsync(eventBatch);
  }
  ```

