  ###  Azure Data Factory Integration & ETL
  **Comprehensive ETL Workflows:**
  ```json
  {
    "name": "KustoETLPipeline",
    "properties": {
      "activities": [
        {
          "name": "DataValidation",
          "type": "Lookup",
          "typeProperties": {
            "source": {
              "type": "AzureDataExplorerSource",
              "query": "ExternalData | summarize RecordCount = count(), LastUpdate = max(timestamp) | extend IsValid = RecordCount > 0 and LastUpdate > ago(1h)",
              "queryTimeout": "00:10:00"
            }
          }
        },
        {
          "name": "DataTransformation",
          "type": "AzureDataExplorerCommand",
          "dependsOn": [{"activity": "DataValidation", "dependencyConditions": ["Succeeded"]}],
          "typeProperties": {
            "command": ".execute database script <| let TransformData = ExternalData | extend ProcessedTimestamp = now(), TransformationVersion = '2.0' | where isnotnull(deviceId); TransformData | .ingest into ProcessedEvents",
            "commandTimeout": "01:00:00"
          }
        }
      ]
    }
  }
  ```

