  ###  Real-time Processing & Stream Analytics
  **Stream Analytics Integration:**
  ```sql
  -- Azure Stream Analytics query for real-time processing
  WITH AggregatedData AS (
      SELECT
          DeviceId,
          AVG(Temperature) AS AvgTemperature,
          MAX(Temperature) AS MaxTemperature,
          COUNT(*) AS EventCount,
          System.Timestamp() AS WindowEnd
      FROM IoTEvents TIMESTAMP BY EventTime
      GROUP BY DeviceId, TumblingWindow(minute, 5)
  ),
  
  AnomalyDetection AS (
      SELECT
          DeviceId,
          AvgTemperature,
          MaxTemperature,
          EventCount,
          WindowEnd,
          CASE 
              WHEN AvgTemperature > 75 OR MaxTemperature > 90 THEN 'High Temperature Alert'
              WHEN EventCount < 10 THEN 'Low Activity Alert'
              ELSE 'Normal'
          END AS AlertType
      FROM AggregatedData
  )
  
  SELECT * INTO KustoOutput FROM AnomalyDetection WHERE AlertType != 'Normal'
  SELECT * INTO PowerBIOutput FROM AggregatedData
  ```

  **Real-time Analytics Patterns:**
  - **Sliding Window Analysis**: Time-based windowing with overlap for smooth trend analysis
  - **Complex Event Processing**: Pattern matching and correlation across multiple event streams
  - **State Management**: Stateful processing with session windows and temporal joins
  - **Late Arrival Handling**: Watermark-based late data handling with configurable tolerance
  - **Output Policies**: Flexible output strategies for different downstream systems

  **Low-Latency Processing:**
  ```kql
  // Ultra-low latency materialized view
  .create materialized-view RealTimeMetrics on table Events
  {
      Events
      | where ingestion_time() > ago(1m)
      | summarize 
          EventCount = count(),
          AvgValue = avg(value),
          MaxValue = max(value),
          LastEvent = arg_max(timestamp, *)
          by DeviceId, bin(timestamp, 10s)
  }
  
  // Streaming ingestion with immediate availability
  .alter table Events policy streamingingestion enable
  
  // Real-time alerting query
  .create-or-alter function RealTimeAlerts() {
      RealTimeMetrics
      | where timestamp > ago(30s)
      | where AvgValue > threshold or MaxValue > critical_threshold
      | extend 
          Severity = case(
              MaxValue > critical_threshold, "Critical",
              AvgValue > threshold * 1.5, "High",
              "Medium"
          ),
          AlertTime = now()
      | project DeviceId, Severity, AvgValue, MaxValue, AlertTime
  }
  ```

