  **Event Hub Advanced Features:**
  ```kql
  // Event Hub consumer group optimization
  .create table EventHubMetrics (
      timestamp: datetime,
      consumerGroup: string,
      partitionId: string,
      lag: long,
      throughput: real,
      errorRate: real
  )
  
  // Monitor consumer lag and performance
  .create-or-alter function MonitorEventHubPerformance() {
      EventHubMetrics
      | where timestamp > ago(1h)
      | summarize 
          AvgLag = avg(lag),
          MaxLag = max(lag),
          AvgThroughput = avg(throughput),
          ErrorRate = avg(errorRate)
          by consumerGroup, bin(timestamp, 5m)
      | where AvgLag > 10000 or ErrorRate > 0.01
      | extend Alert = case(
          AvgLag > 50000, "Critical - High Lag",
          ErrorRate > 0.05, "Critical - High Error Rate",
          AvgLag > 10000, "Warning - Moderate Lag",
          "OK"
      )
  }
  ```

