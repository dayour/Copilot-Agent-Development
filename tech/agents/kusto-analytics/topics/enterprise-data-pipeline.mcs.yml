topic: |
  # Enterprise Data Pipeline

  ## Description
  Comprehensive large-scale data ingestion and processing pipelines with Event Hubs, IoT Hub, and Azure Data Factory integration for enterprise-grade real-time analytics and high-volume data processing.

  ## Conversation Flow

  **System:** Welcome! I'm here to help you build enterprise-scale data pipelines in Kusto. I can assist with high-volume ingestion, real-time processing, Event Hub integration, and comprehensive data pipeline optimization.

  **Options:**
  -  High-Volume Data Ingestion & Streaming
  -  Azure Data Factory Integration & ETL
  -  IoT Hub & Event Hub Configuration
  -  Real-time Processing & Stream Analytics
  -  Pipeline Architecture & Optimization

  ---

  ###  High-Volume Data Ingestion & Streaming
  **Enterprise Ingestion Architecture:**
  ```kql
  // High-Performance Ingestion Policy Configuration
  .alter table Events policy ingestionbatching @'
  {
    "MaximumBatchingTimeSpan": "00:00:10",
    "MaximumNumberOfItems": 1000,
    "MaximumRawDataSizeMB": 100
  }'
  
  // Optimize ingestion for high throughput
  .alter database MyDatabase policy streamingingestion enable
  .alter table Events policy streamingingestion @'
  {
    "IsEnabled": true,
    "HintAllocatedRate": 100.0
  }'
  
  // Configure table sharding for parallel ingestion
  .alter table Events policy sharding @'
  {
    "MaxRowCount": 750000,
    "MaxExtentSizeMB": 1024,
    "MaxOriginalSizeMB": 2048
  }'
  ```

  **Streaming Data Sources:**
  - **Event Hub Integration**: High-throughput event streaming with auto-scaling and partition management
  - **IoT Hub Processing**: Device telemetry ingestion with device twin integration and edge processing
  - **Kafka Integration**: Apache Kafka connector with exactly-once processing guarantees
  - **Service Bus Integration**: Enterprise messaging with dead letter handling and retry policies
  - **Custom Connectors**: REST API, file-based, and database change data capture connectors

  **Ingestion Optimization:**
  - **Batch Optimization**: Dynamic batching with size and time-based triggers for optimal throughput
  - **Parallel Processing**: Multi-threaded ingestion with configurable concurrency and resource allocation
  - **Compression**: Advanced compression algorithms with CPU/storage trade-off optimization
  - **Schema Evolution**: Dynamic schema adaptation with backwards compatibility and migration strategies
  - **Error Handling**: Comprehensive error management with retry logic, dead letter queues, and monitoring

  **Data Formats & Protocols:**
  ```kql
  // Multi-format ingestion mapping
  .create table RawEvents (
      timestamp: datetime,
      deviceId: string,
      eventType: string,
      payload: dynamic,
      headers: dynamic,
      messageId: string,
      partitionKey: string
  )
  
  // JSON ingestion mapping
  .create table RawEvents ingestion json mapping "JsonMapping" @'[
      {"column": "timestamp", "path": "$.eventTime", "transform": "DateTimeFromUnixSeconds"},
      {"column": "deviceId", "path": "$.device.id"},
      {"column": "eventType", "path": "$.type"},
      {"column": "payload", "path": "$.data"},
      {"column": "headers", "path": "$.headers"},
      {"column": "messageId", "path": "$.messageId"},
      {"column": "partitionKey", "path": "$.partitionKey"}
  ]'
  
  // CSV ingestion mapping for legacy systems
  .create table RawEvents ingestion csv mapping "CsvMapping" @'[
      {"Name": "timestamp", "DataType": "datetime", "Ordinal": 0},
      {"Name": "deviceId", "DataType": "string", "Ordinal": 1},
      {"Name": "eventType", "DataType": "string", "Ordinal": 2},
      {"Name": "payload", "DataType": "dynamic", "Ordinal": 3}
  ]'
  ```

