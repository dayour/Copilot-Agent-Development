  ### 🚀 Query Optimization & Performance Tuning
  **Advanced Query Analysis:**
  ```kql
  // Comprehensive query performance analyzer
  .create-or-alter function QueryPerformanceAnalyzer() {
      .show queries
      | where StartedOn > ago(24h)
      | extend 
          Duration = TotalCpu,
          MemoryPeak = MemoryPeak,
          DataScanned = DataScannedSize,
          CacheHitRatio = CacheStatistics.HitRatio,
          QueryComplexity = case(
              Text contains "join" and Text contains "summarize", "High",
              Text contains "join" or Text contains "mv-expand", "Medium",
              "Low"
          )
      | summarize 
          QueryCount = count(),
          AvgDuration = avg(Duration),
          MaxDuration = max(Duration),
          TotalDataScanned = sum(DataScanned),
          AvgMemoryPeak = avg(MemoryPeak),
          AvgCacheHitRatio = avg(CacheHitRatio)
          by QueryComplexity, Database, Principal
      | extend 
          PerformanceScore = case(
              AvgDuration < 1000 and AvgCacheHitRatio > 0.8, "Excellent",
              AvgDuration < 5000 and AvgCacheHitRatio > 0.6, "Good",
              AvgDuration < 10000, "Fair",
              "Poor"
          ),
          OptimizationPriority = case(
              TotalDataScanned > 1000000000 and AvgDuration > 10000, "Critical",
              TotalDataScanned > 100000000 or AvgDuration > 5000, "High",
              "Medium"
          )
  }
  
  // Query pattern optimization recommendations
  .create-or-alter function QueryOptimizationRecommendations() {
      .show queries
      | where StartedOn > ago(7d) and State == "Completed"
      | project Text, Duration = TotalCpu, MemoryPeak, DataScanned = DataScannedSize
      | extend 
          HasUnnecessaryColumns = Text matches regex @"project\s+\*",
          HasUnoptimizedJoins = Text matches regex @"join\s+(?!.*hint\.strategy)",
          HasUnoptimizedSummarize = Text matches regex @"summarize.*by.*,.*,.*,",
          HasNoTimeFilter = not(Text matches regex @"where.*timestamp.*>.*ago\("),
          UsesExpensiveOperators = Text matches regex @"mv-expand|sort\s+by.*desc.*asc"
      | extend 
          Recommendations = pack_array(
              iff(HasUnnecessaryColumns, "Use explicit column projection instead of project *", ""),
              iff(HasUnoptimizedJoins, "Add join strategy hints for better performance", ""),
              iff(HasUnoptimizedSummarize, "Consider reducing summarize dimensions", ""),
              iff(HasNoTimeFilter, "Add time range filters to limit data scanning", ""),
              iff(UsesExpensiveOperators, "Review expensive operators like mv-expand and complex sorts", "")
          )
      | where array_length(Recommendations) > 0
      | extend PotentialImpact = case(
          Duration > 60000 and MemoryPeak > 1000000000, "High",
          Duration > 10000 or MemoryPeak > 100000000, "Medium",
          "Low"
      )
  }
  ```

