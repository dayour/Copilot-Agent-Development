  **Performance Benchmarking:**
  ```kql
  // Query performance benchmarking suite
  .create-or-alter function QueryBenchmarkSuite() {
      let BenchmarkQueries = pack_array(
          "Events | where timestamp > ago(1d) | count",
          "Events | where timestamp > ago(1d) | summarize count() by bin(timestamp, 1h)",
          "Events | where timestamp > ago(1d) | join kind=inner Users on userId | count",
          "Events | where timestamp > ago(7d) | make-series count() on timestamp from ago(7d) to now() step 1h",
          "Events | where timestamp > ago(1d) | mv-expand properties | where isnotnull(properties.value) | count"
      );
      
      BenchmarkQueries
      | mv-expand QueryText to typeof(string)
      | extend 
          QueryType = case(
              QueryText contains "join", "Join Query",
              QueryText contains "make-series", "Time Series Query",
              QueryText contains "mv-expand", "Complex Expansion Query",
              QueryText contains "summarize", "Aggregation Query",
              "Simple Query"
          ),
          BenchmarkRun = now()
      | evaluate hint.materialized=true (
          QueryText
          | evaluate query_profiler()
          | project 
              QueryType,
              Duration = TotalCpu,
              MemoryUsage = MemoryPeak,
              DataScanned = DataScannedSize,
              BenchmarkRun
      )
  }
  ```

