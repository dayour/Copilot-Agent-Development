topic: |
  # Performance Monitoring & Optimization

  ## Description
  Comprehensive Kusto cluster monitoring with advanced query optimization, intelligent capacity planning, and enterprise-scale cost management strategies for optimal performance and resource utilization.

  ## Conversation Flow

  **System:** Welcome! I'm here to help you implement advanced performance monitoring and optimization for your Kusto clusters. I can assist with cluster monitoring, query optimization, capacity planning, and comprehensive cost management.

  **Options:**
  - 📊 Cluster Performance Monitoring & Metrics
  - 🚀 Query Optimization & Performance Tuning
  - 📈 Capacity Planning & Resource Management
  - 💰 Cost Management & Optimization Strategies
  - 🔧 Automated Optimization & Self-Healing

  ---

  ### 📊 Cluster Performance Monitoring & Metrics
  **Comprehensive Monitoring Framework:**
  ```kql
  // Advanced cluster performance dashboard
  .create-or-alter function ClusterPerformanceDashboard() {
      let PerformanceMetrics = 
      .show cluster performance
      | extend 
          CPUUtilization = CpuUsage * 100,
          MemoryUtilization = MemoryUsage * 100,
          DiskUtilization = DiskUsage * 100,
          NetworkUtilization = NetworkUsage * 100
      | project 
          Timestamp = Timestamp,
          CPUUtilization,
          MemoryUtilization, 
          DiskUtilization,
          NetworkUtilization,
          ActiveQueries = ActiveQueryCount,
          QueuedQueries = QueuedQueryCount,
          IngestionRate = IngestionEventsRate,
          QueryLatency = AvgQueryDuration;
      
      let HealthScore = 
      PerformanceMetrics
      | extend 
          CPUScore = case(CPUUtilization > 90, 0, CPUUtilization > 70, 50, 100),
          MemoryScore = case(MemoryUtilization > 85, 0, MemoryUtilization > 65, 50, 100),
          DiskScore = case(DiskUtilization > 80, 0, DiskUtilization > 60, 50, 100),
          LatencyScore = case(QueryLatency > 10000, 0, QueryLatency > 5000, 50, 100)
      | extend OverallHealth = (CPUScore + MemoryScore + DiskScore + LatencyScore) / 4
      | project Timestamp, OverallHealth, CPUScore, MemoryScore, DiskScore, LatencyScore;
      
      union PerformanceMetrics, HealthScore
  }
  
  // Real-time resource utilization monitoring
  .create materialized-view ResourceUtilization on table .show cluster performance
  {
      .show cluster performance
      | where Timestamp > ago(1h)
      | summarize 
          AvgCPU = avg(CpuUsage),
          MaxCPU = max(CpuUsage),
          AvgMemory = avg(MemoryUsage),
          MaxMemory = max(MemoryUsage),
          AvgDisk = avg(DiskUsage),
          MaxDisk = max(DiskUsage)
          by bin(Timestamp, 1m)
      | extend 
          CPUTrend = series_decompose(make_list(AvgCPU)).trend,
          MemoryTrend = series_decompose(make_list(AvgMemory)).trend
  }
  ```

  **Advanced Metrics Collection:**
  - **Infrastructure Metrics**: CPU, memory, disk I/O, network throughput with granular node-level monitoring
  - **Query Performance Metrics**: Execution time, resource consumption, queue depth, and concurrency tracking
  - **Ingestion Metrics**: Throughput, latency, error rates, and batch processing efficiency
  - **Storage Metrics**: Hot/warm/cold tier utilization, compression ratios, and data lifecycle tracking
  - **User Experience Metrics**: Query success rates, response times, and user satisfaction scoring

  **Intelligent Alerting System:**
  ```kql
  // Multi-dimensional alerting with machine learning
  .create-or-alter function IntelligentAlerting() {
      let BaselineMetrics = 
      .show cluster performance
      | where Timestamp between (ago(30d) .. ago(1d))
      | summarize 
          BaselineCPU = percentile(CpuUsage, 95),
          BaselineMemory = percentile(MemoryUsage, 95),
          BaselineLatency = percentile(AvgQueryDuration, 95)
          by dayofweek(Timestamp), bin(Timestamp, 1h) % 24;
      
      let CurrentMetrics = 
      .show cluster performance
      | where Timestamp > ago(1h)
      | summarize 
          CurrentCPU = avg(CpuUsage),
          CurrentMemory = avg(MemoryUsage),
          CurrentLatency = avg(AvgQueryDuration)
          by bin(Timestamp, 5m);
      
      CurrentMetrics
      | join kind=leftouter BaselineMetrics on $left.dayofweek(Timestamp) == $right.dayofweek(Timestamp)
      | extend 
          CPUAnomaly = CurrentCPU > BaselineCPU * 1.5,
          MemoryAnomaly = CurrentMemory > BaselineMemory * 1.3,
          LatencyAnomaly = CurrentLatency > BaselineLatency * 2.0
      | where CPUAnomaly or MemoryAnomaly or LatencyAnomaly
      | extend 
          Severity = case(
              CurrentCPU > BaselineCPU * 2.0 or CurrentMemory > BaselineMemory * 2.0, "Critical",
              CurrentCPU > BaselineCPU * 1.8 or CurrentMemory > BaselineMemory * 1.7, "High",
              "Medium"
          ),
          AlertMessage = strcat(
              "Performance anomaly detected - ",
              case(CPUAnomaly, "High CPU usage", ""),
              case(MemoryAnomaly, " High Memory usage", ""),
              case(LatencyAnomaly, " High Query Latency", "")
          )
  }
  ```

