  **Budget Management:**
  ```kql
  // Intelligent budget monitoring and forecasting
  .create-or-alter function BudgetMonitoringForecast() {
      let MonthlySpend = 
      CostData
      | where Timestamp > startofmonth(ago(6m))
      | summarize MonthlyCost = sum(Cost) by startofmonth(Timestamp)
      | extend 
          MonthOverMonth = (MonthlyCost - prev(MonthlyCost)) / prev(MonthlyCost),
          SpendTrend = case(
              MonthOverMonth > 0.2, "Rapidly Increasing",
              MonthOverMonth > 0.1, "Increasing", 
              MonthOverMonth < -0.1, "Decreasing",
              "Stable"
          );
      
      let BudgetForecast = 
      MonthlySpend
      | make-series SpendSeries = avg(MonthlyCost) on Timestamp from ago(6m) to now() + 3m step 1m
      | extend ForecastedSpend = series_decompose_forecast(SpendSeries, 3, -1, 'linefit')
      | project 
          ForecastTimestamp = range(now(), now() + 3m, 1m),
          PredictedMonthlyCost = ForecastedSpend;
      
      BudgetForecast
      | extend 
          BudgetStatus = case(
              PredictedMonthlyCost > MonthlyBudget * 1.1, "Over Budget",
              PredictedMonthlyCost > MonthlyBudget * 0.9, "Approaching Limit",
              "Within Budget"
          ),
          RecommendedActions = case(
              BudgetStatus == "Over Budget", "Immediate cost reduction required",
              BudgetStatus == "Approaching Limit", "Monitor usage closely and implement optimizations",
              "Continue current spending patterns"
          )
  }
  ```

