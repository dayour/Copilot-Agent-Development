  **Cluster Architecture Optimization:**
  ```kql
  // Cluster architecture analyzer
  .create-or-alter function ClusterArchitectureAnalyzer() {
      let NodeAnalysis = 
      .show cluster nodes
      | extend 
          NodeType = case(
              NodeRole == "DataManagement", "Management Node",
              NodeRole == "DataNode", "Data Node",
              "Other"
          ),
          ResourceEfficiency = (CpuUsage + MemoryUsage) / 2,
          LoadBalance = abs(CpuUsage - avg(CpuUsage))
      | summarize 
          NodeCount = count(),
          AvgEfficiency = avg(ResourceEfficiency),
          LoadImbalance = max(LoadBalance),
          UnhealthyNodes = countif(IsHealthy == false)
          by NodeType;
      
      let ArchitectureRecommendations = 
      NodeAnalysis
      | extend 
          Recommendations = case(
              LoadImbalance > 0.3, "High load imbalance - consider rebalancing",
              AvgEfficiency < 0.4, "Low resource efficiency - consider consolidation",
              UnhealthyNodes > 0, "Unhealthy nodes detected - investigate immediately",
              NodeCount < 3 and NodeType == "Data Node", "Consider adding more data nodes for redundancy",
              "Cluster architecture appears optimal"
          ),
          Priority = case(
              UnhealthyNodes > 0, "Critical",
              LoadImbalance > 0.5, "High",
              "Medium"
          );
      
      ArchitectureRecommendations
  }
  ```

