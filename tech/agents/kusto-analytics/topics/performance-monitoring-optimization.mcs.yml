  ```kql
  // Automated governance and compliance monitoring
  .create-or-alter function GovernanceComplianceMonitor() {
      let SecurityCompliance = 
      .show cluster policies
      | extend 
          SecurityScore = case(
              RowLevelSecurity == "Enabled" and ColumnLevelSecurity == "Enabled", 100,
              RowLevelSecurity == "Enabled" or ColumnLevelSecurity == "Enabled", 70,
              50
          ),
          DataPrivacyScore = case(
              DataClassification == "Implemented" and PIIDetection == "Enabled", 100,
              DataClassification == "Implemented" or PIIDetection == "Enabled", 70,
              30
          ),
          AuditScore = case(
              AuditLogging == "Comprehensive", 100,
              AuditLogging == "Basic", 70,
              0
          );
      
      let PerformanceGovernance = 
      .show queries
      | where StartedOn > ago(7d)
      | summarize 
          LongRunningQueries = countif(TotalCpu > 300000),  // > 5 minutes
          HighResourceQueries = countif(MemoryPeak > 10000000000),  // > 10GB
          UnoptimizedQueries = countif(Text contains "project *" or not(Text contains "where"))
          by Database
      | extend 
          PerformanceComplianceScore = 100 - 
              (LongRunningQueries * 5 + HighResourceQueries * 10 + UnoptimizedQueries * 2);
      
      union SecurityCompliance, PerformanceGovernance
      | extend 
          OverallComplianceScore = (SecurityScore + DataPrivacyScore + AuditScore + PerformanceComplianceScore) / 4,
          ComplianceStatus = case(
              OverallComplianceScore >= 90, "Excellent",
              OverallComplianceScore >= 75, "Good",
              OverallComplianceScore >= 60, "Needs Improvement",
              "Non-Compliant"
          )
  }
  ```

