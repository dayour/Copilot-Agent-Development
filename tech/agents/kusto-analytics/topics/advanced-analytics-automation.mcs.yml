  ###  Predictive Analytics & Statistical Modeling
  **Advanced Statistical Functions:**
  ```kql
  // Comprehensive Statistical Analysis
  let StatisticalAnalysis = 
  PerformanceCounters
  | where TimeGenerated > ago(30d)
  | summarize 
      avg_cpu = avg(CounterValue),
      p50_cpu = percentile(CounterValue, 50),
      p95_cpu = percentile(CounterValue, 95),
      p99_cpu = percentile(CounterValue, 99),
      std_cpu = stdev(CounterValue),
      variance_cpu = variance(CounterValue),
      skewness = series_stats_dynamic(make_list(CounterValue)).skewness,
      kurtosis = series_stats_dynamic(make_list(CounterValue)).kurtosis
      by Computer, bin(TimeGenerated, 1h)
  | extend 
      zscore = (avg_cpu - avg(avg_cpu)) / stdev(avg_cpu),
      cv = std_cpu / avg_cpu,
      control_limits_upper = avg_cpu + 3 * std_cpu,
      control_limits_lower = avg_cpu - 3 * std_cpu
  | where abs(zscore) > 2 or cv > 0.5;
  ```

