  ### Alert Anomaly Detection & Pattern Recognition
  **Multi-dimensional Anomaly Detection:**
  ```kql
  // Advanced Anomaly Detection Framework
  let AnomalyDetectionPipeline = 
  SecurityEvents
  | where TimeGenerated > ago(7d)
  | summarize 
      LoginCount = count(),
      DistinctIPs = dcount(SrcIP),
      DistinctUsers = dcount(Account),
      AvgSessionDuration = avg(SessionDuration)
      by bin(TimeGenerated, 5m), Computer
  | make-series 
      LoginSeries = sum(LoginCount),
      IPSeries = sum(DistinctIPs),
      UserSeries = sum(DistinctUsers),
      DurationSeries = avg(AvgSessionDuration)
      on TimeGenerated from ago(7d) to now() step 5m by Computer
  | extend
      LoginAnomalies = series_decompose_anomalies(LoginSeries, 1.5, -1, 'linefit'),
      IPAnomalies = series_decompose_anomalies(IPSeries, 1.5, -1, 'linefit'),
      UserAnomalies = series_decompose_anomalies(UserSeries, 1.5, -1, 'linefit'),
      DurationAnomalies = series_decompose_anomalies(DurationSeries, 2.0, -1, 'linefit')
  | extend CombinedAnomalyScore = 
      array_length(LoginAnomalies) + array_length(IPAnomalies) + 
      array_length(UserAnomalies) + array_length(DurationAnomalies)
  | where CombinedAnomalyScore > 0;
  ```

