# Name: KQL Development
# Domain-specific topic for Kusto
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: KQL Development
    includeInOnSelectIntent: true
    triggerQueries:
      - kql
      - kusto query
      - query development
      - data query
  actions:
    - kind: SendActivity
      id: sendMessage_response
      activity:
        text:
          - I'll help with KQL query development. Are you writing new queries, optimizing existing ones, or learning KQL syntax?
        speak:
          - I'll help with KQL query development. Are you writing new queries, optimizing existing ones, or learning KQL syntax?

    - kind: CancelAllDialogs
      id: cancelAllDialogs_end
