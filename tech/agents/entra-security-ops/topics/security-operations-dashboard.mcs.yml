# Name: Security Operations Dashboard
# Real-time security operations center dashboard and monitoring workflows
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Security Operations Dashboard
    triggerQueries:
      - SOC dashboard
      - security operations center
      - security monitoring
      - security metrics
      - threat monitoring
      - security KPIs
      - operations dashboard
      - security visibility

  actions:
    - kind: SendActivity
      id: dashboard_intro
      activity: |
        📊 **Security Operations Center Dashboard**
        
        Welcome to your real-time security operations command center. I'll provide comprehensive visibility into your security posture and ongoing threats.
        
        **Dashboard Capabilities:**
        
        **📈 Real-time Monitoring**
        - Live threat detection and alert feeds
        - Security event correlation and analysis
        - Critical infrastructure health monitoring
        - Incident status and escalation tracking
        
        **🎯 Threat Intelligence**
        - Active threat campaign tracking
        - IOC monitoring and enrichment
        - Threat actor activity analysis
        - Attack surface visibility
        
        **⚡ Operational Metrics**
        - Mean time to detection (MTTD)
        - Mean time to response (MTTR)
        - Alert volume and false positive rates
        - Team performance and workload distribution
        
        **🚨 Critical Alerts**
        - High-priority security incidents
        - System health and availability alerts
        - Compliance violation notifications
        - Emergency escalation requirements
        
        What security operations information do you need?

    - kind: Question
      id: dashboard_view
      interruptionPolicy:
        allowInterruption: true
      variable: Topic.dashboardView
      prompt:
        kind: Activity
        activity: |
          Select your dashboard view:
          
          **1.** 📊 Executive Security Summary
          **2.** 🚨 Critical Alerts & Incidents
          **3.** 📈 Real-time Threat Intelligence
          **4.** ⚡ SOC Performance Metrics
          **5.** 🎯 Threat Hunting Dashboard
          **6.** 🛡️ Infrastructure Health Status
          **7.** 📋 Compliance & Risk Overview
          
          Type the number or describe your specific dashboard need.

    - kind: ConditionGroup
      id: dashboard_routing
      conditions:
        - kind: Condition
          id: executive_summary
          condition: "Topic.dashboardView contains \"1\" || contains(toLower(Topic.dashboardView), \"executive\")"
          actions:
            - kind: BeginDialog
              id: call_executive_dialog
              dialog: ExecutiveDashboardDialog

        - kind: Condition
          id: critical_alerts
          condition: "Topic.dashboardView contains \"2\" || contains(toLower(Topic.dashboardView), \"critical\") || contains(toLower(Topic.dashboardView), \"alerts\")"
          actions:
            - kind: BeginDialog
              id: call_alerts_dialog
              dialog: CriticalAlertsDialog

        - kind: Condition
          id: threat_intelligence
          condition: "Topic.dashboardView contains \"3\" || contains(toLower(Topic.dashboardView), \"threat\") || contains(toLower(Topic.dashboardView), \"intelligence\")"
          actions:
            - kind: BeginDialog
              id: call_intelligence_dialog
              dialog: ThreatIntelligenceDialog

        - kind: Condition
          id: performance_metrics
          condition: "Topic.dashboardView contains \"4\" || contains(toLower(Topic.dashboardView), \"performance\") || contains(toLower(Topic.dashboardView), \"metrics\")"
          actions:
            - kind: BeginDialog
              id: call_metrics_dialog
              dialog: PerformanceMetricsDialog

        - kind: Condition
          id: hunting_dashboard
          condition: "Topic.dashboardView contains \"5\" || contains(toLower(Topic.dashboardView), \"hunting\")"
          actions:
            - kind: BeginDialog
              id: call_hunting_dialog
              dialog: HuntingDashboardDialog

        - kind: Condition
          id: infrastructure_health
          condition: "Topic.dashboardView contains \"6\" || contains(toLower(Topic.dashboardView), \"infrastructure\") || contains(toLower(Topic.dashboardView), \"health\")"
          actions:
            - kind: BeginDialog
              id: call_infrastructure_dialog
              dialog: InfrastructureHealthDialog

        - kind: Condition
          id: compliance_overview
          condition: "Topic.dashboardView contains \"7\" || contains(toLower(Topic.dashboardView), \"compliance\") || contains(toLower(Topic.dashboardView), \"risk\")"
          actions:
            - kind: BeginDialog
              id: call_compliance_dialog
              dialog: ComplianceOverviewDialog

      elseActions:
        - kind: SendActivity
          id: dashboard_help
          activity: |
            I can show you various security operations dashboards:
            - Executive security summaries
            - Critical alerts and incidents
            - Real-time threat intelligence
            - SOC performance metrics
            - Infrastructure health status

