        variable: Dialog.reviewType
        prompt: |
          **Access Review Campaign Type:**
          
          What type of access review campaign do you want to configure?

      - kind: SendActivity
        id: access_review_configuration
        activity: |
           **Advanced Access Review Implementation**
          
          **Microsoft Graph PowerShell Configuration:**
          ```powershell
          # Connect with required permissions
          Connect-MgGraph -Scopes "AccessReview.ReadWrite.All", "Directory.Read.All"
          
          # Create high-privilege account review
          $privilegedReview = @{
              displayName = "Quarterly Privileged Account Review"
              descriptionForAdmins = "Review of all accounts with administrative privileges"
              descriptionForReviewers = "Please review and certify administrative access"
              query = @{
                  type = "MicrosoftGraph"
                  query = "/groups/filter=displayName eq 'Global Administrators'/members"
                  queryRoot = "users"
              }
              scope = @{
                  "@odata.type" = "#microsoft.graph.accessReviewQueryScope"
                  query = "/users?`$filter=userType eq 'Member'"
                  queryType = "MicrosoftGraph"
              }
              reviewers = @(
                  @{
                      query = "/users?`$filter=userType eq 'Member' and userPrincipalName eq 'security-admin@company.com'"
                      queryType = "MicrosoftGraph"
                  }
              )
              settings = @{
                  mailNotificationsEnabled = $true
                  reminderNotificationsEnabled = $true
                  justificationRequiredOnApproval = $true
                  defaultDecisionEnabled = $true
                  defaultDecision = "Deny"
                  instanceDurationInDays = 14
                  autoApplyDecisionsEnabled = $true
                  recommendationsEnabled = $true
                  recurrence = @{
                      pattern = @{
                          type = "quarterly"
                          interval = 3
                      }
                      range = @{
                          type = "noEnd"
                          startDate = (Get-Date).ToString("yyyy-MM-dd")
                      }
                  }
              }
          }
          
          New-MgIdentityGovernanceAccessReview -BodyParameter $privilegedReview
          
          # Create application permissions review
          $appPermissionReview = @{
              displayName = "Annual Application Permissions Review"
              descriptionForAdmins = "Review service principal permissions and app registrations"
              scope = @{
                  "@odata.type" = "#microsoft.graph.accessReviewQueryScope"
                  query = "/servicePrincipals?`$filter=appOwnerOrganizationId eq '$((Get-MgOrganization).Id)'"
                  queryType = "MicrosoftGraph"
              }
              reviewers = @(
                  @{
                      query = "/groups?`$filter=displayName eq 'Application Owners'"
                      queryType = "MicrosoftGraph"
                  }
              )
              settings = @{
                  instanceDurationInDays = 30
                  recommendationsEnabled = $true
                  justificationRequiredOnApproval = $true
                  autoApplyDecisionsEnabled = $false
                  recurrence = @{
                      pattern = @{
                          type = "annual"
                          interval = 12
                      }
                  }
              }
          }
          
          New-MgIdentityGovernanceAccessReview -BodyParameter $appPermissionReview
          ```
          
          **Microsoft Sentinel Integration for Review Analytics:**
          ```kql
          // Access review completion and compliance tracking
          AuditLogs
          | where Category == "AccessReview"
          | where OperationName has_any ("Complete", "Approve", "Deny")
          | summarize 
              TotalReviews = count(),
              CompletedReviews = countif(OperationName == "Complete"),
              ApprovedAccess = countif(OperationName == "Approve"),
              DeniedAccess = countif(OperationName == "Deny"),
              CompletionRate = round(todouble(countif(OperationName == "Complete")) / count() * 100, 2)
          by bin(TimeGenerated, 1d), tostring(TargetResources[0].displayName)
          | order by TimeGenerated desc
          
          // Risk-based review prioritization
          SigninLogs
          | where TimeGenerated > ago(30d)
          | summarize 
              RiskySignins = countif(RiskLevelDuringSignIn in ("high", "medium")),
              TotalSignins = count(),
              RiskPercentage = round(todouble(countif(RiskLevelDuringSignIn in ("high", "medium"))) / count() * 100, 2)
          by UserPrincipalName
          | where RiskPercentage > 10
          | join kind=inner (
              IdentityInfo
              | summarize arg_max(TimeGenerated, *) by AccountUPN
              | where AssignedRoles has_any ("Global Administrator", "Privileged Role Administrator")
          ) on $left.UserPrincipalName == $right.AccountUPN
          | project UserPrincipalName, RiskPercentage, AssignedRoles, RiskySignins
          | order by RiskPercentage desc
          ```
          
          **Automated Remediation Workflows:**
