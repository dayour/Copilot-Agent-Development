        id: analytics_implementation
        activity: |
           **Enterprise Governance Analytics Implementation**
          
          **Microsoft Sentinel Advanced Analytics:**
          ```kql
          // Comprehensive identity governance analytics workbook
          
          // Identity risk scoring model
          let IdentityRiskFactors = 
              SigninLogs
              | where TimeGenerated > ago(30d)
              | summarize 
                  FailedSignins = countif(ResultType != "0"),
                  RiskySignins = countif(RiskLevelDuringSignIn in ("high", "medium")),
                  UnusualLocations = dcount(LocationDetails.city),
                  OffHoursAccess = countif(hourofday(TimeGenerated) < 6 or hourofday(TimeGenerated) > 22),
                  TotalSignins = count()
              by UserPrincipalName
              | extend 
                  FailureRate = round(FailedSignins * 100.0 / TotalSignins, 2),
                  RiskRate = round(RiskySignins * 100.0 / TotalSignins, 2),
                  LocationRisk = case(UnusualLocations > 5, 3, UnusualLocations > 2, 2, 1),
                  TimeRisk = case(OffHoursAccess > 20, 3, OffHoursAccess > 10, 2, 1);
          
          // Calculate composite risk score
          IdentityRiskFactors
          | extend RiskScore = round(
                  (FailureRate * 0.3) + 
                  (RiskRate * 0.4) + 
                  (LocationRisk * 10 * 0.2) + 
                  (TimeRisk * 10 * 0.1), 2)
          | extend RiskCategory = case(
                  RiskScore > 50, "Critical",
                  RiskScore > 30, "High", 
                  RiskScore > 15, "Medium",
                  "Low")
          | order by RiskScore desc;
          
          // Access optimization analytics
          let AccessUtilization = 
              AuditLogs
              | where TimeGenerated > ago(90d)
              | where Category == "ApplicationManagement"
              | where OperationName has "Access"
              | summarize 
                  LastAccess = max(TimeGenerated),
                  AccessFrequency = count(),
                  UniqueUsers = dcount(InitiatedBy.user.userPrincipalName)
              by ResourceId = tostring(TargetResources[0].id)
              | extend 
                  DaysSinceLastAccess = datetime_diff('day', now(), LastAccess),
                  UtilizationScore = case(
                      DaysSinceLastAccess > 90 and AccessFrequency < 5, 0,  // Unused
                      DaysSinceLastAccess > 30 and AccessFrequency < 20, 1, // Low usage
                      DaysSinceLastAccess > 7 and AccessFrequency < 50, 2,  // Medium usage
                      3  // High usage
                  );
          
          // Governance effectiveness metrics
          let GovernanceMetrics = 
              AuditLogs
              | where TimeGenerated > ago(30d)
              | where Category in ("RoleManagement", "ApplicationManagement", "GroupManagement")
              | summarize 
                  TotalGovernanceActions = count(),
                  AutomatedActions = countif(InitiatedBy.app.displayName != ""),
                  ManualActions = countif(InitiatedBy.user.userPrincipalName != ""),
                  AccessReviews = countif(OperationName has "Review"),
                  AccessProvisioning = countif(OperationName has_any ("Add", "Grant")),
                  AccessDeprovisioning = countif(OperationName has_any ("Remove", "Revoke"))
              by bin(TimeGenerated, 1d)
              | extend 
                  AutomationRate = round(AutomatedActions * 100.0 / TotalGovernanceActions, 2),
                  DeprovisioningRate = round(AccessDeprovisioning * 100.0 / (AccessProvisioning + AccessDeprovisioning), 2);
          ```
          
