        variable: Dialog.lifecycleComponent
        prompt: |
          **Lifecycle Automation Component:**
          
          Which lifecycle automation component do you want to configure?

      - kind: SendActivity
        id: lifecycle_implementation
        activity: |
           **Enterprise Lifecycle Automation Implementation**
          
          **Microsoft Graph PowerShell Automation:**
          ```powershell
          # Advanced automated user provisioning script
          # HR System Integration Example
          
          # Connect to Microsoft Graph
          Connect-MgGraph -Scopes "User.ReadWrite.All", "Group.ReadWrite.All", "Directory.ReadWrite.All"
          
          # Function for automated user onboarding
          function New-EnterpriseUser {
              param(
                  [Parameter(Mandatory=$true)]
                  [hashtable]$HRData
              )
              
              # Create user account
              $userParams = @{
                  DisplayName = "$($HRData.FirstName) $($HRData.LastName)"
                  UserPrincipalName = "$($HRData.EmployeeId)@company.com"
                  MailNickname = $HRData.EmployeeId
                  AccountEnabled = $true
                  PasswordProfile = @{
                      ForceChangePasswordNextSignIn = $true
                      Password = "TempP@ssw0rd123!"
                  }
                  Department = $HRData.Department
                  JobTitle = $HRData.JobTitle
                  EmployeeId = $HRData.EmployeeId
                  Manager = $HRData.ManagerUPN
                  OfficeLocation = $HRData.Office
                  EmployeeHireDate = $HRData.StartDate
              }
              
              $newUser = New-MgUser @userParams
              
              # Role-based group assignment
              $roleMapping = @{
                  "Finance" = @("Finance-Users", "Office365-E3")
                  "HR" = @("HR-Users", "Office365-E3", "HR-Confidential")
                  "IT" = @("IT-Users", "Office365-E5", "IT-Privileged")
                  "Sales" = @("Sales-Users", "Office365-E3", "CRM-Access")
              }
              
              $groups = $roleMapping[$HRData.Department]
              foreach ($group in $groups) {
                  $groupId = (Get-MgGroup -Filter "displayName eq '$group'").Id
                  New-MgGroupMember -GroupId $groupId -DirectoryObjectId $newUser.Id
              }
              
              # Send welcome email with credentials
              Send-WelcomeEmail -User $newUser -Department $HRData.Department
              
              return $newUser
          }
          
          # Automated offboarding function
          function Remove-EnterpriseUser {
              param(
                  [Parameter(Mandatory=$true)]
                  [string]$UserPrincipalName,
                  [Parameter(Mandatory=$true)]
                  [datetime]$TerminationDate
              )
              
              $user = Get-MgUser -UserPrincipalName $UserPrincipalName
              
              # Immediate access revocation
              Update-MgUser -UserId $user.Id -AccountEnabled:$false
              
              # Revoke all active sessions
              Revoke-MgUserSignInSession -UserId $user.Id
              
              # Remove from all groups except archive groups
              $userGroups = Get-MgUserMemberOf -UserId $user.Id
              foreach ($group in $userGroups) {
                  if ($group.DisplayName -notlike "*Archive*") {
                      Remove-MgGroupMemberByRef -GroupId $group.Id -DirectoryObjectId $user.Id
                  }
              }
              
              # Schedule account deletion after retention period
              $deletionDate = $TerminationDate.AddDays(90)
              New-ScheduledTask -TaskName "DeleteUser-$($user.Id)" -TaskDate $deletionDate
          }
          ```
          
          **Integration with Enterprise Systems:**
          
          ** HR System Integration (Workday/SuccessFactors):**
          ```powershell
          # Workday API integration for real-time provisioning
          $workdayEndpoint = "https://company.workday.com/api/v1/workers"
          $headers = @{
              "Authorization" = "Bearer $WorkdayAccessToken"
              "Content-Type" = "application/json"
          }
          
          # Monitor for new hires and terminations
          $hrChanges = Invoke-RestMethod -Uri $workdayEndpoint -Headers $headers -Method Get
          foreach ($change in $hrChanges) {
              switch ($change.EventType) {
                  "NEW_HIRE" { New-EnterpriseUser -HRData $change.EmployeeData }
                  "TERMINATION" { Remove-EnterpriseUser -UserPrincipalName $change.UserPrincipalName -TerminationDate $change.TerminationDate }
                  "ROLE_CHANGE" { Update-UserAccess -UserPrincipalName $change.UserPrincipalName -NewRole $change.NewRole }
              }
          }
          ```
          
