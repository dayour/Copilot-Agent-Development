# Name: Identity Governance Automation
# Automated identity lifecycle management, access reviews, and entitlement management workflows
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Identity Governance Automation
    triggerQueries:
      - identity governance
      - access reviews
      - entitlement management
      - identity lifecycle
      - automated provisioning
      - access certification
      - identity automation
      - governance workflows
      - access governance
      - compliance automation

  actions:
    - kind: SendActivity
      id: governance_intro
      activity: |
         **Enterprise Identity Governance Automation Center**
        
        **Comprehensive Identity Governance Framework:**
        
        ** Identity Lifecycle Management**
        [x] **Automated Onboarding** - Streamlined new user provisioning with role-based access
        [x] **Dynamic Access Management** - Attribute-based access control and entitlements
        [x] **Automated Offboarding** - Secure account termination and access revocation
        [x] **Lifecycle Orchestration** - End-to-end identity workflow automation
        
        ** Access Reviews & Certification**
        [x] **Automated Access Reviews** - Periodic access certification campaigns
        [x] **Risk-based Reviews** - Priority-based review scheduling and scope
        [x] **Compliance Reporting** - SOX, GDPR, HIPAA compliance automation
        [x] **Remediation Workflows** - Automated access cleanup and enforcement
        
        ** Entitlement Management**
        [x] **Access Packages** - Pre-configured role and resource bundles
        [x] **Self-service Access** - Employee-driven access request workflows
        [x] **Approval Automation** - AI-assisted approval decision support
        [x] **Temporal Access** - Time-bound access grants and automatic expiration
        
        What aspect of identity governance requires immediate attention?

    - kind: Question
      id: governance_focus
      interruptionPolicy:
        allowInterruption: true
      variable: Topic.governanceFocus
      prompt:
        kind: Activity
        activity: |
          **Select Governance Automation Focus:**
          
           **1. Identity Lifecycle Automation** - Configure automated user provisioning and deprovisioning
           **2. Access Review Campaigns** - Set up and manage periodic access certifications
           **3. Entitlement Management** - Design and deploy access packages and self-service workflows
           **4. Compliance Automation** - Implement regulatory compliance reporting and controls
           **5. Governance Analytics** - Advanced identity analytics and risk assessment
          
          Choose your implementation priority:

    - kind: ConditionGroup
      id: governance_routing
      conditions:
        - kind: Condition
          id: lifecycle_automation_condition
          condition: =Topic.governanceFocus = "Identity Lifecycle Automation"
          actions:
            - kind: BeginDialog
              id: start_lifecycle_automation
              dialog: LifecycleAutomationDialog

        - kind: Condition
          id: access_reviews_condition
          condition: =Topic.governanceFocus = "Access Review Campaigns"
          actions:
            - kind: BeginDialog
              id: start_access_reviews
              dialog: AccessReviewsDialog

        - kind: Condition
          id: entitlement_management_condition
          condition: =Topic.governanceFocus = "Entitlement Management"
          actions:
            - kind: BeginDialog
              id: start_entitlement_management
              dialog: EntitlementManagementDialog

        - kind: Condition
          id: compliance_automation_condition
          condition: =Topic.governanceFocus = "Compliance Automation"
          actions:
            - kind: BeginDialog
              id: start_compliance_automation
              dialog: ComplianceAutomationDialog

        - kind: Condition
          id: governance_analytics_condition
          condition: =Topic.governanceFocus = "Governance Analytics"
          actions:
            - kind: BeginDialog
              id: start_governance_analytics
              dialog: GovernanceAnalyticsDialog

      elseActions:
        - kind: SendActivity
          id: invalid_governance_selection
          activity: |
            Warning Please select a valid governance automation option from the list above.

