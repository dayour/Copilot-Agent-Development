  - kind: AdaptiveDialog
    id: ComplianceAutomationDialog
    steps:
      - kind: SendActivity
        id: compliance_automation_intro
        activity: |
           **Enterprise Compliance Automation Framework**
          
          **Regulatory Compliance Coverage:**
          
          ** SOX (Sarbanes-Oxley) Compliance:**
          - **Segregation of Duties** - Automated conflict detection and resolution
          - **Financial System Access** - Quarterly certification and monitoring
          - **Executive Access Controls** - Enhanced monitoring for C-level accounts
