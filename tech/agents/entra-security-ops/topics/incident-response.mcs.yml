kind: Topic
metadata:
  name: "incident-response"
  displayName: "Security Incident Response"
  description: "Comprehensive security incident response coordination and management workflow"
  category: "Security Operations"
  priority: "Critical"

trigger:
  phrases:
    - "incident response"
    - "coordinate incident"
    - "security incident"
    - "incident management"
    - "response coordination"
    - "incident commander"
    - "emergency response"
    - "incident coordination"

nodes:
  - action: SendMessage
    message: |
      Alert **Security Incident Response Command Center** Alert
      
      I'm here to help coordinate and manage security incident response activities.
      This workflow supports the full incident response lifecycle from detection through resolution.

  - action: Question
    variable: incidentPhase
    prompt: |
      **Current Incident Response Phase:**
      What phase of incident response are you in?
    options:
      - "Initial Detection & Assessment"
      - "Incident Classification & Scoping"
      - "Containment & Mitigation"
      - "Investigation & Evidence Collection"
      - "Eradication & Recovery"
      - "Post-Incident Activities"
      - "Ongoing Incident Coordination"

  - action: Condition
    condition: incidentPhase == "Initial Detection & Assessment"
    ifTrue:
      - action: Question
        variable: detectionSource
        prompt: |
          **Detection Source:**
          How was this incident detected?
        options:
          - "Automated security alert"
          - "User report"
          - "Threat hunting discovery"
          - "External notification"
          - "Monitoring system alert"
          - "Third-party intelligence"

      - action: Question
        variable: initialIndicators
        prompt: |
          **Initial Indicators:**
          What are the key indicators or symptoms observed?

      - action: SendMessage
        message: |
           **Initial Detection & Assessment Protocol**
          
          **Detection Summary:**
          - **Source:** {detectionSource}
          - **Indicators:** {initialIndicators}
          - **Assessment Time:** {CurrentDateTime}
          
          **Immediate Assessment Actions:**
          
          **Step 1: Rapid Threat Assessment (5 minutes)**
          [x] Verify the alert is not a false positive
          [x] Assess immediate threat to business operations
          [x] Identify potentially affected systems/users
          [x] Determine if containment is urgently needed
          
          **Step 2: Initial Incident Classification**
          [x] Assess potential impact (Critical/High/Medium/Low)
          [x] Determine incident category (Data breach, malware, etc.)
          [x] Evaluate scope and potential spread
          [x] Identify required response resources
          
          **Step 3: Notification Protocol**
          [x] Alert Security Operations Center (SOC)
          [x] Notify Incident Commander if high severity
          [x] Inform relevant technical teams
          [x] Document initial findings in incident system
          
          **Next Step:** Proceed to Incident Classification & Scoping

  - action: Condition
    condition: incidentPhase == "Incident Classification & Scoping"
    ifTrue:
      - action: Question
        variable: incidentSeverity
        prompt: |
          **Incident Severity Classification:**
          Based on your assessment, what is the incident severity?
        options:
          - "Critical - Major business impact, active breach"
          - "High - Significant impact, potential breach"
          - "Medium - Limited impact, contained threat"
          - "Low - Minimal impact, suspicious activity"

      - action: Question
        variable: incidentCategory
        prompt: |
          **Incident Category:**
          What type of security incident is this?
        options:
          - "Data Breach/Exfiltration"
          - "Malware/Ransomware"
          - "Credential Compromise"
          - "Insider Threat"
          - "Phishing/Social Engineering"
          - "Network Intrusion"
          - "DDoS Attack"
          - "Policy Violation"

      - action: Question
        variable: affectedSystems
        prompt: |
          **Affected Systems/Assets:**
          What systems, applications, or data are affected or at risk?

      - action: SendMessage
        message: |
           **Incident Classification Complete**
          
          **Incident Details:**
          - **Severity:** {incidentSeverity}
          - **Category:** {incidentCategory}
          - **Affected Systems:** {affectedSystems}
          - **Classification Time:** {CurrentDateTime}
          
          **Response Team Activation:**
          
          Based on {incidentSeverity} severity:
          
          [x] **Core Response Team Activated:**
          - Incident Commander assigned
          - Security Operations Center (SOC) engaged
          - Technical investigation team assembled
          - Communications lead designated
          
          [x] **Stakeholder Notifications:**
          - IT Security Manager notified
          - Affected business unit leads alerted
          - Legal/Compliance team informed (if required)
          - Executive leadership briefed (if critical)
          
          **Recommended Response Structure:**
          - **Command:** Incident Commander coordinates overall response
          - **Operations:** Technical teams handle containment/investigation
          - **Intelligence:** Threat analysis and attribution
          - **Communications:** Internal/external communications

  - action: Condition
    condition: incidentPhase == "Containment & Mitigation"
    ifTrue:
      - action: Question
        variable: containmentStrategy
        prompt: |
          **Containment Strategy:**
          What containment approach is appropriate?
        options:
          - "Immediate isolation - Critical threat"
          - "Selective containment - Targeted approach"
          - "Monitoring enhancement - Observation mode"
          - "Graduated response - Phased containment"

      - action: SendMessage
        message: |
           **Containment & Mitigation Operations**
          
          **Strategy:** {containmentStrategy}
          
          **Containment Checklist:**
          
          **Immediate Actions (0-15 minutes):**
          [x] Disable compromised user accounts
          [x] Reset passwords for affected accounts
          [x] Revoke active authentication tokens
          [x] Block malicious IP addresses/domains
          [x] Isolate affected network segments
          
          **Short-term Actions (15-60 minutes):**
          [x] Update security rules and policies
          [x] Deploy additional monitoring tools
          [x] Enhance logging for affected systems
          [x] Coordinate with affected system owners
          [x] Preserve evidence for investigation
          
          **Mitigation Measures:**
          [x] Implement compensating controls
          [x] Increase monitoring frequency
          [x] Deploy threat hunting activities
          [x] Update incident response procedures
          [x] Coordinate with external partners (if needed)
          
          **Containment Validation:**
          [x] Verify threat activity has stopped
          [x] Confirm systems are secure
          [x] Test business process continuity
          [x] Document containment effectiveness

  - action: Condition
    condition: incidentPhase == "Investigation & Evidence Collection"
    ifTrue:
      - action: SendMessage
        message: |
           **Investigation & Evidence Collection**
          
          **Forensic Investigation Protocol:**
          
          **Evidence Preservation (Priority 1):**
          [x] Image affected systems and memory
          [x] Preserve authentication and access logs
          [x] Capture network traffic and communications
          [x] Document system configurations and states
          [x] Secure email and file artifacts
          
          **Timeline Analysis:**
          [x] Map incident timeline from initial compromise
          [x] Identify attack vectors and progression
          [x] Correlate events across multiple systems
          [x] Determine scope of unauthorized access
          [x] Assess data or system impact
          
          **Technical Analysis:**
          [x] Analyze malware or attack tools used
          [x] Review privilege escalation methods
          [x] Examine data access and exfiltration
          [x] Investigate lateral movement techniques
          [x] Assess persistence mechanisms
          
          **Attribution & Intelligence:**
          [x] Compare with known threat patterns
          [x] Analyze tactics, techniques, and procedures
          [x] Correlate with external threat intelligence
          [x] Assess threat actor capabilities
          [x] Identify indicators of compromise (IOCs)

      - action: Question
        variable: evidenceStatus
        prompt: |
          **Evidence Collection Status:**
          What is the current status of evidence collection?
        options:
          - "Just starting collection"
          - "In progress - partial evidence"
          - "Complete - ready for analysis"
          - "Need forensic expert assistance"

  - action: Condition
    condition: incidentPhase == "Eradication & Recovery"
    ifTrue:
      - action: SendMessage
        message: |
           **Eradication & Recovery Operations**
          
          **Eradication Phase:**
          
          **Remove Threat Presence:**
          [x] Remove malware and malicious files
          [x] Close unauthorized access points
          [x] Patch vulnerabilities that enabled attack
          [x] Update security configurations
          [x] Remove unauthorized accounts and permissions
          
          **System Hardening:**
          [x] Apply security patches and updates
          [x] Implement additional security controls
          [x] Update security policies and procedures
          [x] Enhance monitoring and detection capabilities
          [x] Strengthen access controls and authentication
          
          **Recovery Phase:**
          
          **System Restoration:**
          [x] Restore systems from clean backups
          [x] Rebuild compromised systems if necessary
          [x] Verify system integrity and security
          [x] Test business process functionality
          [x] Validate security control effectiveness
          
          **Business Continuity:**
          [x] Coordinate gradual service restoration
          [x] Monitor for signs of reinfection
          [x] Communicate with affected stakeholders
          [x] Document recovery procedures and lessons learned
          [x] Prepare for potential threat return

  - action: Condition
    condition: incidentPhase == "Post-Incident Activities"
    ifTrue:
      - action: SendMessage
        message: |
           **Post-Incident Activities**
          
          **Documentation & Reporting:**
          
          **Incident Report Preparation:**
          [x] Compile comprehensive incident timeline
          [x] Document response actions and effectiveness
          [x] Analyze root cause and contributing factors
          [x] Assess financial and operational impact
          [x] Prepare executive summary and detailed report
          
          **Lessons Learned Session:**
          [x] Schedule post-incident review meeting
          [x] Gather feedback from all response team members
          [x] Identify response process improvements
          [x] Update incident response procedures
          [x] Plan additional training or resources needed
          
          **Follow-up Actions:**
          [x] Implement identified security improvements
          [x] Update threat detection capabilities
          [x] Enhance monitoring and alerting rules
          [x] Conduct security awareness training updates
          [x] Schedule follow-up security assessments
          
          **Legal & Compliance:**
          [x] Complete regulatory notifications (if required)
          [x] Prepare legal documentation if needed
          [x] Update compliance and audit records
          [x] Coordinate with insurance and legal teams
          [x] Archive incident documentation appropriately

  - action: Question
    variable: nextPhase
    prompt: |
      **Incident Response Next Steps:**
      What phase should we proceed to next, or do you need assistance with current activities?
    options:
      - "Continue current phase activities"
      - "Advance to next response phase"
      - "Escalate incident severity"
      - "Request additional resources"
      - "Coordinate with external parties"
      - "Complete incident closure"

  - action: SendMessage
    message: |
      [x] **Incident Response Coordination Complete**
      
      **Current Status Summary:**
      - **Phase:** {incidentPhase}
      - **Actions Coordinated:** Response workflow guidance provided
      - **Next Steps:** {nextPhase}
      
      **Key Reminders:**
      1. Maintain continuous communication with all stakeholders
      2. Document all response activities thoroughly
      3. Preserve evidence and maintain chain of custody
      4. Monitor for signs of recurring threats
      5. Schedule post-incident review upon completion
      
      **24/7 Support Resources:**
      - Security Operations Center: Always available
      - Incident Commander: For escalation and coordination
      - Technical Teams: For specialized response support
      - External Partners: For advanced threat analysis
      
      Stay coordinated and maintain response effectiveness!

variables:
  - name: incidentPhase
    type: text
    scope: topic
  - name: detectionSource
    type: text
    scope: topic
  - name: initialIndicators
    type: text
    scope: topic
  - name: incidentSeverity
    type: text
    scope: topic
  - name: incidentCategory
    type: text
    scope: topic
  - name: affectedSystems
    type: text
    scope: topic
  - name: containmentStrategy
    type: text
    scope: topic
  - name: evidenceStatus
    type: text
    scope: topic
  - name: nextPhase
    type: text
    scope: topic
