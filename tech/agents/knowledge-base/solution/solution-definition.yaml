# Copilot Studio Solution Definition — Knowledge Base (Tech)
# Import this into your Power Platform environment to deploy the Knowledge Base
# specialist agent.

schemaVersion: "1.0"
solutionName: TechKnowledgeBase
publisher: Copilot Agent Development
description: >
  Showcase solution for the Knowledge Base agent in the Tech vertical.
  Includes the agent definition, SharePoint knowledge source bindings,
  environment variable declarations, and Power Automate flow references.

environmentVariables:
  - name: KnowledgeBaseSharePointUrl
    displayName: Knowledge Base SharePoint Site URL
    type: string
    description: SharePoint site URL containing IT, HR, and general knowledge libraries.
    defaultValue: ""

  - name: ItPoliciesLibraryUrl
    displayName: IT Policies SharePoint Library URL
    type: string
    description: SharePoint document library URL for IT policies and security standards.
    defaultValue: ""

  - name: HowToGuidesLibraryUrl
    displayName: How-To Guides SharePoint Library URL
    type: string
    description: SharePoint document library URL for how-to guides and tutorials.
    defaultValue: ""

  - name: HrPoliciesLibraryUrl
    displayName: HR Policies SharePoint Library URL
    type: string
    description: SharePoint document library URL for HR policies and procedures.
    defaultValue: ""

  - name: FaqLibraryUrl
    displayName: FAQ SharePoint Library URL
    type: string
    description: SharePoint document library URL for frequently asked questions.
    defaultValue: ""

  - name: EscalationEmail
    displayName: Knowledge Escalation Email
    type: string
    description: Email address for forwarding unanswered knowledge questions.
    defaultValue: ""

components:
  agents:
    - name: KnowledgeBase
      templateFile: ../templates/agent-template.yaml
      knowledgeSources:
        - id: it-policies-sharepoint
          type: sharepoint
          url: "${ItPoliciesLibraryUrl}"
        - id: howto-guides-sharepoint
          type: sharepoint
          url: "${HowToGuidesLibraryUrl}"
        - id: hr-policies-sharepoint
          type: sharepoint
          url: "${HrPoliciesLibraryUrl}"
        - id: faq-sharepoint
          type: sharepoint
          url: "${FaqLibraryUrl}"
        - id: all-knowledge-sharepoint
          type: sharepoint
          url: "${KnowledgeBaseSharePointUrl}"
      authentication:
        type: azure_ad
        tenantRestriction: true

  powerAutomateFlows:
    - name: EscalateKnowledgeQuestion
      description: Forwards an unanswered question to the knowledge team by email.
      trigger: copilot_studio_topic_action
      connector: office365_outlook

connections:
  - connector: sharepoint
    displayName: SharePoint
  - connector: office365_outlook
    displayName: Office 365 Outlook (escalation email)

channels:
  - type: microsoft_teams
    enabled: true
    requireAdminApproval: false
