schemaVersion: 1.0
knowledgeSource:
  key: public-product-library
  name: Public Product Library
  visibility: external-and-internal
  sourceType: sharepoint-document-library
  contentPolicy: public-safe-only
  description: >
    SharePoint document library containing all content approved for external prospect
    consumption. Covers product overviews, feature comparisons, pricing tiers, and
    technical specifications. Separate from internal operational knowledge.
  sharePoint:
    libraryName: PublicProductKnowledge
    siteUrlRef: PublicProductLibrarySiteUrl
    folders:
      - path: product-overviews
        description: High-level product and platform overview documents
      - path: feature-comparisons
        description: Side-by-side feature comparison matrices across product tiers
      - path: pricing-tiers
        description: Published pricing guidance, tier definitions, and packaging summaries
      - path: technical-specifications
        description: Public technical specs, supported integrations, and architecture overviews

sections:
  - id: product-overviews
    title: Product Overviews
    description: Public-safe summaries of each product and platform capability.
    documents:
      - id: platform-overview
        title: Platform Overview
        approvalStatus: approved
        lastReviewed: "2025-10-01"
        content: >
          Our enterprise platform delivers end-to-end automation across sales, service,
          and operations. Core capabilities include workflow orchestration, AI-assisted
          decisioning, native CRM integration, and low-code extensibility. The platform
          scales from SMB pilot deployments to enterprise rollouts with 10,000+ users.
      - id: key-modules
        title: Key Product Modules
        approvalStatus: approved
        lastReviewed: "2025-10-01"
        content: >
          Core modules: Sales Accelerator, Service Desk, Analytics Studio, Integration Hub,
          and Identity and Access Manager. Each module is licensed independently or as part
          of bundled packages. Modules share a common Dataverse data layer and unified
          administration console.

  - id: feature-comparisons
    title: Feature Comparisons
    description: Tier-by-tier capability matrices for prospect evaluation.
    documents:
      - id: feature-matrix-essentials-vs-professional
        title: Essentials vs. Professional Feature Matrix
        approvalStatus: approved
        lastReviewed: "2025-10-15"
        tiers:
          - name: Essentials
            features:
              - Up to 50 named users
              - Core Sales Accelerator
              - Standard CRM connectors (Salesforce, HubSpot, Dynamics 365)
              - Email and Teams channel support
              - Community support tier
              - 99.5 percent uptime SLA
          - name: Professional
            features:
              - Up to 500 named users
              - Full Sales Accelerator plus Analytics Studio
              - Extended connector library (200+ connectors)
              - All channels including custom web chat and mobile
              - Business hours support (9x5)
              - 99.9 percent uptime SLA
              - Dataverse custom tables and advanced workflows
      - id: feature-matrix-professional-vs-enterprise
        title: Professional vs. Enterprise Feature Matrix
        approvalStatus: approved
        lastReviewed: "2025-10-15"
        tiers:
          - name: Professional
            features:
              - Up to 500 named users
              - Standard compliance certifications (ISO 27001, SOC 2 Type II)
              - Self-service onboarding and documentation
              - Standard SLA credits
          - name: Enterprise
            features:
              - Unlimited named users
              - Advanced compliance (FedRAMP Moderate, HIPAA BAA available)
              - Dedicated customer success manager
              - Premier support (24x7)
              - Custom SLA negotiation
              - Private network deployment options
              - SCIM provisioning and advanced RBAC

  - id: pricing-tiers
    title: Pricing Tiers
    description: Published pricing guidance for prospect orientation. Final quotes require engagement with a sales representative.
    documents:
      - id: pricing-overview
        title: Pricing Tier Overview
        approvalStatus: approved
        lastReviewed: "2025-11-01"
        disclaimer: >
          Pricing is indicative. Final pricing depends on user count, contract term,
          add-on modules, and negotiated volume discounts. Contact sales for a formal quote.
        tiers:
          - name: Essentials
            startingPrice: "Contact sales for current pricing"
            billingModel: Per named user, annual subscription
            minimumCommitment: 12 months
            targetSegment: SMB (up to 50 users)
          - name: Professional
            startingPrice: "Contact sales for current pricing"
            billingModel: Per named user, annual subscription
            minimumCommitment: 12 months
            targetSegment: Mid-market (50 to 500 users)
          - name: Enterprise
            startingPrice: Custom pricing
            billingModel: Enterprise agreement, flexible terms
            minimumCommitment: Negotiable
            targetSegment: Enterprise (500+ users)
        addOns:
          - name: Analytics Studio
            note: Available as standalone or bundled with Professional and Enterprise
          - name: Integration Hub Premium
            note: Extended connector library and dedicated iPaaS throughput
          - name: Premier Support
            note: 24x7 named engineer, included in Enterprise

  - id: technical-specifications
    title: Technical Specifications
    description: Public architectural and integration details for technical evaluators.
    documents:
      - id: architecture-overview
        title: Architecture Overview
        approvalStatus: approved
        lastReviewed: "2025-09-01"
        content: >
          Cloud-native SaaS deployed on Microsoft Azure across paired regions.
          Data residency options available for EU, US, and APAC regions.
          Tenants are logically isolated with dedicated Dataverse environments.
          All data encrypted at rest (AES-256) and in transit (TLS 1.2 minimum).
      - id: integration-capabilities
        title: Integration Capabilities
        approvalStatus: approved
        lastReviewed: "2025-09-15"
        content: >
          Native connectors: Salesforce, Microsoft Dynamics 365, HubSpot, SAP,
          ServiceNow, Jira, Zendesk, Slack, Microsoft Teams, and all Power Platform connectors.
          API surface: REST APIs with OpenAPI 3.0 specification, OAuth 2.0 and API key auth.
          Webhook support: Inbound and outbound event streaming.
          Custom connector SDK available for proprietary system integration.
      - id: compliance-certifications
        title: Compliance and Certifications
        approvalStatus: approved
        lastReviewed: "2025-10-01"
        certifications:
          - ISO 27001
          - SOC 2 Type II
          - GDPR compliant (EU data residency available)
          - HIPAA BAA available (Enterprise tier)
          - FedRAMP Moderate (in progress, available Q2 2026)
