schemaVersion: 1.0
solution:
  name: SellerProspectSolution
  displayName: Seller Prospect
  publisher: TechSalesPlatform
  version: 1.0.0
  managed: false
  description: >
    Copilot Studio solution for internal seller enablement and external prospect engagement with Salesforce CRM integration.

environmentVariables:
  - name: SalesforceClientId
    type: string
    required: true
    isSecret: false
    description: Salesforce Connected App client ID.
  - name: SalesforceClientSecret
    type: secret
    required: true
    isSecret: true
    description: Salesforce Connected App client secret.
  - name: SalesforceInstanceUrl
    type: string
    required: true
    isSecret: false
    description: Salesforce instance base URL.
  - name: AzureAdB2cTenantId
    type: string
    required: true
    isSecret: false
    description: Azure AD B2C tenant identifier.
  - name: ProspectWebsiteDomain
    type: string
    required: true
    isSecret: false
    description: Allowed external domain for website channel.

dataverse:
  tables:
    - logicalName: crf_ProspectInteractions
      displayName: ProspectInteractions
      description: Stores inbound prospect chat interactions and qualification context.
      columns:
        - name: crf_interactionid
          type: guid
          required: true
        - name: crf_prospectemail
          type: string
          maxLength: 320
        - name: crf_channel
          type: string
          maxLength: 100
        - name: crf_interactionsummary
          type: multiline
        - name: crf_createdon
          type: datetime
    - logicalName: crf_LeadQualificationScores
      displayName: LeadQualificationScores
      description: Stores BANT scoring outcomes and recommendation status.
      columns:
        - name: crf_scoreid
          type: guid
          required: true
        - name: crf_salesforceleadid
          type: string
          maxLength: 100
        - name: crf_budgetscore
          type: wholeNumber
        - name: crf_authorityscore
          type: wholeNumber
        - name: crf_needscore
          type: wholeNumber
        - name: crf_timelinescore
          type: wholeNumber
        - name: crf_totalbantscore
          type: wholeNumber
        - name: crf_recommendation
          type: string
          maxLength: 100

integrations:
  salesforce:
    connector: power-automate-salesforce
    authType: oauth2
    connectedApp:
      clientIdRef: SalesforceClientId
      clientSecretRef: SalesforceClientSecret
      instanceUrlRef: SalesforceInstanceUrl
      scopes:
        - api
        - refresh_token
    latencyProfile:
      expectedSecondsMin: 2
      expectedSecondsMax: 6
    objects:
      - Lead
      - Opportunity
      - Account
      - Contact
      - Task

powerAutomateFlows:
  - name: GetSalesforceLead
    trigger: When an agent calls the flow
    connectorDependencies:
      - Salesforce
    inputs:
      - leadIdentifier
    outputs:
      - leadRecord
      - statusCode
    timeoutSeconds: 100
  - name: CreateSalesforceLead
    trigger: When an agent calls the flow
    connectorDependencies:
      - Salesforce
      - Dataverse
    inputs:
      - firstName
      - lastName
      - email
      - company
      - budget
      - authority
      - need
      - timeline
      - bantScore
    outputs:
      - salesforceLeadId
      - qualificationStatus
    timeoutSeconds: 100
  - name: GetOpportunityDetails
    trigger: When an agent calls the flow
    connectorDependencies:
      - Salesforce
    inputs:
      - opportunityName
    outputs:
      - stage
      - amount
      - closeDate
      - owner
      - nextStep
      - activityRecencyDays
      - stakeholderCount
    timeoutSeconds: 100
  - name: GetPipelineSummary
    trigger: When an agent calls the flow
    connectorDependencies:
      - Salesforce
    inputs:
      - sellerId
    outputs:
      - stageBreakdown
      - weightedPipeline
      - atRiskDeals
    timeoutSeconds: 100
  - name: ScheduleMeeting
    trigger: When an agent calls the flow
    connectorDependencies:
      - MicrosoftGraph
      - Outlook
    inputs:
      - repUserId
      - prospectEmail
      - preferredWindow
    outputs:
      - proposedSlots
      - meetingDraftStatus
    timeoutSeconds: 100

knowledgeSources:
  - key: public-product-library
    name: Public Product Library
    visibility: external-and-internal
    sourceType: website-or-public-docs
    contentPolicy: public-safe-only
  - key: competitive-intel-library
    name: Competitive Intelligence Library
    visibility: internal-only
    sourceType: sharepoint-or-internal-docs
    contentPolicy: restricted-confidential

authentication:
  internal:
    channel: teams
    provider: entra-id
    ssoEnabled: true
    audience: internal-sales-users
  external:
    channel: webchat
    provider: azure-ad-b2c
    tenantIdRef: AzureAdB2cTenantId
    progressiveAuth: true
    anonymousEntryAllowed: true

channels:
  - name: teams
    mode: internal
    enabled: true
    capabilities:
      - full-crm-actions
      - internal-knowledge
      - rep-coaching
  - name: custom-website
    mode: external
    enabled: true
    domainRef: ProspectWebsiteDomain
    embed:
      scriptType: webchat
      originRestriction: strict
    capabilities:
      - prospect-chat
      - lead-qualification
      - escalation
    restrictions:
      - no-internal-competitive-content
      - no-rep-only-workflows

agentDefinition:
  templatePath: ../templates/agent-template.yaml
  topicCoverage:
    - Greeting
    - Lead Qualification
    - Opportunity Lookup
    - Pipeline Summary
    - Deal Health Check
    - Meeting Scheduler
    - Prospect Chat
    - Competitive Intelligence
    - Escalation
