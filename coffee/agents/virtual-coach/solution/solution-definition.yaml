# Copilot Studio Solution Definition - Virtual Coach (Coffee)

solution:
  name: CoffeeVirtualCoach
  display_name: "Coffee - Virtual Coach"
  version: "1.2.0"
  publisher: Copilot Agent Development
  description: >
    Production-ready SharePoint-centric solution for the Virtual Coach agent.
    Includes agent template, SharePoint knowledge sources, environment variables,
    Power Automate flow references for list operations and approval notifications,
    and structured SharePoint lists for shift scheduling, handover logging,
    equipment inventory, and store contact management.

environment_variables:
  - name: HubSiteUrl
    display_name: Hub Site URL
    type: string
    description: Corporate root hub URL for the coffee chain intranet architecture.
    default_value: ""

  - name: RecipeLibraryUrl
    display_name: Recipe Library URL
    type: string
    description: SharePoint document library URL for approved drink recipes.
    default_value: ""

  - name: HrPolicyLibraryUrl
    display_name: HR Policy Library URL
    type: string
    description: SharePoint document library URL for HR and policy documents.
    default_value: ""

  - name: TrainingLibraryUrl
    display_name: Training Library URL
    type: string
    description: SharePoint document library URL for onboarding and training guides.
    default_value: ""

  - name: OperationsLibraryUrl
    display_name: Operations Library URL
    type: string
    description: SharePoint document library URL for SOPs and store operations guidance.
    default_value: ""

  - name: ShiftScheduleListUrl
    display_name: Shift Schedule List URL
    type: string
    description: SharePoint list URL for the Shift Schedule list used to query and display shift assignments.
    default_value: ""

  - name: HandoverLogListUrl
    display_name: Handover Log List URL
    type: string
    description: SharePoint list URL for the Handover Log list used for shift handover writeback.
    default_value: ""

  - name: EquipmentInventoryListUrl
    display_name: Equipment Inventory List URL
    type: string
    description: SharePoint list URL for the Equipment Inventory list used to query equipment status and service records.
    default_value: ""

  - name: StoreContactDirectoryListUrl
    display_name: Store Contact Directory List URL
    type: string
    description: SharePoint list URL for the Store Contact Directory list used for manager and regional contact lookups.
    default_value: ""

  - name: SeasonalMenuLibraryUrl
    display_name: Seasonal Menu Library URL
    type: string
    description: SharePoint document library URL for seasonal menu updates.
    default_value: ""

  - name: ManagerTeamsChannelId
    display_name: Manager Teams Channel ID
    type: string
    description: Teams channel ID for escalation notifications.
    default_value: ""

components:
  agents:
    - name: VirtualCoach
      template_file: ../templates/agent-template.yaml
      knowledge_sources:
        - id: recipes-library
          type: sharepoint_library
          url: "${RecipeLibraryUrl}"
          metadata_filters:
            - DrinkCategory
            - StoreRegion
            - JobRole
        - id: hr-policy-library
          type: sharepoint_library
          url: "${HrPolicyLibraryUrl}"
          metadata_filters:
            - PolicyType
            - StoreRegion
            - JobRole
        - id: training-library
          type: sharepoint_library
          url: "${TrainingLibraryUrl}"
          metadata_filters:
            - JobRole
            - StoreRegion
        - id: operations-library
          type: sharepoint_library
          url: "${OperationsLibraryUrl}"
          metadata_filters:
            - StoreRegion
            - JobRole
        - id: seasonal-menu-library
          type: sharepoint_library
          url: "${SeasonalMenuLibraryUrl}"
          metadata_filters:
            - DrinkCategory
            - StoreRegion
      data_sources:
        - id: shift-schedule-list
          type: sharepoint_list
          url: "${ShiftScheduleListUrl}"
          columns:
            - name: Store
              type: string
              required: true
            - name: Date
              type: date
              required: true
            - name: Shift
              type: choice
              required: true
              choices:
                - Opening
                - Mid
                - Closing
            - name: Employee
              type: string
              required: true
            - name: Role
              type: choice
              required: true
              choices:
                - Barista
                - Shift Lead
                - Store Manager
                - Trainer
            - name: Status
              type: choice
              required: true
              choices:
                - Scheduled
                - Confirmed
                - Swapped
                - Absent
          list_formatting:
            view_type: color_coded
            status_column: Status
            color_rules:
              - value: Scheduled
                color: blue
              - value: Confirmed
                color: green
              - value: Swapped
                color: orange
              - value: Absent
                color: red

        - id: handover-log-list
          type: sharepoint_list
          url: "${HandoverLogListUrl}"
          columns:
            - name: Store
              type: string
              required: true
            - name: Date
              type: date
              required: true
            - name: FromEmployee
              type: string
              required: true
            - name: ToEmployee
              type: string
              required: true
            - name: CashBalanced
              type: boolean
              required: true
            - name: StockChecked
              type: boolean
              required: true
            - name: Issues
              type: string
              required: false
              multiline: true
            - name: Timestamp
              type: datetime
              required: true
              default_value: now
          list_formatting:
            view_type: color_coded
            status_column: CashBalanced
            color_rules:
              - value: "Yes"
                color: green
              - value: "No"
                color: red

        - id: equipment-inventory-list
          type: sharepoint_list
          url: "${EquipmentInventoryListUrl}"
          columns:
            - name: Store
              type: string
              required: true
            - name: Item
              type: string
              required: true
            - name: SerialNumber
              type: string
              required: true
            - name: LastMaintenance
              type: date
              required: false
            - name: NextService
              type: date
              required: false
            - name: Status
              type: choice
              required: true
              choices:
                - Operational
                - Needs Service
                - Out of Service
                - Under Repair
          list_formatting:
            view_type: color_coded
            status_column: Status
            color_rules:
              - value: Operational
                color: green
              - value: Needs Service
                color: orange
              - value: Out of Service
                color: red
              - value: Under Repair
                color: yellow

        - id: store-contact-directory-list
          type: sharepoint_list
          url: "${StoreContactDirectoryListUrl}"
          columns:
            - name: Store
              type: string
              required: true
            - name: Manager
              type: string
              required: true
            - name: RegionalDirector
              type: string
              required: true
            - name: Phone
              type: string
              required: true
            - name: Email
              type: string
              required: true
      authentication:
        type: azure_ad
        tenant_restriction: true

  power_automate_flows:
    - name: QueryShiftSchedule
      description: Retrieves shift schedule records from the SharePoint Shift Schedule list filtered by store and date.
      trigger: copilot_studio_topic_action
      connector: sharepoint_online

    - name: SaveHandoverLog
      description: Creates a new handover log item in the SharePoint Handover Log list on shift handover submission.
      trigger: copilot_studio_topic_action
      connector: sharepoint_online

    - name: QueryEquipmentInventory
      description: Retrieves equipment records from the SharePoint Equipment Inventory list filtered by store and status.
      trigger: copilot_studio_topic_action
      connector: sharepoint_online

    - name: QueryStoreContactDirectory
      description: Retrieves manager and regional contact details from the SharePoint Store Contact Directory list.
      trigger: copilot_studio_topic_action
      connector: sharepoint_online

    - name: NotifyContentApprovalPending
      description: Sends notifications when SharePoint recipe or policy content enters approval.
      trigger: sharepoint_when_file_created_or_modified
      connector: sharepoint_online
      notifications:
        - connector: microsoft_teams
        - connector: office365_outlook

connections:
  - connector: sharepoint_online
    display_name: SharePoint Online
  - connector: microsoft_teams
    display_name: Microsoft Teams
  - connector: office365_outlook
    display_name: Office 365 Outlook

channels:
  - type: microsoft_teams
    enabled: true
    require_admin_approval: false
  - type: custom_website
    enabled: true
    configuration:
      mobile_optimized: true
