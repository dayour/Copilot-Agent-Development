# Copilot Studio Solution Definition - Virtual Coach (Coffee)

solution:
  name: CoffeeVirtualCoach
  display_name: "Coffee - Virtual Coach"
  version: "1.2.0"
  publisher: Copilot Agent Development
  description: >
    Production-ready SharePoint-centric solution for the Virtual Coach agent.
    Includes agent template, SharePoint knowledge sources, environment variables,
    and Power Automate flow references for list operations and approval notifications.

environment_variables:
  - name: HubSiteUrl
    display_name: Hub Site URL
    type: string
    description: Corporate root hub URL for the coffee chain intranet architecture.
    default_value: ""

  - name: RecipeLibraryUrl
    display_name: Recipe Library URL
    type: string
    description: SharePoint document library URL for approved drink recipes.
    default_value: ""

  - name: HrPolicyLibraryUrl
    display_name: HR Policy Library URL
    type: string
    description: SharePoint document library URL for HR and policy documents.
    default_value: ""

  - name: TrainingLibraryUrl
    display_name: Training Library URL
    type: string
    description: SharePoint document library URL for onboarding and training guides.
    default_value: ""

  - name: OperationsLibraryUrl
    display_name: Operations Library URL
    type: string
    description: SharePoint document library URL for SOPs and store operations guidance.
    default_value: ""

  - name: ShiftHandoverListUrl
    display_name: Shift Handover List URL
    type: string
    description: SharePoint list URL used for shift handover writeback.
    default_value: ""

  - name: StoreDirectoryListUrl
    display_name: Store Directory List URL
    type: string
    description: SharePoint list URL used for store lookup queries.
    default_value: ""

  - name: SeasonalMenuLibraryUrl
    display_name: Seasonal Menu Library URL
    type: string
    description: SharePoint document library URL for seasonal menu updates.
    default_value: ""

  - name: ManagerTeamsChannelId
    display_name: Manager Teams Channel ID
    type: string
    description: Teams channel ID for escalation notifications.
    default_value: ""

  - name: CorporateHubSiteId
    display_name: Corporate Hub Site ID
    type: string
    description: SharePoint site ID of the Corporate Root Hub used for governance scoping.
    default_value: ""

  - name: InformationBarriersEnabled
    display_name: Information Barriers Enabled
    type: bool
    description: >
      Set to true when Microsoft Purview Information Barriers are active for the tenant.
      When enabled, the agent relies on search-level IB filtering to isolate franchise and
      corporate content without additional application-layer filtering.
    default_value: "false"

  - name: DlpComplianceOfficerEmail
    display_name: DLP Compliance Officer Email
    type: string
    description: >
      Email address of the compliance officer who receives DLP incident reports for
      cross-franchise-corporate sharing violations.
    default_value: ""

  - name: SensitivityLabelIdHrConfidential
    display_name: Sensitivity Label ID - Confidential HR
    type: string
    description: >
      Microsoft Purview sensitivity label GUID for the Confidential - HR label applied
      to general HR policy documents. Used to verify label coverage during deployment
      validation.
    default_value: ""

  - name: SensitivityLabelIdDisciplinary
    display_name: Sensitivity Label ID - Confidential Disciplinary
    type: string
    description: >
      Microsoft Purview sensitivity label GUID for the Confidential - Disciplinary label
      applied to disciplinary procedure documents. Used to verify label coverage during
      deployment validation.
    default_value: ""

  - name: SensitivityLabelIdPayroll
    display_name: Sensitivity Label ID - Confidential Payroll
    type: string
    description: >
      Microsoft Purview sensitivity label GUID for the Confidential - Payroll label applied
      to payroll guides. Used to verify label coverage during deployment validation.
    default_value: ""

components:
  agents:
    - name: VirtualCoach
      template_file: ../templates/agent-template.yaml
      knowledge_sources:
        - id: recipes-library
          type: sharepoint_library
          url: "${RecipeLibraryUrl}"
          metadata_filters:
            - DrinkCategory
            - StoreRegion
            - JobRole
        - id: hr-policy-library
          type: sharepoint_library
          url: "${HrPolicyLibraryUrl}"
          metadata_filters:
            - PolicyType
            - StoreRegion
            - JobRole
          permission_trimming: delegated_user_identity
          sensitivity_label_enforcement: true
        - id: training-library
          type: sharepoint_library
          url: "${TrainingLibraryUrl}"
          metadata_filters:
            - JobRole
            - StoreRegion
        - id: operations-library
          type: sharepoint_library
          url: "${OperationsLibraryUrl}"
          metadata_filters:
            - StoreRegion
            - JobRole
        - id: seasonal-menu-library
          type: sharepoint_library
          url: "${SeasonalMenuLibraryUrl}"
          metadata_filters:
            - DrinkCategory
            - StoreRegion
      data_sources:
        - id: shift-handover-list
          type: sharepoint_list
          url: "${ShiftHandoverListUrl}"
        - id: store-directory-list
          type: sharepoint_list
          url: "${StoreDirectoryListUrl}"
      authentication:
        type: azure_ad
        tenant_restriction: true
        identity_mode: delegated_user
        service_account_knowledge_retrieval: false

  governance_controls:
    security_groups:
      provisioning_source: entra_id_lifecycle_workflows
      group_tiers:
        - tier: corporate_function
          pattern: "sg-coffee-corporate-{function}"
          examples:
            - sg-coffee-corporate-hr
            - sg-coffee-corporate-finance
            - sg-coffee-corporate-legal
            - sg-coffee-corporate-ops
            - sg-coffee-corporate-training
            - sg-coffee-corporate-readonly
        - tier: regional
          pattern: "sg-coffee-region-{region-code}-{role}"
          examples:
            - sg-coffee-region-na-east-mgrs
            - sg-coffee-region-na-east-ops
            - sg-coffee-region-na-east-readonly
        - tier: store
          pattern: "sg-coffee-store-{store-number}-{role}"
          examples:
            - sg-coffee-store-00142-managers
            - sg-coffee-store-00142-leads
            - sg-coffee-store-00142-baristas
        - tier: ownership
          pattern: "sg-coffee-ownership-{type}"
          examples:
            - sg-coffee-ownership-franchise
            - sg-coffee-ownership-corporate

    information_barriers:
      enabled: "${InformationBarriersEnabled}"
      segments:
        - name: CoffeeFranchise
          group: sg-coffee-ownership-franchise
        - name: CoffeeCorporate
          group: sg-coffee-ownership-corporate
      policies:
        - name: Block-Franchise-Corporate
          assigned_segment: CoffeeFranchise
          segments_blocked:
            - CoffeeCorporate
        - name: Block-Corporate-Franchise
          assigned_segment: CoffeeCorporate
          segments_blocked:
            - CoffeeFranchise

    sensitivity_labels:
      - label: Confidential - HR
        label_id: "${SensitivityLabelIdHrConfidential}"
        applied_to: hr-policy-library
        content_types:
          - HrPolicy
      - label: Confidential - Disciplinary
        label_id: "${SensitivityLabelIdDisciplinary}"
        applied_to: hr-policy-library
        content_types:
          - DisciplinaryRecord
      - label: Confidential - Payroll
        label_id: "${SensitivityLabelIdPayroll}"
        applied_to: hr-policy-library
        content_types:
          - PayrollGuide

    dlp_policies:
      - name: DLP-Coffee-PayrollContentRestriction
        scope: sensitivity_label
        label: Confidential - Payroll
        action: block_access
        authorized_groups:
          - sg-coffee-corporate-finance
          - sg-coffee-corporate-hr
      - name: DLP-Coffee-DisciplinaryContentRestriction
        scope: sensitivity_label
        label: Confidential - Disciplinary
        action: block_access
        authorized_groups:
          - sg-coffee-corporate-hr
          - sg-coffee-corporate-legal
          - store_managers_dynamic
      - name: DLP-Coffee-FranchiseCorporateBarrier
        scope: all_coffee_sites
        action: block_sharing
        incident_report_recipient: "${DlpComplianceOfficerEmail}"
        override_allowed: true
        override_requires_justification: true

  power_automate_flows:
    - name: SaveShiftHandoverToSharePoint
      description: Creates a new item in the SharePoint shift handover list from topic submission.
      trigger: copilot_studio_topic_action
      connector: sharepoint_online

    - name: QueryStoreDirectory
      description: Retrieves store metadata from SharePoint store directory list.
      trigger: copilot_studio_topic_action
      connector: sharepoint_online

    - name: NotifyContentApprovalPending
      description: Sends notifications when SharePoint recipe or policy content enters approval.
      trigger: sharepoint_when_file_created_or_modified
      connector: sharepoint_online
      notifications:
        - connector: microsoft_teams
        - connector: office365_outlook

connections:
  - connector: sharepoint_online
    display_name: SharePoint Online
  - connector: microsoft_teams
    display_name: Microsoft Teams
  - connector: office365_outlook
    display_name: Office 365 Outlook

channels:
  - type: microsoft_teams
    enabled: true
    require_admin_approval: false
  - type: custom_website
    enabled: true
    configuration:
      mobile_optimized: true
