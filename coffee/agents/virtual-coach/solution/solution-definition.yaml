# Copilot Studio Solution Definition - Virtual Coach (Coffee)

solution:
  name: CoffeeVirtualCoach
  display_name: "Coffee - Virtual Coach"
  version: "1.2.0"
  publisher: Copilot Agent Development
  description: >
    Production-ready SharePoint-centric solution for the Virtual Coach agent.
    Includes agent template, SharePoint knowledge sources, environment variables,
    and Power Automate flow references for list operations and approval notifications.

environment_variables:
  - name: HubSiteUrl
    display_name: Hub Site URL
    type: string
    description: Corporate root hub URL for the coffee chain intranet architecture.
    default_value: ""

  - name: RecipeLibraryUrl
    display_name: Recipe Library URL
    type: string
    description: SharePoint document library URL for approved drink recipes.
    default_value: ""

  - name: HrPolicyLibraryUrl
    display_name: HR Policy Library URL
    type: string
    description: SharePoint document library URL for HR and policy documents.
    default_value: ""

  - name: TrainingLibraryUrl
    display_name: Training Library URL
    type: string
    description: SharePoint document library URL for onboarding and training guides.
    default_value: ""

  - name: OperationsLibraryUrl
    display_name: Operations Library URL
    type: string
    description: SharePoint document library URL for SOPs and store operations guidance.
    default_value: ""

  - name: ShiftHandoverListUrl
    display_name: Shift Handover List URL
    type: string
    description: SharePoint list URL used for shift handover writeback.
    default_value: ""

  - name: StoreDirectoryListUrl
    display_name: Store Directory List URL
    type: string
    description: SharePoint list URL used for store lookup queries.
    default_value: ""

  - name: SeasonalMenuLibraryUrl
    display_name: Seasonal Menu Library URL
    type: string
    description: SharePoint document library URL for seasonal menu updates.
    default_value: ""

  - name: ManagerTeamsChannelId
    display_name: Manager Teams Channel ID
    type: string
    description: Teams channel ID for escalation notifications.
    default_value: ""

  - name: TrainingLeadEmail
    display_name: Training Lead Email
    type: string
    description: Email address of the Training Lead who reviews recipe approval requests.
    default_value: ""

  - name: LegalTeamEmail
    display_name: Legal Team Email
    type: string
    description: Email address of the Legal team reviewer for policy update approvals.
    default_value: ""

  - name: ComplianceTeamEmail
    display_name: Compliance Team Email
    type: string
    description: Email address of the Compliance team sign-off for policy update approvals.
    default_value: ""

  - name: RegionalManagerEmail
    display_name: Regional Manager Email
    type: string
    description: Email address of the Regional Manager who approves training materials.
    default_value: ""

  - name: CopilotStudioAdminEmail
    display_name: Copilot Studio Admin Email
    type: string
    description: Email address of the Copilot Studio administrator notified on bulk content changes.
    default_value: ""

  - name: BulkChangeThreshold
    display_name: Bulk Change Threshold
    type: integer
    description: Number of content items changed within one hour that triggers an admin notification for manual knowledge source validation.
    default_value: 5

components:
  agents:
    - name: VirtualCoach
      template_file: ../templates/agent-template.yaml
      knowledge_sources:
        - id: recipes-library
          type: sharepoint_library
          url: "${RecipeLibraryUrl}"
          metadata_filters:
            - DrinkCategory
            - StoreRegion
            - JobRole
        - id: hr-policy-library
          type: sharepoint_library
          url: "${HrPolicyLibraryUrl}"
          metadata_filters:
            - PolicyType
            - StoreRegion
            - JobRole
        - id: training-library
          type: sharepoint_library
          url: "${TrainingLibraryUrl}"
          metadata_filters:
            - JobRole
            - StoreRegion
        - id: operations-library
          type: sharepoint_library
          url: "${OperationsLibraryUrl}"
          metadata_filters:
            - StoreRegion
            - JobRole
        - id: seasonal-menu-library
          type: sharepoint_library
          url: "${SeasonalMenuLibraryUrl}"
          metadata_filters:
            - DrinkCategory
            - StoreRegion
      data_sources:
        - id: shift-handover-list
          type: sharepoint_list
          url: "${ShiftHandoverListUrl}"
        - id: store-directory-list
          type: sharepoint_list
          url: "${StoreDirectoryListUrl}"
      authentication:
        type: azure_ad
        tenant_restriction: true

  power_automate_flows:
    - name: SaveShiftHandoverToSharePoint
      description: Creates a new item in the SharePoint shift handover list from topic submission.
      trigger: copilot_studio_topic_action
      connector: sharepoint_online

    - name: QueryStoreDirectory
      description: Retrieves store metadata from SharePoint store directory list.
      trigger: copilot_studio_topic_action
      connector: sharepoint_online

    - name: NotifyContentApprovalPending
      description: Sends notifications when SharePoint recipe or policy content enters approval.
      trigger: sharepoint_when_file_created_or_modified
      connector: sharepoint_online
      notifications:
        - connector: microsoft_teams
        - connector: office365_outlook

    - name: RecipeApprovalFlow
      description: >
        Manages the recipe approval lifecycle. When an author creates or updates a document
        in recipes-library with approval status Pending, the flow sends an approval request
        to the Training Lead. On approval, the document status is set to Approved and the
        Copilot Studio knowledge source for recipes-library is refreshed. On rejection,
        the author is notified with reviewer comments. Maintains version history in SharePoint
        major/minor versioning. Triggers an admin notification when five or more recipe items
        change approval status within one hour.
      trigger: sharepoint_when_file_created_or_modified
      library: "${RecipeLibraryUrl}"
      connector: sharepoint_online
      approval_steps:
        - step: 1
          reviewer_env_var: TrainingLeadEmail
          role: Training Lead
          action_on_approve: publish_major_version
          action_on_reject: notify_author_with_comments
      post_approval_actions:
        - type: refresh_knowledge_source
          knowledge_source_id: recipes-library
        - type: update_content_metadata
          field: ApprovalStatus
          value: Approved
      version_tracking:
        enabled: true
        strategy: sharepoint_major_minor_versioning
      bulk_change_notification:
        threshold_env_var: BulkChangeThreshold
        window_minutes: 60
        notify_env_var: CopilotStudioAdminEmail
        connector: office365_outlook

    - name: PolicyUpdateFlow
      description: >
        Manages the policy update approval lifecycle. When HR submits a new or revised
        document to hr-policy-library, the flow routes an approval request to Legal. On
        Legal approval, a second approval request is sent to the Compliance team. Only after
        both approvals does the flow promote the document to a major version, set approval
        status to Approved, and auto-refresh the Copilot Studio knowledge source for
        hr-policy-library. Rejection at either stage notifies the author with comments.
        Maintains full version history. Triggers an admin notification when five or more
        policy items change approval status within one hour.
      trigger: sharepoint_when_file_created_or_modified
      library: "${HrPolicyLibraryUrl}"
      connector: sharepoint_online
      approval_steps:
        - step: 1
          reviewer_env_var: LegalTeamEmail
          role: Legal
          action_on_approve: proceed_to_next_step
          action_on_reject: notify_author_with_comments
        - step: 2
          reviewer_env_var: ComplianceTeamEmail
          role: Compliance
          action_on_approve: publish_major_version
          action_on_reject: notify_author_with_comments
      post_approval_actions:
        - type: refresh_knowledge_source
          knowledge_source_id: hr-policy-library
        - type: update_content_metadata
          field: ApprovalStatus
          value: Approved
      version_tracking:
        enabled: true
        strategy: sharepoint_major_minor_versioning
      bulk_change_notification:
        threshold_env_var: BulkChangeThreshold
        window_minutes: 60
        notify_env_var: CopilotStudioAdminEmail
        connector: office365_outlook

    - name: TrainingMaterialFlow
      description: >
        Manages the training material approval lifecycle. When an author submits a new or
        updated document to training-library, the flow sends an approval request to the
        Regional Manager. On approval, the document is promoted to a major version, tagged
        with the appropriate JobRole and StoreRegion metadata for role-based delivery, and
        the Copilot Studio knowledge source for training-library is refreshed. On rejection,
        the author is notified with comments. Maintains version history. Triggers an admin
        notification when five or more training items change approval status within one hour.
      trigger: sharepoint_when_file_created_or_modified
      library: "${TrainingLibraryUrl}"
      connector: sharepoint_online
      approval_steps:
        - step: 1
          reviewer_env_var: RegionalManagerEmail
          role: Regional Manager
          action_on_approve: publish_major_version
          action_on_reject: notify_author_with_comments
      post_approval_actions:
        - type: refresh_knowledge_source
          knowledge_source_id: training-library
        - type: update_content_metadata
          field: ApprovalStatus
          value: Approved
        - type: apply_role_based_tags
          metadata_fields:
            - JobRole
            - StoreRegion
      version_tracking:
        enabled: true
        strategy: sharepoint_major_minor_versioning
      bulk_change_notification:
        threshold_env_var: BulkChangeThreshold
        window_minutes: 60
        notify_env_var: CopilotStudioAdminEmail
        connector: office365_outlook

connections:
  - connector: sharepoint_online
    display_name: SharePoint Online
  - connector: microsoft_teams
    display_name: Microsoft Teams
  - connector: office365_outlook
    display_name: Office 365 Outlook

channels:
  - type: microsoft_teams
    enabled: true
    require_admin_approval: false
  - type: custom_website
    enabled: true
    configuration:
      mobile_optimized: true
