# Copilot Studio Agent Template - Virtual Coach (Coffee)

agent:
  name: Virtual Coach
  description: >
    A SharePoint-native virtual coach for coffee store teams.
    Supports recipes, policies, training, operations, store lookup, shift scheduling,
    shift handover logging, equipment inventory, and store contact directory.
  language: en-US
  fallback_message: >
    I could not match that request yet. I can search recipes, policies, training guides,
    operations procedures, store details, shift schedules, equipment status, or help with shift handover.

topics:
  - name: Greeting
    trigger_phrases:
      - hi
      - hello coach
      - can you help me
      - quick question
      - i need help on shift
    messages:
      - text: >
          Hi. I am your Virtual Coach. I can help with recipes, HR policy, training steps,
          store operations, menu updates, and shift handover.
    quick_replies:
      - Drink recipes
      - HR and policy
      - Training help
      - Store operations
      - Shift schedule
      - Shift handover
      - Equipment status
      - Store contacts
      - Menu updates

  - name: Drink Recipes
    trigger_phrases:
      - how do i make a {drink}
      - recipe for {drink}
      - what are the steps for {drink}
      - what goes in {drink}
      - how many shots in a {drink}
    entities:
      - name: drink
        type: string
        prompt: Which drink do you need?
    actions:
      - type: knowledge_search
        query: "recipe preparation steps ingredients {drink}"
        source: recipes-library
    fallback_message: >
      I could not find that recipe in the approved recipe library. Check spelling or ask your shift lead.

  - name: HR and Policy
    trigger_phrases:
      - what is the break policy
      - how do i request time off
      - what is the dress code
      - can i swap shifts
      - where is the attendance policy
    actions:
      - type: knowledge_search
        query: "{user_input}"
        source: hr-policy-library
    fallback_message: >
      I could not find that policy in the HR library. I can connect you to your manager if needed.

  - name: Onboarding and Training
    trigger_phrases:
      - i am new where do i start
      - show me training for espresso station
      - onboarding checklist
      - training for opening shift
      - how do i complete my training
    actions:
      - type: knowledge_search
        query: "{user_input}"
        source: training-library
    fallback_message: >
      I could not find a matching training guide. Try a specific station or task name.

  - name: Store Operations
    trigger_phrases:
      - opening checklist
      - closing checklist
      - what is the cleaning procedure
      - what do i do for equipment issue
      - standard operating procedure for rush hour
    actions:
      - type: knowledge_search
        query: "{user_input}"
        source: operations-library
    fallback_message: >
      I could not find that operations procedure in the current operations library.

  - name: Menu Update
    trigger_phrases:
      - what is new on the menu
      - seasonal drinks this week
      - what drinks are discontinued
      - latest menu change
      - promo drink instructions
    actions:
      - type: knowledge_search
        query: "{user_input}"
        source: seasonal-menu-library
    fallback_message: >
      I could not find a current menu update. Please check with regional operations.

  - name: Store Lookup
    trigger_phrases:
      - who is the manager for store {store_number}
      - store {store_number} phone number
      - what region is store {store_number}
      - give me details for store {store_number}
      - lookup store {store_number}
    entities:
      - name: store_number
        type: string
        prompt: What is the store number?
    actions:
      - type: sharepoint_list_query
        list: store-contact-directory-list
        filter: "Store eq '{store_number}'"
        select:
          - Store
          - Manager
          - RegionalDirector
          - Phone
          - Email
    messages:
      - text: >
          I found the store contact details in the directory. Let me know if you want manager or regional director details only.

  - name: Shift Handover
    trigger_phrases:
      - start handover
      - end of shift handover
      - handover checklist
      - log shift notes
      - submit handover
    messages:
      - text: >
          Let us complete your shift handover. Fill out the checklist and I will save it to the store handover log.
    adaptive_card:
      title: Shift Handover Checklist
      fields:
        - id: store
          label: Store
          type: text
        - id: shift_date
          label: Shift date
          type: date
        - id: from_employee
          label: Handing over from
          type: text
        - id: to_employee
          label: Handing over to
          type: text
        - id: cash_balanced
          label: Cash drawer balanced
          type: boolean
        - id: stock_checked
          label: Stock checked and updated
          type: boolean
        - id: issues
          label: Issues to hand over
          type: text
          multiline: true
    submit_action:
      type: sharepoint_list_create_item
      list: handover-log-list
      fields:
        Store: "{store}"
        Date: "{shift_date}"
        FromEmployee: "{from_employee}"
        ToEmployee: "{to_employee}"
        CashBalanced: "{cash_balanced}"
        StockChecked: "{stock_checked}"
        Issues: "{issues}"
        Timestamp: now
    completion_message: >
      Your handover has been saved to the handover log and is available for the next shift lead.

  - name: Shift Schedule
    trigger_phrases:
      - show my shift schedule
      - who is working today at store {store_number}
      - what shift am i on
      - schedule for store {store_number} on {shift_date}
      - who is on the opening shift
    entities:
      - name: store_number
        type: string
        prompt: What is the store number?
      - name: shift_date
        type: date
        prompt: What date do you want to check?
    actions:
      - type: sharepoint_list_query
        list: shift-schedule-list
        filter: "Store eq '{store_number}' and Date eq '{shift_date}'"
        select:
          - Store
          - Date
          - Shift
          - Employee
          - Role
          - Status
    messages:
      - text: >
          Here are the scheduled shifts for that store and date. Status is color-coded: Confirmed is green, Scheduled is blue, Swapped is orange, and Absent is red.
    fallback_message: >
      I could not find shift schedule records for that store or date. Check the store number and date and try again.

  - name: Equipment Inventory
    trigger_phrases:
      - what is the status of the espresso machine
      - equipment needing service at store {store_number}
      - when is next service for {item}
      - show equipment inventory
      - any equipment out of service
    entities:
      - name: store_number
        type: string
        prompt: What is the store number?
      - name: item
        type: string
        prompt: Which equipment item do you need?
    actions:
      - type: sharepoint_list_query
        list: equipment-inventory-list
        filter: "Store eq '{store_number}'"
        select:
          - Store
          - Item
          - SerialNumber
          - LastMaintenance
          - NextService
          - Status
    messages:
      - text: >
          Here is the equipment inventory for that store. Status is color-coded: Operational is green, Needs Service is orange, Out of Service is red, and Under Repair is yellow.
    fallback_message: >
      I could not find equipment records for that store. Check the store number and try again.

  - name: Performance Tips
    trigger_phrases:
      - give me a coaching tip
      - how can i improve today
      - customer service advice
      - speed of service tip
      - quality tip for baristas
    messages:
      - text: >
          Coaching tip: during peak periods, repeat the order back clearly before payment and group drinks by queue sequence to reduce remakes.

  - name: Escalation
    trigger_phrases:
      - i need a manager
      - connect me to support
      - i need human help
      - escalate this issue
      - talk to operations lead
    messages:
      - text: >
          Understood. I will notify the manager channel now. Share any urgent details so I can include them.
    actions:
      - type: send_teams_notification
        channel: "{manager_teams_channel_id}"
        message: "Employee {employee_name} requested assistance."
