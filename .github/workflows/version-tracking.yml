name: Version Tracking and Changelog Automation

on:
  push:
    branches:
      - main
    paths:
      - "clothing/agents/**"
      - "coffee/agents/**"
      - "insurance/agents/**"
      - "tech/agents/**"
      - "transportation/agents/**"

jobs:
  update-versions:
    name: Update agent versions and changelogs
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run version update script
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: python .github/scripts/update-versions.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version-manifest.json
          git add "*/agents/*/CHANGELOG.md"
          git add "*/agents/*/solution/solution-definition.yaml"
          if git diff --cached --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "chore: update version manifest and changelogs [skip ci]"
            git push
          fi
