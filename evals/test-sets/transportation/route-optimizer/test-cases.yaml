# Test cases for transportation/route-optimizer agent
# Covers route optimization queries, ETA calculations, and distance queries.
#
# Tiers:
#   critical   -- route optimization and distance facts that must always be present
#   functional -- ETA and route planning queries graded by LLM judge

- id: trans-ro-crit-001
  tier: critical
  query: "What is the optimal route from the main depot to the Northside delivery zone?"
  expected_keywords:
    - route
    - optimal
    - depot
    - Northside
  grader: keyword_match
  pass_threshold: 1.0
  context: >
    The route optimizer agent calculates optimal delivery routes using real-time
    traffic data and vehicle capacity constraints. Routes are optimized for
    minimum travel time or minimum fuel consumption depending on the objective.
  description: >
    Verifies that the agent returns a response addressing route optimization
    with the specified origin and destination.

- id: trans-ro-crit-002
  tier: critical
  query: "What is the estimated travel time between the warehouse and the Eastpark distribution center?"
  expected_keywords:
    - travel time
    - warehouse
    - Eastpark
    - estimated
  grader: keyword_match
  pass_threshold: 1.0
  context: >
    The route optimizer agent provides estimated travel times using routing API
    data. Times account for current traffic conditions and time of day.
  description: >
    Verifies that the agent provides an ETA response referencing both endpoints
    and the estimated travel time concept.

- id: trans-ro-crit-003
  tier: critical
  query: "How many stops does the standard morning delivery route include?"
  expected_keywords:
    - stops
    - route
    - morning
    - delivery
  grader: keyword_match
  pass_threshold: 1.0
  context: >
    The route optimizer agent manages scheduled delivery routes. The standard
    morning route includes a defined set of stops loaded from the routing
    configuration.
  description: >
    Verifies that the agent correctly references stop count and route context
    for the morning delivery schedule.

- id: trans-ro-crit-004
  tier: critical
  query: "What is the total distance in miles for route RT-042?"
  expected_keywords:
    - distance
    - miles
    - RT-042
    - route
  grader: keyword_match
  pass_threshold: 1.0
  context: >
    The route optimizer agent can retrieve route details by route ID. Route IDs
    follow the format RT-XXX. Distance is stored in the routing API for each
    configured route.
  description: >
    Verifies that the agent handles a route-specific distance query by route ID.

- id: trans-ro-func-001
  tier: functional
  query: "Traffic is heavy on Highway 7 this morning. Can you suggest an alternative route for the southern delivery zone?"
  expected_keywords:
    - alternative
    - route
    - southern
    - traffic
  grader: llm_judge
  dimensions:
    - groundedness
    - completeness
    - relevance
    - safety
    - tone
  pass_threshold: 0.7
  context: >
    The route optimizer agent dynamically adjusts routes based on real-time
    traffic conditions. When a primary route is congested, the agent can
    propose alternative routes with comparative travel time estimates.
  description: >
    Tests that the agent responds appropriately to a dynamic re-routing request
    caused by traffic conditions and proposes a plausible alternative.

- id: trans-ro-func-002
  tier: functional
  query: "We have a new stop added at 450 Commerce Boulevard. How does this affect the current route timing?"
  expected_keywords:
    - stop
    - Commerce
    - timing
    - route
  grader: llm_judge
  dimensions:
    - groundedness
    - completeness
    - relevance
    - tone
  pass_threshold: 0.7
  context: >
    The route optimizer agent can recalculate route timing when stops are added
    or removed. Adding a stop requires updating the routing configuration and
    recomputing travel time estimates for the affected route segment.
  description: >
    Tests that the agent handles a route modification request by acknowledging
    the new stop and explaining the timing impact calculation process.

- id: trans-ro-func-003
  tier: functional
  query: "What is the fuel cost estimate for a round trip from the depot to the Central Business District?"
  expected_keywords:
    - fuel
    - cost
    - estimate
    - round trip
  grader: llm_judge
  dimensions:
    - groundedness
    - completeness
    - relevance
    - tone
  pass_threshold: 0.7
  context: >
    The route optimizer agent can estimate fuel cost for a route by combining
    distance data with the fleet average miles-per-gallon figure and current
    fuel price from the fuel tracking system.
  description: >
    Tests that the agent provides a fuel cost estimate by combining route
    distance, vehicle efficiency, and fuel pricing data.

- id: trans-ro-func-004
  tier: functional
  query: "Which delivery routes have the highest average delay and what is causing it?"
  expected_keywords:
    - delay
    - routes
    - average
    - cause
  grader: llm_judge
  dimensions:
    - groundedness
    - completeness
    - relevance
    - tone
  pass_threshold: 0.7
  context: >
    The route optimizer agent analyzes historical route performance data to
    identify patterns of delay. Common delay causes include traffic congestion,
    long dwell times at stops, vehicle breakdowns, and inaccurate time estimates.
  description: >
    Tests that the agent provides a grounded analysis of route delays and their
    contributing factors with actionable improvement suggestions.

- id: trans-ro-crit-005
  tier: critical
  query: "Optimize tomorrow's deliveries for driver Smith"
  expected_keywords:
    - driver
    - Smith
    - optimize
    - deliveries
  grader: keyword_match
  pass_threshold: 1.0
  context: >
    The route optimizer agent can fetch unscheduled orders for a specific driver
    from the order management system, apply vehicle and driver constraints, and
    return an optimized stop sequence with a map link and estimated schedule.
  description: >
    Verifies that the agent handles a driver-specific order-based delivery
    optimization request and references the driver name and optimization context.

- id: trans-ro-crit-006
  tier: critical
  query: "What if I add a stop at 123 Main St to route RT-055?"
  expected_keywords:
    - stop
    - 123 Main St
    - route
    - RT-055
  grader: keyword_match
  pass_threshold: 1.0
  context: >
    The route optimizer agent supports what-if analysis: it can recalculate an
    optimized route with a proposed additional stop and show the impact on total
    time and per-stop ETAs without committing the change. The dispatcher can then
    accept or reject the modification.
  description: >
    Verifies that the agent acknowledges the proposed stop address and route ID
    for a what-if analysis scenario.

- id: trans-ro-func-005
  tier: functional
  query: "What if I add a stop at 450 Oak Avenue to route RT-030? Show me the time impact and let me decide."
  expected_keywords:
    - stop
    - Oak Avenue
    - time
    - impact
  grader: llm_judge
  dimensions:
    - groundedness
    - completeness
    - relevance
    - tone
  pass_threshold: 0.7
  context: >
    The what-if route analysis topic recalculates an optimized route with a
    proposed additional stop without persisting the change. It presents the
    impact on total travel time and affected stop ETAs and asks the dispatcher
    to accept or reject the modification.
  description: >
    Tests that the agent describes the what-if analysis process, mentions time
    impact, and offers the dispatcher a choice to accept or reject the change.

- id: trans-ro-crit-007
  tier: critical
  query: "Compare route RT-010 vs route RT-011"
  expected_keywords:
    - compare
    - RT-010
    - RT-011
    - route
  grader: keyword_match
  pass_threshold: 1.0
  context: >
    The route comparison topic produces a side-by-side metrics comparison of two
    routes including total distance, total time, number of stops, fuel cost
    estimate, and on-time delivery probability.
  description: >
    Verifies that the agent identifies both route IDs and the comparison intent.

- id: trans-ro-func-006
  tier: functional
  query: "Compare route RT-021 and RT-022. Which one has a lower fuel cost and better on-time probability?"
  expected_keywords:
    - compare
    - fuel cost
    - on-time
    - route
  grader: llm_judge
  dimensions:
    - groundedness
    - completeness
    - relevance
    - tone
  pass_threshold: 0.7
  context: >
    The route comparison topic retrieves metrics for two routes and returns a
    structured side-by-side view with total distance, total time, stop count,
    estimated fuel cost, and on-time delivery probability. The agent should
    highlight which route performs better on the requested dimensions.
  description: >
    Tests that the agent can compare two routes on fuel cost and on-time delivery
    probability and provide a recommendation based on the metrics.
