agent:
  name: Route Optimization Scheduler
  vertical: Transportation
  version: 1.0.0
  orchestration_mode: generative
  channels:
    - teams
    - mobile_web_chat
  primary_users:
    - fleet_manager
    - dispatcher
    - driver
  global_variables:
    - name: Global.UserRole
      type: string
    - name: Global.DefaultFleet
      type: string
    - name: Global.RerouteDelayThresholdMinutes
      type: number
      default: 30
    - name: Global.HosDailyLimitHours
      type: number
      default: 11
    - name: Global.HosWeeklyLimitHours
      type: number
      default: 60
    - name: Global.HosApproachingAlertThresholdHours
      type: number
      default: 2

topics:
  - name: Greeting
    description: Greets users and adapts opening guidance for fleet managers, dispatchers, and drivers.
    trigger:
      mode: generative
      trigger_phrases:
        - hi
        - hello
        - start route optimizer
        - open route scheduler
        - help with routes
    nodes:
      - type: set_variable
        id: detectRole
        variable: Global.UserRole
        value: =Coalesce(User.Role, "driver")
      - type: condition
        id: roleRoute
        branches:
          - condition: =Global.UserRole = "fleet_manager"
            actions:
              - type: message
                text: "Welcome. I can optimize multi-stop routes, check driver availability, and monitor on-time performance."
          - condition: =Global.UserRole = "dispatcher"
            actions:
              - type: message
                text: "Welcome. I can sequence your stops, assign drivers, and alert you to traffic delays in real time."
          - condition: =Global.UserRole = "driver"
            actions:
              - type: message
                text: "Welcome. I can show your route, current ETA, and notify dispatch if you need a re-route."
        else_actions:
          - type: message
            text: "Welcome to Route Optimization Scheduler. Tell me what routing question you want to solve."
      - type: message
        text: "Try: 'Optimize my stops for today', 'ETA for route R-1042', or 'Re-route truck T-501 around I-40'."

  - name: Route Optimization
    description: Accepts a list of stops with time windows and returns an optimized visit sequence that minimizes total travel time.
    trigger:
      mode: classic
      trigger_phrases:
        - optimize my stops
        - best stop sequence for today
        - plan my route
        - optimize route for driver
        - sequence stops for delivery
    inputs:
      - name: route_id
        type: string
        required: false
      - name: stops
        type: string
        required: false
    nodes:
      - type: question
        id: askRouteId
        prompt: "What route ID or list of stops should I optimize?"
        variable: Topic.route_id
        entity: Text
      - type: tool
        id: optimizeRoute
        tool_name: OptimizeRoute
        input_mapping:
          routeId: =Topic.route_id
          stops: =Topic.stops
      - type: message
        text: |-
          Optimized route for {Topic.route_id}:
          - Stop sequence: {Topic.OptimizedSequence}
          - Estimated total travel time: {Topic.TotalTravelTime}
          - Time windows respected: {Topic.TimeWindowsRespected}
          - Optimization savings vs original: {Topic.TimeSavingsMinutes} minutes
      - type: adaptive_card
        title: Route Optimization Result
        body:
          - text: "Stop-by-stop breakdown: {Topic.StopBreakdownTable}"
          - text: "All time windows satisfied: {Topic.TimeWindowsRespected}"

  - name: ETA Calculation
    description: Returns a real-time estimated time of arrival for a vehicle based on current GPS position and live traffic data.
    trigger:
      mode: classic
      trigger_phrases:
        - what is the eta for truck
        - when will driver arrive
        - real-time eta for route
        - estimated arrival for vehicle
        - current eta for delivery
    inputs:
      - name: vehicle_id
        type: string
        required: true
      - name: destination_stop_id
        type: string
        required: false
    nodes:
      - type: question
        id: askVehicleId
        prompt: "Which vehicle ID should I calculate the ETA for?"
        variable: Topic.vehicle_id
        entity: Text
      - type: tool
        id: getEta
        tool_name: CalculateRealTimeEta
        input_mapping:
          vehicleId: =Topic.vehicle_id
          destinationStopId: =Topic.destination_stop_id
      - type: message
        text: |-
          ETA for vehicle {Topic.vehicle_id}:
          - Current position: {Topic.CurrentPosition}
          - Destination: {Topic.DestinationName}
          - Estimated arrival: {Topic.EtaTimestamp}
          - Distance remaining: {Topic.DistanceRemainingMiles} miles
          - Traffic conditions: {Topic.TrafficConditionSummary}

  - name: Rerouting Alert
    description: Evaluates current traffic against the active route and triggers a re-routing notification if the projected delay exceeds the configured threshold.
    trigger:
      mode: classic
      trigger_phrases:
        - check for traffic delays
        - reroute truck around traffic
        - is there a delay on the route
        - traffic alert for route
        - re-route driver
    inputs:
      - name: vehicle_id
        type: string
        required: true
      - name: route_id
        type: string
        required: false
    nodes:
      - type: question
        id: askVehicleIdReroute
        prompt: "Which vehicle ID should I check for rerouting?"
        variable: Topic.vehicle_id
        entity: Text
      - type: tool
        id: checkReroute
        tool_name: EvaluateReroutingNeed
        input_mapping:
          vehicleId: =Topic.vehicle_id
          routeId: =Topic.route_id
          thresholdMinutes: =Global.RerouteDelayThresholdMinutes
      - type: condition
        id: rerouteDecision
        branches:
          - condition: =Topic.DelayMinutes >= Global.RerouteDelayThresholdMinutes
            actions:
              - type: tool
                id: sendRerouteAlert
                tool_name: SendReroutingNotification
                input_mapping:
                  vehicleId: =Topic.vehicle_id
                  routeId: =Topic.route_id
                  delayMinutes: =Topic.DelayMinutes
                  alternativeRoute: =Topic.AlternativeRouteSummary
              - type: message
                text: "⚠️ Re-routing alert sent for vehicle {Topic.vehicle_id}. Delay: {Topic.DelayMinutes} minutes. Alternative route: {Topic.AlternativeRouteSummary}."
        else_actions:
          - type: message
            text: "No re-routing required. Current delay for vehicle {Topic.vehicle_id} is {Topic.DelayMinutes} minutes, within the {Global.RerouteDelayThresholdMinutes}-minute threshold."

  - name: HOS Compliance Check
    description: Validates a driver's Hours of Service remaining before assigning an additional route, blocking assignment if the limit would be exceeded.
    trigger:
      mode: classic
      trigger_phrases:
        - check hours of service for driver
        - can driver take another route
        - hos check for driver
        - is driver available for route
        - hours remaining for driver
    inputs:
      - name: driver_id
        type: string
        required: true
      - name: estimated_route_hours
        type: number
        required: false
    nodes:
      - type: question
        id: askDriverId
        prompt: "Which driver ID should I check for HOS compliance?"
        variable: Topic.driver_id
        entity: Text
      - type: tool
        id: checkHos
        tool_name: CheckDriverHosCompliance
        input_mapping:
          driverId: =Topic.driver_id
          estimatedRouteHours: =Topic.estimated_route_hours
      - type: condition
        id: hosDecision
        branches:
          - condition: =Topic.HosCompliant = true
            actions:
              - type: message
                text: "✅ Driver {Topic.driver_id} is within HOS limits. Hours remaining: {Topic.HoursRemaining}. Route can be assigned."
        else_actions:
          - type: message
            text: "🚫 Driver {Topic.driver_id} cannot be assigned. Remaining HOS: {Topic.HoursRemaining} hours. Route requires {Topic.estimated_route_hours} hours. Assignment blocked to prevent regulatory violation."

  - name: Driver Assignment
    description: Assigns an available, qualified driver to a specific route by checking HOS availability and required certifications such as hazmat, liftgate, or tanker endorsement.
    trigger:
      mode: classic
      trigger_phrases:
        - assign driver to route
        - find a driver for route
        - who can take route
        - assign hazmat route
        - driver assignment for route
    inputs:
      - name: route_id
        type: string
        required: true
      - name: required_certification
        type: string
        required: false
    nodes:
      - type: question
        id: askRouteIdAssign
        prompt: "Which route ID needs a driver assignment? (Example: R-2025-0301)"
        variable: Topic.route_id
        entity: Text
      - type: tool
        id: loadRouteRequirements
        tool_name: GetRouteSpecialRequirements
        input_mapping:
          routeId: =Topic.route_id
      - type: tool
        id: findDriver
        tool_name: AssignDriverToRoute
        input_mapping:
          routeId: =Topic.route_id
          requiredCertification: =Coalesce(Topic.required_certification, Topic.RouteRequiredCertification)
      - type: condition
        id: assignmentResult
        branches:
          - condition: =Topic.AssignmentSuccess = true
            actions:
              - type: message
                text: "Driver {Topic.AssignedDriverId} assigned to route {Topic.route_id}. Certifications verified: {Topic.CertificationsVerified}. HOS hours remaining at assignment: {Topic.HosHoursRemainingAtAssign}. Estimated departure: {Topic.EstimatedDeparture}."
              - type: tool
                id: updateDriverSchedule
                tool_name: UpdateDriverScheduleRecord
                input_mapping:
                  driverId: =Topic.AssignedDriverId
                  routeId: =Topic.route_id
                  estimatedDeparture: =Topic.EstimatedDeparture
        else_actions:
          - type: message
            text: "No eligible driver found for route {Topic.route_id}. Reason: {Topic.AssignmentBlockedReason}. Please review driver availability and certification records."

  - name: Schedule Builder
    description: Builds a proposed delivery schedule for a target date by pulling pending orders, checking driver availability and HOS hours, matching vehicle capacity to order requirements, and presenting the result as an adaptive card with conflict highlights.
    trigger:
      mode: classic
      trigger_phrases:
        - schedule deliveries for tomorrow
        - build tomorrow's schedule
        - create delivery schedule for
        - plan deliveries for
        - generate schedule for tomorrow
    inputs:
      - name: target_date
        type: string
        required: false
    nodes:
      - type: question
        id: askTargetDate
        prompt: "Which date should I build the schedule for? (Say 'tomorrow' or enter a date like 2025-03-02)"
        variable: Topic.target_date
        entity: Date
        skip_if_set: true
      - type: tool
        id: buildSchedule
        tool_name: BuildSchedule
        input_mapping:
          targetDate: =Topic.target_date
      - type: condition
        id: conflictCheck
        branches:
          - condition: =Topic.conflictCount > 0
            actions:
              - type: message
                text: "Proposed schedule for {Topic.target_date} is ready with {Topic.conflictCount} conflict(s) that need attention."
              - type: adaptive_card
                title: Proposed Delivery Schedule
                body:
                  - text: "Date: {Topic.target_date}"
                  - text: "Total routes: {Topic.TotalRoutes}"
                  - text: "Drivers assigned: {Topic.DriversAssigned}"
                  - text: "Unscheduled orders: {Topic.unscheduledOrderCount}"
                  - text: "Conflicts detected: {Topic.conflictCount}"
                  - text: "Conflicts: {Topic.conflictSummary}"
                  - text: "Proposed schedule: {Topic.proposedScheduleJson}"
        else_actions:
          - type: message
            text: "Proposed schedule for {Topic.target_date} is ready. All orders scheduled with no conflicts."
          - type: adaptive_card
            title: Proposed Delivery Schedule
            body:
              - text: "Date: {Topic.target_date}"
              - text: "Total routes: {Topic.TotalRoutes}"
              - text: "Drivers assigned: {Topic.DriversAssigned}"
              - text: "Unscheduled orders: {Topic.unscheduledOrderCount}"
              - text: "Proposed schedule: {Topic.proposedScheduleJson}"

  - name: Conflict Detection
    description: Evaluates a proposed or existing schedule for scheduling conflicts including driver hours exceeded, vehicle overloaded by weight or volume, overlapping delivery time windows, and missing driver certifications. Returns each conflict with suggested resolutions.
    trigger:
      mode: classic
      trigger_phrases:
        - check schedule for conflicts
        - are there any scheduling conflicts
        - validate the schedule
        - detect conflicts in the schedule
        - review driver and vehicle conflicts
    inputs:
      - name: schedule_json
        type: string
        required: false
    nodes:
      - type: question
        id: askSchedule
        prompt: "Should I check today's proposed schedule or a specific schedule? Say 'today' or paste a schedule JSON."
        variable: Topic.schedule_json
        entity: Text
        skip_if_set: true
      - type: tool
        id: detectConflicts
        tool_name: DetectSchedulingConflicts
        input_mapping:
          scheduleJson: =Topic.schedule_json
      - type: condition
        id: conflictsFound
        branches:
          - condition: =Topic.conflictCount > 0
            actions:
              - type: message
                text: "{Topic.conflictCount} conflict(s) found in the schedule."
              - type: adaptive_card
                title: Schedule Conflict Report
                body:
                  - text: "Total conflicts: {Topic.conflictCount}"
                  - text: "Conflicts by type:"
                  - text: "{Topic.conflictsJson}"
                  - text: "Suggested resolutions:"
                  - text: "{Topic.resolutionSuggestionsJson}"
        else_actions:
          - type: message
            text: "No conflicts detected. The schedule is valid across all HOS, capacity, time window, and certification constraints."

  - name: HOS Tracking
    description: Returns a driver's current Hours of Service status including remaining drive time, on-duty time, required rest periods, and limit-approaching alerts for fleet managers and dispatchers.
    trigger:
      mode: classic
      trigger_phrases:
        - how many hours does driver have left
        - hos status for driver
        - remaining drive time for driver
        - check driver hours this week
        - how many hours left for driver jones
    inputs:
      - name: driver_id
        type: string
        required: false
      - name: driver_name
        type: string
        required: false
    nodes:
      - type: question
        id: askDriverIdOrName
        prompt: "Which driver should I check HOS status for? Provide the driver ID (e.g., D-1042) or name (e.g., Jones)."
        variable: Topic.driver_id
        entity: Text
        skip_if_set: true
      - type: tool
        id: resolveDriver
        tool_name: ResolveDriverByNameOrId
        input_mapping:
          driverIdOrName: =Coalesce(Topic.driver_id, Topic.driver_name)
      - type: tool
        id: trackHos
        tool_name: TrackDriverHos
        input_mapping:
          driverId: =Topic.ResolvedDriverId
      - type: condition
        id: hosAlertCheck
        branches:
          - condition: =Topic.approachingDailyLimit = true OR Topic.approachingWeeklyLimit = true
            actions:
              - type: message
                text: "HOS Alert for driver {Topic.ResolvedDriverId}: {Topic.alertMessage}"
              - type: adaptive_card
                title: Driver HOS Status
                body:
                  - text: "Driver: {Topic.ResolvedDriverId}"
                  - text: "Remaining drive time today: {Topic.remainingDriveHoursToday} hours"
                  - text: "Remaining on-duty time today: {Topic.remainingOnDutyHoursToday} hours"
                  - text: "Remaining drive time this week: {Topic.remainingDriveHoursWeekly} hours"
                  - text: "Next required break: {Topic.nextRequiredBreakMinutes} minutes after {Topic.hoursUntilBreakRequired} more hours of driving"
                  - text: "Alert: {Topic.alertMessage}"
        else_actions:
          - type: adaptive_card
            title: Driver HOS Status
            body:
              - text: "Driver: {Topic.ResolvedDriverId}"
              - text: "Remaining drive time today: {Topic.remainingDriveHoursToday} hours"
              - text: "Remaining on-duty time today: {Topic.remainingOnDutyHoursToday} hours"
              - text: "Remaining drive time this week: {Topic.remainingDriveHoursWeekly} hours"
              - text: "Next required break: {Topic.nextRequiredBreakMinutes} minutes after {Topic.hoursUntilBreakRequired} more hours of driving"
