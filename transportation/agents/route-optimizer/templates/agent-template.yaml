agent:
  name: Route Optimization Scheduler
  vertical: Transportation
  version: 1.0.0
  orchestration_mode: generative
  channels:
    - teams
    - web_dashboard
  primary_users:
    - dispatcher
    - route_planner
    - operations_manager
  global_variables:
    - name: Global.UserRole
      type: string
    - name: Global.DefaultFleet
      type: string
    - name: Global.RerouteDelayThresholdMinutes
      type: number
      default: 30

entities:
  - name: RouteId
    type: regex
    pattern: "^RT-[0-9]{3,6}$"
    description: Route identifier in the format RT-XXX.
  - name: VehicleId
    type: regex
    pattern: "^[A-Z]{1,3}-[0-9]{3,6}$"
    description: Vehicle identifier (for example T-501 or VAN-1042).
  - name: DriverId
    type: regex
    pattern: "^DRV-[0-9]{3,6}$"
    description: Driver identifier in the format DRV-XXX.
  - name: OrderId
    type: regex
    pattern: "^ORD-[0-9]{4,8}$"
    description: Delivery order identifier in the format ORD-XXXX.
  - name: StopAddress
    type: ml
    description: A street address or named location used as a route stop.
  - name: ConstraintType
    type: closed_list
    values:
      - time_window
      - vehicle_capacity
      - driver_hours
      - certification
    description: Type of route constraint to check.

topics:
  - name: Greeting
    description: Greets users and adapts opening guidance for fleet managers, dispatchers, and drivers.
    trigger:
      mode: generative
      trigger_phrases:
        - hi
        - hello
        - start route optimizer
        - open route scheduler
        - help with routes
    nodes:
      - type: set_variable
        id: detectRole
        variable: Global.UserRole
        value: =Coalesce(User.Role, "driver")
      - type: condition
        id: roleRoute
        branches:
          - condition: =Global.UserRole = "fleet_manager"
            actions:
              - type: message
                text: "Welcome. I can optimize multi-stop routes, check driver availability, and monitor on-time performance."
          - condition: =Global.UserRole = "dispatcher"
            actions:
              - type: message
                text: "Welcome. I can sequence your stops, assign drivers, and alert you to traffic delays in real time."
          - condition: =Global.UserRole = "driver"
            actions:
              - type: message
                text: "Welcome. I can show your route, current ETA, and notify dispatch if you need a re-route."
        else_actions:
          - type: message
            text: "Welcome to Route Optimization Scheduler. Tell me what routing question you want to solve."
      - type: message
        text: "Try: 'Optimize my stops for today', 'ETA for route R-1042', or 'Re-route truck T-501 around I-40'."

  - name: Route Optimization
    description: Accepts a list of stops with time windows and returns an optimized visit sequence that minimizes total travel time.
    trigger:
      mode: classic
      trigger_phrases:
        - optimize my stops
        - best stop sequence for today
        - plan my route
        - optimize route for driver
        - sequence stops for delivery
    inputs:
      - name: route_id
        type: string
        required: false
      - name: stops
        type: string
        required: false
    nodes:
      - type: question
        id: askRouteId
        prompt: "What route ID or list of stops should I optimize?"
        variable: Topic.route_id
        entity: Text
      - type: tool
        id: optimizeRoute
        tool_name: OptimizeRoute
        input_mapping:
          routeId: =Topic.route_id
          stops: =Topic.stops
      - type: message
        text: |-
          Optimized route for {Topic.route_id}:
          - Stop sequence: {Topic.OptimizedSequence}
          - Estimated total travel time: {Topic.TotalTravelTime}
          - Time windows respected: {Topic.TimeWindowsRespected}
          - Optimization savings vs original: {Topic.TimeSavingsMinutes} minutes
      - type: adaptive_card
        title: Route Optimization Result
        body:
          - text: "Stop-by-stop breakdown: {Topic.StopBreakdownTable}"
          - text: "All time windows satisfied: {Topic.TimeWindowsRespected}"

  - name: ETA Calculation
    description: Returns a real-time estimated time of arrival for a vehicle based on current GPS position and live traffic data.
    trigger:
      mode: classic
      trigger_phrases:
        - what is the eta for truck
        - when will driver arrive
        - real-time eta for route
        - estimated arrival for vehicle
        - current eta for delivery
    inputs:
      - name: vehicle_id
        type: string
        required: true
      - name: destination_stop_id
        type: string
        required: false
    nodes:
      - type: question
        id: askVehicleId
        prompt: "Which vehicle ID should I calculate the ETA for?"
        variable: Topic.vehicle_id
        entity: Text
      - type: tool
        id: getEta
        tool_name: CalculateRealTimeEta
        input_mapping:
          vehicleId: =Topic.vehicle_id
          destinationStopId: =Topic.destination_stop_id
      - type: message
        text: |-
          ETA for vehicle {Topic.vehicle_id}:
          - Current position: {Topic.CurrentPosition}
          - Destination: {Topic.DestinationName}
          - Estimated arrival: {Topic.EtaTimestamp}
          - Distance remaining: {Topic.DistanceRemainingMiles} miles
          - Traffic conditions: {Topic.TrafficConditionSummary}

  - name: Rerouting Alert
    description: Evaluates current traffic against the active route and triggers a re-routing notification if the projected delay exceeds the configured threshold.
    trigger:
      mode: classic
      trigger_phrases:
        - check for traffic delays
        - reroute truck around traffic
        - is there a delay on the route
        - traffic alert for route
        - re-route driver
    inputs:
      - name: vehicle_id
        type: string
        required: true
      - name: route_id
        type: string
        required: false
    nodes:
      - type: question
        id: askVehicleIdReroute
        prompt: "Which vehicle ID should I check for rerouting?"
        variable: Topic.vehicle_id
        entity: Text
      - type: tool
        id: checkReroute
        tool_name: EvaluateReroutingNeed
        input_mapping:
          vehicleId: =Topic.vehicle_id
          routeId: =Topic.route_id
          thresholdMinutes: =Global.RerouteDelayThresholdMinutes
      - type: condition
        id: rerouteDecision
        branches:
          - condition: =Topic.DelayMinutes >= Global.RerouteDelayThresholdMinutes
            actions:
              - type: tool
                id: sendRerouteAlert
                tool_name: SendReroutingNotification
                input_mapping:
                  vehicleId: =Topic.vehicle_id
                  routeId: =Topic.route_id
                  delayMinutes: =Topic.DelayMinutes
                  alternativeRoute: =Topic.AlternativeRouteSummary
              - type: message
                text: "⚠️ Re-routing alert sent for vehicle {Topic.vehicle_id}. Delay: {Topic.DelayMinutes} minutes. Alternative route: {Topic.AlternativeRouteSummary}."
        else_actions:
          - type: message
            text: "No re-routing required. Current delay for vehicle {Topic.vehicle_id} is {Topic.DelayMinutes} minutes, within the {Global.RerouteDelayThresholdMinutes}-minute threshold."

  - name: HOS Compliance Check
    description: Validates a driver's Hours of Service remaining before assigning an additional route, blocking assignment if the limit would be exceeded.
    trigger:
      mode: classic
      trigger_phrases:
        - check hours of service for driver
        - can driver take another route
        - hos check for driver
        - is driver available for route
        - hours remaining for driver
    inputs:
      - name: driver_id
        type: string
        required: true
      - name: estimated_route_hours
        type: number
        required: false
    nodes:
      - type: question
        id: askDriverId
        prompt: "Which driver ID should I check for HOS compliance?"
        variable: Topic.driver_id
        entity: Text
      - type: tool
        id: checkHos
        tool_name: CheckDriverHosCompliance
        input_mapping:
          driverId: =Topic.driver_id
          estimatedRouteHours: =Topic.estimated_route_hours
      - type: condition
        id: hosDecision
        branches:
          - condition: =Topic.HosCompliant = true
            actions:
              - type: message
                text: "✅ Driver {Topic.driver_id} is within HOS limits. Hours remaining: {Topic.HoursRemaining}. Route can be assigned."
        else_actions:
          - type: message
            text: "🚫 Driver {Topic.driver_id} cannot be assigned. Remaining HOS: {Topic.HoursRemaining} hours. Route requires {Topic.estimated_route_hours} hours. Assignment blocked to prevent regulatory violation."

  - name: Driver Assignment
    description: Assigns an available, qualified driver to a route, validating HOS availability and required certifications such as hazmat.
    trigger:
      mode: classic
      trigger_phrases:
        - assign driver to route
        - find a driver for route
        - who can take route
        - assign hazmat route
        - driver assignment for route
    inputs:
      - name: route_id
        type: string
        required: true
      - name: required_certification
        type: string
        required: false
    nodes:
      - type: question
        id: askRouteIdAssign
        prompt: "Which route ID needs a driver assignment?"
        variable: Topic.route_id
        entity: Text
      - type: tool
        id: checkVehicleMaintenance
        tool_name: CheckVehicleMaintenanceStatus
        input_mapping:
          routeId: =Topic.route_id
      - type: condition
        id: maintenanceGate
        branches:
          - condition: =Topic.VehicleOnMaintenanceHold = true
            actions:
              - type: message
                text: "Vehicle assigned to route {Topic.route_id} is currently on a maintenance hold: {Topic.MaintenanceHoldReason}. Route cannot be dispatched until the hold is lifted or the vehicle is reassigned."
        else_actions:
          - type: tool
            id: findDriver
            tool_name: AssignDriverToRoute
            input_mapping:
              routeId: =Topic.route_id
              requiredCertification: =Topic.required_certification
          - type: condition
            id: assignmentResult
            branches:
              - condition: =Topic.AssignmentSuccess = true
                actions:
                  - type: message
                    text: "Driver {Topic.AssignedDriverId} assigned to route {Topic.route_id}. Certifications verified: {Topic.CertificationsVerified}. Estimated departure: {Topic.EstimatedDeparture}."
            else_actions:
              - type: message
                text: "No eligible driver found for route {Topic.route_id}. Reason: {Topic.AssignmentBlockedReason}. Please review driver availability and certification records."

  - name: Fuel Route Correlation
    description: Inserts cost-effective fuel stops into an active route when the vehicle's tank level is low, using price data from the Fuel Tracking agent.
    trigger:
      mode: classic
      trigger_phrases:
        - add fuel stop to route
        - optimize route with fuel stops
        - insert fueling stop for low tank
        - fuel stop recommendation for route
    inputs:
      - name: route_id
        type: string
        required: true
      - name: vehicle_id
        type: string
        required: false
    nodes:
      - type: question
        id: askRouteIdFuel
        prompt: "Which route ID should I check for fuel stop insertion?"
        variable: Topic.route_id
        entity: Text
      - type: tool
        id: checkTankLevel
        tool_name: GetVehicleTankLevel
        input_mapping:
          vehicleId: =Topic.vehicle_id
      - type: condition
        id: tankLevelGate
        branches:
          - condition: =Topic.TankLevelPct <= 25
            actions:
              - type: tool
                id: getFuelStops
                tool_name: GetFuelPricesForRoute
                input_mapping:
                  routeId: =Topic.route_id
                  vehicleId: =Topic.vehicle_id
                  tankLevelPct: =Topic.TankLevelPct
              - type: tool
                id: insertFuelStops
                tool_name: InsertFuelStopsIntoRoute
                input_mapping:
                  routeId: =Topic.route_id
                  fuelStopRecommendations: =Topic.FuelStopRecommendations
              - type: message
                text: "Tank level for vehicle {Topic.vehicle_id} is {Topic.TankLevelPct}%. {Topic.InsertedFuelStopCount} fuel stop(s) added to route {Topic.route_id}."
              - type: adaptive_card
                title: Fuel Stop Insertion Summary
                body:
                  - text: "Inserted stops: {Topic.FuelStopSummaryTable}"
                  - text: "Estimated fuel cost savings vs market average: {Topic.EstimatedFuelCostSaving}"
                  - text: "Time window impact: {Topic.TimeWindowImpactSummary}"
        else_actions:
          - type: message
            text: "Tank level for vehicle {Topic.vehicle_id} is {Topic.TankLevelPct}%. No fuel stop insertion needed."

  - name: Fleet Incident Escalation Handler
    description: Handles incoming escalation notifications from Fleet Coordinator when a vehicle breakdown or maintenance hold affects active routes. Re-routes affected deliveries automatically.
    trigger:
      mode: classic
      trigger_phrases:
        - vehicle breakdown escalation
        - handle fleet incident
        - re-route after breakdown
        - vehicle unavailable for active route
    inputs:
      - name: vehicle_id
        type: string
        required: true
      - name: incident_type
        type: string
        required: true
      - name: location
        type: string
        required: false
    nodes:
      - type: tool
        id: findAffectedRoutes
        tool_name: FindActiveRoutesForVehicle
        input_mapping:
          vehicleId: =Topic.vehicle_id
      - type: condition
        id: affectedRoutesCheck
        branches:
          - condition: =Topic.AffectedRouteCount > 0
            actions:
              - type: tool
                id: rerouteAffected
                tool_name: RerouteAffectedDeliveries
                input_mapping:
                  vehicleId: =Topic.vehicle_id
                  affectedRoutes: =Topic.AffectedRoutes
              - type: message
                text: "{Topic.AffectedRouteCount} route(s) affected by {Topic.incident_type} for vehicle {Topic.vehicle_id}. Re-routing initiated for: {Topic.AffectedRouteIds}. Dispatcher has been notified."
              - type: adaptive_card
                title: Re-routing Summary
                body:
                  - text: "Affected routes: {Topic.AffectedRouteIds}"
                  - text: "Re-routing status: {Topic.ReroutingStatusTable}"
                  - text: "New ETAs: {Topic.NewEtaSummary}"
        else_actions:
          - type: message
            text: "No active routes found for vehicle {Topic.vehicle_id}. No re-routing required."

  - name: Schedule Deliveries
    description: Assigns delivery orders from the order management system to routes and driver schedules, respecting time window and vehicle capacity constraints.
    trigger:
      mode: classic
      trigger_phrases:
        - schedule deliveries for today
        - assign delivery orders to routes
        - schedule orders for dispatch
        - create delivery schedule
        - plan deliveries for tomorrow
    inputs:
      - name: schedule_date
        type: string
        required: false
      - name: fleet_id
        type: string
        required: false
    nodes:
      - type: question
        id: askScheduleDate
        prompt: "Which date should I schedule deliveries for? (Leave blank for today)"
        variable: Topic.schedule_date
        entity: Text
      - type: tool
        id: fetchOrders
        tool_name: FetchPendingDeliveryOrders
        input_mapping:
          scheduleDate: =Topic.schedule_date
          fleetId: =Global.DefaultFleet
      - type: tool
        id: buildSchedule
        tool_name: BuildDeliverySchedule
        input_mapping:
          deliveryOrders: =Topic.PendingOrders
          scheduleDate: =Topic.schedule_date
      - type: message
        text: |-
          Delivery schedule for {Topic.schedule_date}:
          - Orders scheduled: {Topic.ScheduledOrderCount}
          - Routes created: {Topic.RoutesCreatedCount}
          - Unscheduled orders (capacity or time window conflicts): {Topic.UnscheduledOrderCount}
      - type: adaptive_card
        title: Delivery Schedule Summary
        body:
          - text: "Schedule date: {Topic.schedule_date}"
          - text: "Routes: {Topic.ScheduleSummaryTable}"
          - text: "Unscheduled orders requiring manual review: {Topic.UnscheduledOrderIds}"

  - name: Check Constraints
    description: Validates a proposed route or assignment against vehicle capacity, driver hours, time window, and certification constraints before committing the change.
    trigger:
      mode: classic
      trigger_phrases:
        - check constraints for route
        - validate route against constraints
        - does this route fit within capacity
        - check driver hours for route
        - verify time windows for route
    inputs:
      - name: route_id
        type: string
        required: false
      - name: constraint_type
        type: string
        required: false
    nodes:
      - type: question
        id: askRouteIdConstraint
        prompt: "Which route ID should I validate constraints for?"
        variable: Topic.route_id
        entity: RouteId
      - type: question
        id: askConstraintType
        prompt: "Which constraint type should I check? (time_window, vehicle_capacity, driver_hours, certification, or all)"
        variable: Topic.constraint_type
        entity: ConstraintType
      - type: tool
        id: checkConstraints
        tool_name: ValidateRouteConstraints
        input_mapping:
          routeId: =Topic.route_id
          constraintType: =Topic.constraint_type
      - type: condition
        id: constraintResult
        branches:
          - condition: =Topic.AllConstraintsPassed = true
            actions:
              - type: message
                text: "Route {Topic.route_id} passes all {Topic.constraint_type} constraints. The route is feasible for dispatch."
        else_actions:
          - type: message
            text: "Route {Topic.route_id} has constraint violations. Failed checks: {Topic.FailedConstraints}. Recommended actions: {Topic.ConstraintResolutionSuggestions}."
          - type: adaptive_card
            title: Constraint Validation Result
            body:
              - text: "Route: {Topic.route_id}"
              - text: "Constraint violations: {Topic.ConstraintViolationTable}"
              - text: "Resolution options: {Topic.ConstraintResolutionSuggestions}"

  - name: ETA Update
    description: Provides an updated estimated time of arrival for an in-progress route or specific stop, incorporating the latest GPS position and current traffic conditions.
    trigger:
      mode: classic
      trigger_phrases:
        - update eta for route
        - get latest eta for delivery
        - what is the current eta
        - refresh eta for vehicle
        - updated arrival time for order
    inputs:
      - name: route_id
        type: string
        required: false
      - name: order_id
        type: string
        required: false
    nodes:
      - type: question
        id: askRouteIdEta
        prompt: "Which route ID or order ID should I fetch the latest ETA for?"
        variable: Topic.route_id
        entity: RouteId
      - type: tool
        id: refreshEta
        tool_name: RefreshRouteEta
        input_mapping:
          routeId: =Topic.route_id
          orderId: =Topic.order_id
      - type: message
        text: |-
          Updated ETA for route {Topic.route_id}:
          - Vehicle current position: {Topic.CurrentPosition}
          - Next stop: {Topic.NextStopName}
          - Updated ETA at next stop: {Topic.UpdatedEtaNextStop}
          - Final stop ETA: {Topic.UpdatedEtaFinalStop}
          - Delay vs original schedule: {Topic.DelayMinutes} minutes
      - type: adaptive_card
        title: ETA Update
        body:
          - text: "Route: {Topic.route_id}"
          - text: "Stop-by-stop updated ETAs: {Topic.StopEtaTable}"
          - text: "Traffic conditions: {Topic.TrafficConditionSummary}"

  - name: Route History
    description: Retrieves historical route records for a date range, vehicle, or driver, including on-time performance metrics and constraint violation events.
    trigger:
      mode: classic
      trigger_phrases:
        - show route history
        - past routes for driver
        - route performance history
        - completed routes for vehicle
        - on-time delivery history
    inputs:
      - name: driver_id
        type: string
        required: false
      - name: vehicle_id
        type: string
        required: false
      - name: date_from
        type: string
        required: false
      - name: date_to
        type: string
        required: false
    nodes:
      - type: question
        id: askHistoryScope
        prompt: "Should I look up history by driver ID, vehicle ID, or date range? Please specify the relevant value."
        variable: Topic.driver_id
        entity: DriverId
      - type: tool
        id: fetchRouteHistory
        tool_name: GetRouteHistory
        input_mapping:
          driverId: =Topic.driver_id
          vehicleId: =Topic.vehicle_id
          dateFrom: =Topic.date_from
          dateTo: =Topic.date_to
      - type: message
        text: |-
          Route history summary:
          - Routes completed: {Topic.RoutesCompletedCount}
          - On-time rate: {Topic.OnTimeRatePct}%
          - Average delay: {Topic.AverageDelayMinutes} minutes
          - Constraint violations: {Topic.ConstraintViolationCount}
      - type: adaptive_card
        title: Route History
        body:
          - text: "Period: {Topic.date_from} to {Topic.date_to}"
          - text: "Route records: {Topic.RouteHistoryTable}"
          - text: "Top delay causes: {Topic.TopDelayCauses}"
