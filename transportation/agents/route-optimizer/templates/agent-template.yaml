agent:
  name: Route Optimization Scheduler
  vertical: Transportation
  version: 1.0.0
  orchestration_mode: generative
  channels:
    - teams
    - mobile_web_chat
  primary_users:
    - fleet_manager
    - dispatcher
    - driver
  global_variables:
    - name: Global.UserRole
      type: string
    - name: Global.DefaultFleet
      type: string
    - name: Global.RerouteDelayThresholdMinutes
      type: number
      default: 30

topics:
  - name: Greeting
    description: Greets users and adapts opening guidance for fleet managers, dispatchers, and drivers.
    trigger:
      mode: generative
      trigger_phrases:
        - hi
        - hello
        - start route optimizer
        - open route scheduler
        - help with routes
    nodes:
      - type: set_variable
        id: detectRole
        variable: Global.UserRole
        value: =Coalesce(User.Role, "driver")
      - type: condition
        id: roleRoute
        branches:
          - condition: =Global.UserRole = "fleet_manager"
            actions:
              - type: message
                text: "Welcome. I can optimize multi-stop routes, check driver availability, and monitor on-time performance."
          - condition: =Global.UserRole = "dispatcher"
            actions:
              - type: message
                text: "Welcome. I can sequence your stops, assign drivers, and alert you to traffic delays in real time."
          - condition: =Global.UserRole = "driver"
            actions:
              - type: message
                text: "Welcome. I can show your route, current ETA, and notify dispatch if you need a re-route."
        else_actions:
          - type: message
            text: "Welcome to Route Optimization Scheduler. Tell me what routing question you want to solve."
      - type: message
        text: "Try: 'Optimize my stops for today', 'ETA for route R-1042', or 'Re-route truck T-501 around I-40'."

  - name: Route Optimization
    description: Accepts a list of stops with time windows and returns an optimized visit sequence that minimizes total travel time.
    trigger:
      mode: classic
      trigger_phrases:
        - optimize my stops
        - best stop sequence for today
        - plan my route
        - optimize route for driver
        - sequence stops for delivery
    inputs:
      - name: route_id
        type: string
        required: false
      - name: stops
        type: string
        required: false
      - name: vehicle_constraints
        type: string
        required: false
      - name: driver_constraints
        type: string
        required: false
    nodes:
      - type: question
        id: askRouteId
        prompt: "What route ID or list of stops should I optimize?"
        variable: Topic.route_id
        entity: Text
      - type: tool
        id: optimizeRoute
        tool_name: OptimizeRoute
        input_mapping:
          routeId: =Topic.route_id
          stops: =Topic.stops
          vehicleConstraints: =Topic.vehicle_constraints
          driverConstraints: =Topic.driver_constraints
      - type: message
        text: |-
          Optimized route for {Topic.route_id}:
          - Stop sequence: {Topic.OptimizedSequence}
          - Estimated total travel time: {Topic.TotalTravelTime}
          - Total distance: {Topic.TotalDistanceMiles} miles
          - Time windows respected: {Topic.TimeWindowsRespected}
          - Optimization savings vs original: {Topic.TimeSavingsMinutes} minutes
      - type: adaptive_card
        title: Route Optimization Result
        body:
          - text: "Stop-by-stop breakdown: {Topic.StopBreakdownTable}"
          - text: "Per-stop ETAs: {Topic.PerStopEtas}"
          - text: "All time windows satisfied: {Topic.TimeWindowsRespected}"

  - name: Order-Based Delivery Optimization
    description: Fetches unscheduled delivery orders for a named driver and date from the order management system, applies vehicle and driver constraints, and returns an optimized route with a stop sequence, map link, and estimated schedule.
    trigger:
      mode: classic
      trigger_phrases:
        - optimize tomorrow's deliveries for driver
        - schedule deliveries for driver
        - build route for driver from orders
        - assign deliveries to driver for today
        - optimize unscheduled orders for driver
    inputs:
      - name: driver_id
        type: string
        required: false
      - name: delivery_date
        type: string
        required: false
      - name: vehicle_constraints
        type: string
        required: false
      - name: driver_constraints
        type: string
        required: false
    nodes:
      - type: question
        id: askDriverId
        prompt: "Which driver should I build the optimized delivery route for?"
        variable: Topic.driver_id
        entity: Text
      - type: question
        id: askDeliveryDate
        prompt: "Which date should I optimize deliveries for? (e.g., tomorrow, 2026-03-04)"
        variable: Topic.delivery_date
        entity: Text
      - type: tool
        id: fetchOrders
        tool_name: FetchUnscheduledOrders
        input_mapping:
          driverId: =Topic.driver_id
          deliveryDate: =Topic.delivery_date
      - type: condition
        id: ordersCheck
        branches:
          - condition: =Topic.StopCount = 0
            actions:
              - type: message
                text: "No unscheduled orders found for driver {Topic.driver_id} on {Topic.delivery_date}."
        else_actions:
          - type: tool
            id: optimizeDeliveryRoute
            tool_name: OptimizeRoute
            input_mapping:
              stops: =Topic.UnscheduledStops
              vehicleConstraints: =Topic.vehicle_constraints
              driverConstraints: =Topic.driver_constraints
          - type: message
            text: |-
              Optimized delivery route for driver {Topic.driver_id} on {Topic.delivery_date}:
              - Stops to visit: {Topic.StopCount}
              - Estimated total travel time: {Topic.TotalTravelTime}
              - Total distance: {Topic.TotalDistanceMiles} miles
              - Time windows respected: {Topic.TimeWindowsRespected}
          - type: adaptive_card
            title: Delivery Route for {Topic.driver_id}
            body:
              - text: "Date: {Topic.delivery_date}"
              - text: "Stop sequence: {Topic.OptimizedSequence}"
              - text: "Per-stop ETAs: {Topic.PerStopEtas}"
              - text: "Map link: {Topic.MapLink}"
              - text: "Estimated schedule: {Topic.StopBreakdownTable}"

  - name: ETA Calculation
    description: Returns a real-time estimated time of arrival for a vehicle based on current GPS position and live traffic data.
    trigger:
      mode: classic
      trigger_phrases:
        - what is the eta for truck
        - when will driver arrive
        - real-time eta for route
        - estimated arrival for vehicle
        - current eta for delivery
    inputs:
      - name: vehicle_id
        type: string
        required: true
      - name: destination_stop_id
        type: string
        required: false
    nodes:
      - type: question
        id: askVehicleId
        prompt: "Which vehicle ID should I calculate the ETA for?"
        variable: Topic.vehicle_id
        entity: Text
      - type: tool
        id: getEta
        tool_name: CalculateRealTimeEta
        input_mapping:
          vehicleId: =Topic.vehicle_id
          destinationStopId: =Topic.destination_stop_id
      - type: message
        text: |-
          ETA for vehicle {Topic.vehicle_id}:
          - Current position: {Topic.CurrentPosition}
          - Destination: {Topic.DestinationName}
          - Estimated arrival: {Topic.EtaTimestamp}
          - Distance remaining: {Topic.DistanceRemainingMiles} miles
          - Traffic conditions: {Topic.TrafficConditionSummary}

  - name: Rerouting Alert
    description: Evaluates current traffic against the active route and triggers a re-routing notification if the projected delay exceeds the configured threshold.
    trigger:
      mode: classic
      trigger_phrases:
        - check for traffic delays
        - reroute truck around traffic
        - is there a delay on the route
        - traffic alert for route
        - re-route driver
    inputs:
      - name: vehicle_id
        type: string
        required: true
      - name: route_id
        type: string
        required: false
    nodes:
      - type: question
        id: askVehicleIdReroute
        prompt: "Which vehicle ID should I check for rerouting?"
        variable: Topic.vehicle_id
        entity: Text
      - type: tool
        id: checkReroute
        tool_name: EvaluateReroutingNeed
        input_mapping:
          vehicleId: =Topic.vehicle_id
          routeId: =Topic.route_id
          thresholdMinutes: =Global.RerouteDelayThresholdMinutes
      - type: condition
        id: rerouteDecision
        branches:
          - condition: =Topic.DelayMinutes >= Global.RerouteDelayThresholdMinutes
            actions:
              - type: tool
                id: sendRerouteAlert
                tool_name: SendReroutingNotification
                input_mapping:
                  vehicleId: =Topic.vehicle_id
                  routeId: =Topic.route_id
                  delayMinutes: =Topic.DelayMinutes
                  alternativeRoute: =Topic.AlternativeRouteSummary
              - type: message
                text: "⚠️ Re-routing alert sent for vehicle {Topic.vehicle_id}. Delay: {Topic.DelayMinutes} minutes. Alternative route: {Topic.AlternativeRouteSummary}."
        else_actions:
          - type: message
            text: "No re-routing required. Current delay for vehicle {Topic.vehicle_id} is {Topic.DelayMinutes} minutes, within the {Global.RerouteDelayThresholdMinutes}-minute threshold."

  - name: HOS Compliance Check
    description: Validates a driver's Hours of Service remaining before assigning an additional route, blocking assignment if the limit would be exceeded.
    trigger:
      mode: classic
      trigger_phrases:
        - check hours of service for driver
        - can driver take another route
        - hos check for driver
        - is driver available for route
        - hours remaining for driver
    inputs:
      - name: driver_id
        type: string
        required: true
      - name: estimated_route_hours
        type: number
        required: false
    nodes:
      - type: question
        id: askDriverId
        prompt: "Which driver ID should I check for HOS compliance?"
        variable: Topic.driver_id
        entity: Text
      - type: tool
        id: checkHos
        tool_name: CheckDriverHosCompliance
        input_mapping:
          driverId: =Topic.driver_id
          estimatedRouteHours: =Topic.estimated_route_hours
      - type: condition
        id: hosDecision
        branches:
          - condition: =Topic.HosCompliant = true
            actions:
              - type: message
                text: "✅ Driver {Topic.driver_id} is within HOS limits. Hours remaining: {Topic.HoursRemaining}. Route can be assigned."
        else_actions:
          - type: message
            text: "🚫 Driver {Topic.driver_id} cannot be assigned. Remaining HOS: {Topic.HoursRemaining} hours. Route requires {Topic.estimated_route_hours} hours. Assignment blocked to prevent regulatory violation."

  - name: Driver Assignment
    description: Assigns an available, qualified driver to a route, validating HOS availability and required certifications such as hazmat.
    trigger:
      mode: classic
      trigger_phrases:
        - assign driver to route
        - find a driver for route
        - who can take route
        - assign hazmat route
        - driver assignment for route
    inputs:
      - name: route_id
        type: string
        required: true
      - name: required_certification
        type: string
        required: false
    nodes:
      - type: question
        id: askRouteIdAssign
        prompt: "Which route ID needs a driver assignment?"
        variable: Topic.route_id
        entity: Text
      - type: tool
        id: checkVehicleMaintenance
        tool_name: CheckVehicleMaintenanceStatus
        input_mapping:
          routeId: =Topic.route_id
      - type: condition
        id: maintenanceGate
        branches:
          - condition: =Topic.VehicleOnMaintenanceHold = true
            actions:
              - type: message
                text: "Vehicle assigned to route {Topic.route_id} is currently on a maintenance hold: {Topic.MaintenanceHoldReason}. Route cannot be dispatched until the hold is lifted or the vehicle is reassigned."
        else_actions:
          - type: tool
            id: findDriver
            tool_name: AssignDriverToRoute
            input_mapping:
              routeId: =Topic.route_id
              requiredCertification: =Topic.required_certification
          - type: condition
            id: assignmentResult
            branches:
              - condition: =Topic.AssignmentSuccess = true
                actions:
                  - type: message
                    text: "Driver {Topic.AssignedDriverId} assigned to route {Topic.route_id}. Certifications verified: {Topic.CertificationsVerified}. Estimated departure: {Topic.EstimatedDeparture}."
            else_actions:
              - type: message
                text: "No eligible driver found for route {Topic.route_id}. Reason: {Topic.AssignmentBlockedReason}. Please review driver availability and certification records."

  - name: What-If Route Analysis
    description: Re-optimizes a route with a proposed additional stop and shows the impact on total time and per-stop ETAs, allowing the dispatcher to accept or reject the change.
    trigger:
      mode: classic
      trigger_phrases:
        - what if I add a stop to this route
        - how does adding a stop affect the route
        - impact of adding stop at address
        - recalculate route with extra stop
        - what happens if I insert a stop
    inputs:
      - name: route_id
        type: string
        required: false
      - name: proposed_stop_address
        type: string
        required: false
      - name: proposed_stop_time_window_start
        type: string
        required: false
      - name: proposed_stop_time_window_end
        type: string
        required: false
      - name: proposed_stop_service_time_minutes
        type: number
        required: false
    nodes:
      - type: question
        id: askRouteIdWhatIf
        prompt: "Which route ID should I analyze for the what-if scenario?"
        variable: Topic.route_id
        entity: Text
      - type: question
        id: askProposedStop
        prompt: "What is the address of the proposed additional stop?"
        variable: Topic.proposed_stop_address
        entity: Text
      - type: tool
        id: whatIfAnalysis
        tool_name: WhatIfRouteAnalysis
        input_mapping:
          routeId: =Topic.route_id
          proposedStopAddress: =Topic.proposed_stop_address
          proposedStopTimeWindowStart: =Topic.proposed_stop_time_window_start
          proposedStopTimeWindowEnd: =Topic.proposed_stop_time_window_end
          proposedStopServiceTimeMinutes: =Topic.proposed_stop_service_time_minutes
      - type: message
        text: |-
          What-if analysis for adding {Topic.proposed_stop_address} to route {Topic.route_id}:
          - Proposed sequence position: {Topic.ProposedStopSequencePosition}
          - New total travel time: {Topic.NewTotalTravelTime}
          - Time impact: +{Topic.TimeDeltaMinutes} minutes
          - All stops can meet time windows: {Topic.AllStopsCanMeetTimeWindows}
          - Affected stop ETA changes: {Topic.AffectedStopEtaChanges}
      - type: question
        id: askAcceptChange
        prompt: "Do you want to accept this change and add the stop to route {Topic.route_id}? (Yes / No)"
        variable: Topic.accept_change
        entity: Boolean
      - type: condition
        id: acceptDecision
        branches:
          - condition: =Topic.accept_change = true
            actions:
              - type: tool
                id: applyChange
                tool_name: OptimizeRoute
                input_mapping:
                  routeId: =Topic.route_id
                  stops: =Topic.UpdatedStopList
              - type: message
                text: "Stop added and route {Topic.route_id} has been updated with the new optimized sequence."
        else_actions:
          - type: message
            text: "No changes made. Route {Topic.route_id} remains unchanged."

  - name: Route Comparison
    description: Compares two routes side by side across total distance, total time, number of stops, fuel cost estimate, and on-time delivery probability.
    trigger:
      mode: classic
      trigger_phrases:
        - compare route A vs route B
        - side by side route comparison
        - which route is better
        - compare two routes
        - route metrics comparison
    inputs:
      - name: route_id_a
        type: string
        required: false
      - name: route_id_b
        type: string
        required: false
    nodes:
      - type: question
        id: askRouteIdA
        prompt: "What is the first route ID to compare?"
        variable: Topic.route_id_a
        entity: Text
      - type: question
        id: askRouteIdB
        prompt: "What is the second route ID to compare?"
        variable: Topic.route_id_b
        entity: Text
      - type: tool
        id: compareRoutes
        tool_name: CompareRoutes
        input_mapping:
          routeIdA: =Topic.route_id_a
          routeIdB: =Topic.route_id_b
      - type: message
        text: |-
          Route comparison: {Topic.route_id_a} vs {Topic.route_id_b}
          {Topic.ComparisonSummary}
      - type: adaptive_card
        title: Route Comparison
        body:
          - text: "Route A ({Topic.route_id_a}): {Topic.RouteAMetrics}"
          - text: "Route B ({Topic.route_id_b}): {Topic.RouteBMetrics}"
          - columns:
              - header: Metric
                values:
                  - Total distance
                  - Total time
                  - Number of stops
                  - Fuel cost estimate
                  - On-time delivery probability
              - header: "{Topic.route_id_a}"
                values:
                  - "{Topic.RouteAMetrics.totalDistanceMiles} miles"
                  - "{Topic.RouteAMetrics.totalTravelTime}"
                  - "{Topic.RouteAMetrics.stopCount}"
                  - "{Topic.RouteAMetrics.estimatedFuelCost}"
                  - "{Topic.RouteAMetrics.onTimeDeliveryProbability}"
              - header: "{Topic.route_id_b}"
                values:
                  - "{Topic.RouteBMetrics.totalDistanceMiles} miles"
                  - "{Topic.RouteBMetrics.totalTravelTime}"
                  - "{Topic.RouteBMetrics.stopCount}"
                  - "{Topic.RouteBMetrics.estimatedFuelCost}"
                  - "{Topic.RouteBMetrics.onTimeDeliveryProbability}"

  - name: Fuel Route Correlation
    description: Inserts cost-effective fuel stops into an active route when the vehicle's tank level is low, using price data from the Fuel Tracking agent.
    trigger:
      mode: classic
      trigger_phrases:
        - add fuel stop to route
        - optimize route with fuel stops
        - insert fueling stop for low tank
        - fuel stop recommendation for route
    inputs:
      - name: route_id
        type: string
        required: true
      - name: vehicle_id
        type: string
        required: false
    nodes:
      - type: question
        id: askRouteIdFuel
        prompt: "Which route ID should I check for fuel stop insertion?"
        variable: Topic.route_id
        entity: Text
      - type: tool
        id: checkTankLevel
        tool_name: GetVehicleTankLevel
        input_mapping:
          vehicleId: =Topic.vehicle_id
      - type: condition
        id: tankLevelGate
        branches:
          - condition: =Topic.TankLevelPct <= 25
            actions:
              - type: tool
                id: getFuelStops
                tool_name: GetFuelPricesForRoute
                input_mapping:
                  routeId: =Topic.route_id
                  vehicleId: =Topic.vehicle_id
                  tankLevelPct: =Topic.TankLevelPct
              - type: tool
                id: insertFuelStops
                tool_name: InsertFuelStopsIntoRoute
                input_mapping:
                  routeId: =Topic.route_id
                  fuelStopRecommendations: =Topic.FuelStopRecommendations
              - type: message
                text: "Tank level for vehicle {Topic.vehicle_id} is {Topic.TankLevelPct}%. {Topic.InsertedFuelStopCount} fuel stop(s) added to route {Topic.route_id}."
              - type: adaptive_card
                title: Fuel Stop Insertion Summary
                body:
                  - text: "Inserted stops: {Topic.FuelStopSummaryTable}"
                  - text: "Estimated fuel cost savings vs market average: {Topic.EstimatedFuelCostSaving}"
                  - text: "Time window impact: {Topic.TimeWindowImpactSummary}"
        else_actions:
          - type: message
            text: "Tank level for vehicle {Topic.vehicle_id} is {Topic.TankLevelPct}%. No fuel stop insertion needed."

  - name: Fleet Incident Escalation Handler
    description: Handles incoming escalation notifications from Fleet Coordinator when a vehicle breakdown or maintenance hold affects active routes. Re-routes affected deliveries automatically.
    trigger:
      mode: classic
      trigger_phrases:
        - vehicle breakdown escalation
        - handle fleet incident
        - re-route after breakdown
        - vehicle unavailable for active route
    inputs:
      - name: vehicle_id
        type: string
        required: true
      - name: incident_type
        type: string
        required: true
      - name: location
        type: string
        required: false
    nodes:
      - type: tool
        id: findAffectedRoutes
        tool_name: FindActiveRoutesForVehicle
        input_mapping:
          vehicleId: =Topic.vehicle_id
      - type: condition
        id: affectedRoutesCheck
        branches:
          - condition: =Topic.AffectedRouteCount > 0
            actions:
              - type: tool
                id: rerouteAffected
                tool_name: RerouteAffectedDeliveries
                input_mapping:
                  vehicleId: =Topic.vehicle_id
                  affectedRoutes: =Topic.AffectedRoutes
              - type: message
                text: "{Topic.AffectedRouteCount} route(s) affected by {Topic.incident_type} for vehicle {Topic.vehicle_id}. Re-routing initiated for: {Topic.AffectedRouteIds}. Dispatcher has been notified."
              - type: adaptive_card
                title: Re-routing Summary
                body:
                  - text: "Affected routes: {Topic.AffectedRouteIds}"
                  - text: "Re-routing status: {Topic.ReroutingStatusTable}"
                  - text: "New ETAs: {Topic.NewEtaSummary}"
        else_actions:
          - type: message
            text: "No active routes found for vehicle {Topic.vehicle_id}. No re-routing required."
