solution:
  name: FuelTrackingSolution
  display_name: Fuel Tracking Solution
  version: 1.0.0.0
  publisher: transportation-platform
  managed: true
  dependencies:
    - solution_name: TransportationSharedDataverse
      minimum_version: "1.0.0.0"

environment_variables:
  - schema_name: FuelCardApiUrl
    display_name: Fuel Card API URL
    type: string
    required: true
    default_value: https://api.fuelcardprovider.com/v1
  - schema_name: FuelCardApiKey
    display_name: Fuel Card API Key
    type: secret
    required: true
  - schema_name: TelematicsApiUrl
    display_name: Telematics API URL
    type: string
    required: true
    default_value: https://api.telematicsvendor.com/v2
  - schema_name: TelematicsApiKey
    display_name: Telematics API Key
    type: secret
    required: true
  - schema_name: FuelPriceApiKey
    display_name: Fuel Price API Key
    type: secret
    required: true
  - schema_name: FinanceAlertEmail
    display_name: Finance Alert Email
    type: string
    required: true
    default_value: fleet-finance-alerts@contoso.com
  - schema_name: AnomalyThresholdGallons
    display_name: Anomaly Threshold Gallons
    type: number
    required: true
    default_value: 5

dataverse:
  tables:
    - logical_name: crd_fueltransactions
      display_name: FuelTransactions
      description: Fuel transaction records ingested from fuel card providers and enriched with telematics context.
      ownership: organization
      primary_column:
        name: crd_name
        display_name: Transaction Name
        type: text
        max_length: 200
      columns:
        - name: crd_transaction_id
          display_name: transaction_id
          type: text
          required: true
          max_length: 100
          is_alternate_key: true
        - name: crd_card_number
          display_name: card_number
          type: text
          required: true
          max_length: 30
        - name: crd_vehicle_id
          display_name: vehicle_id
          type: text
          required: true
          max_length: 50
        - name: crd_driver_id
          display_name: driver_id
          type: text
          required: false
          max_length: 50
        - name: crd_merchant_name
          display_name: merchant_name
          type: text
          required: false
          max_length: 200
        - name: crd_location_lat
          display_name: location_lat
          type: decimal
          precision: 9
          scale: 6
          required: false
        - name: crd_location_lon
          display_name: location_lon
          type: decimal
          precision: 9
          scale: 6
          required: false
        - name: crd_gallons
          display_name: gallons
          type: decimal
          precision: 10
          scale: 3
          required: true
        - name: crd_price_per_gallon
          display_name: price_per_gallon
          type: currency
          precision: 4
          required: true
        - name: crd_total_cost
          display_name: total_cost
          type: currency
          precision: 2
          required: true
        - name: crd_odometer
          display_name: odometer
          type: whole_number
          required: false
        - name: crd_timestamp
          display_name: timestamp
          type: datetime
          required: true
          behavior: user_local
        - name: crd_anomaly_flag
          display_name: anomaly_flag
          type: boolean
          required: true
          default_value: false
      indexes:
        - name: idx_fueltransactions_vehicle_time
          columns:
            - crd_vehicle_id
            - crd_timestamp
        - name: idx_fueltransactions_card_time
          columns:
            - crd_card_number
            - crd_timestamp

    - logical_name: crd_anomalyrules
      display_name: FuelAnomalyRules
      description: Rule definitions and thresholds used by anomaly detection flows.
      ownership: organization
      primary_column:
        name: crd_name
        display_name: Rule Name
        type: text
        max_length: 200
      columns:
        - name: crd_rule_code
          display_name: rule_code
          type: text
          required: true
          max_length: 100
          is_alternate_key: true
        - name: crd_rule_type
          display_name: rule_type
          type: choice
          options:
            - tank_capacity_overfill
            - multiple_fills_short_period
            - off_route_fueling
            - after_hours_fueling
            - split_transactions
            - price_above_market
            - phantom_fill
        - name: crd_threshold_value
          display_name: threshold_value
          type: decimal
          precision: 10
          scale: 3
          required: true
        - name: crd_threshold_unit
          display_name: threshold_unit
          type: text
          max_length: 50
        - name: crd_enabled
          display_name: enabled
          type: boolean
          default_value: true
        - name: crd_severity
          display_name: severity
          type: choice
          options:
            - low
            - medium
            - high
            - critical
        - name: crd_description
          display_name: description
          type: multiline_text
          max_length: 4000

    - logical_name: crd_vehiclefuelprofiles
      display_name: VehicleFuelProfiles
      description: Per-vehicle fuel efficiency and cost metrics.
      ownership: organization
      primary_column:
        name: crd_name
        display_name: Profile Name
        type: text
        max_length: 200
      columns:
        - name: crd_vehicle_id
          display_name: vehicle_id
          type: text
          required: true
          max_length: 50
        - name: crd_vehicle_class
          display_name: vehicle_class
          type: text
          max_length: 50
        - name: crd_avg_mpg
          display_name: avg_mpg
          type: decimal
          precision: 8
          scale: 3
        - name: crd_fill_frequency_per_week
          display_name: fill_frequency_per_week
          type: decimal
          precision: 8
          scale: 2
        - name: crd_cost_per_mile
          display_name: cost_per_mile
          type: currency
          precision: 4
        - name: crd_trend_vs_fleet_avg
          display_name: trend_vs_fleet_avg
          type: text
          max_length: 100
        - name: crd_last_calculated_on
          display_name: last_calculated_on
          type: datetime

    - logical_name: crd_fuelanomalies
      display_name: FuelAnomalies
      description: Detected anomaly events with evidence and investigation status.
      ownership: organization
      primary_column:
        name: crd_name
        display_name: Anomaly Name
        type: text
        max_length: 200
      columns:
        - name: crd_anomaly_id
          display_name: anomaly_id
          type: text
          required: true
          max_length: 100
          is_alternate_key: true
        - name: crd_transaction_id
          display_name: transaction_id
          type: text
          required: true
          max_length: 100
        - name: crd_rule_code
          display_name: rule_code
          type: text
          required: true
          max_length: 100
        - name: crd_confidence_score
          display_name: confidence_score
          type: decimal
          precision: 4
          scale: 3
        - name: crd_evidence_json
          display_name: evidence_json
          type: multiline_text
          max_length: 4000
        - name: crd_status
          display_name: status
          type: choice
          options:
            - open
            - under_review
            - confirmed
            - dismissed
        - name: crd_detected_on
          display_name: detected_on
          type: datetime

    - logical_name: crd_fuelcards
      display_name: FuelCards
      description: Fuel card metadata and operational status.
      ownership: organization
      primary_column:
        name: crd_name
        display_name: Card Name
        type: text
        max_length: 200
      columns:
        - name: crd_card_number
          display_name: card_number
          type: text
          required: true
          max_length: 30
          is_alternate_key: true
        - name: crd_card_last4
          display_name: card_last4
          type: text
          required: true
          max_length: 4
        - name: crd_vehicle_id
          display_name: vehicle_id
          type: text
          max_length: 50
        - name: crd_driver_id
          display_name: driver_id
          type: text
          max_length: 50
        - name: crd_status
          display_name: status
          type: choice
          options:
            - active
            - suspended
            - closed
        - name: crd_daily_limit
          display_name: daily_limit
          type: currency
          precision: 2
        - name: crd_last_updated
          display_name: last_updated
          type: datetime

connectors:
  - name: FuelCardConnector
    type: custom
    description: Custom connector for fuel card provider API supporting WEX, Comdata, or Fleetcor. Provides named actions for transaction retrieval, card details, merchant lookup, and card suspension.
    configuration:
      base_url_env_var: FuelCardApiUrl
      authentication: api_key
      api_key_env_var: FuelCardApiKey
      api_key_header: x-api-key
    actions:
      - name: GetTransactions
        method: GET
        path: /transactions
        description: Retrieve fuel card transactions within a date range, optionally filtered by card number or vehicle ID.
        inputs:
          - name: cardNumber
            type: string
            required: false
          - name: vehicleId
            type: string
            required: false
          - name: fromDate
            type: string
            required: false
          - name: toDate
            type: string
            required: false
          - name: pageSize
            type: integer
            required: false
            default_value: 200
        outputs:
          - name: transactions
            type: array
          - name: totalCount
            type: integer
          - name: hasMore
            type: boolean
      - name: GetCardDetails
        method: GET
        path: /cards/{cardNumber}
        description: Retrieve card metadata, status, spending limits, and vehicle or driver assignment for a specific fuel card.
        inputs:
          - name: cardNumber
            type: string
            required: true
        outputs:
          - name: cardNumber
            type: string
          - name: cardLast4
            type: string
          - name: status
            type: string
          - name: vehicleId
            type: string
          - name: driverId
            type: string
          - name: dailyLimit
            type: number
          - name: monthlySpend
            type: number
      - name: GetMerchantInfo
        method: GET
        path: /merchants/{merchantId}
        description: Look up fuel station details including address, accepted card types, and current fuel prices.
        inputs:
          - name: merchantId
            type: string
            required: true
        outputs:
          - name: merchantName
            type: string
          - name: address
            type: string
          - name: latitude
            type: number
          - name: longitude
            type: number
          - name: fuelTypes
            type: array
          - name: currentDieselPrice
            type: number
          - name: currentGasolinePrice
            type: number
      - name: SuspendCard
        method: POST
        path: /cards/{cardNumber}/suspend
        description: Suspend a fuel card to prevent unauthorized transactions. Returns provider confirmation reference.
        inputs:
          - name: cardNumber
            type: string
            required: true
          - name: reason
            type: string
            required: false
        outputs:
          - name: status
            type: string
          - name: providerReference
            type: string
          - name: suspendedAt
            type: string
  - name: TelematicsApiHttp
    type: http
    description: HTTP connector for telematics route, location, and sensor context.
    configuration:
      base_url_env_var: TelematicsApiUrl
      authentication: api_key
      api_key_env_var: TelematicsApiKey
      api_key_header: x-api-key
  - name: FuelPriceApiHttp
    type: http
    description: HTTP connector for live fuel price lookups by geo region.
    configuration:
      base_url: https://api.fuelpriceservice.com/v1
      authentication: api_key
      api_key_env_var: FuelPriceApiKey
      api_key_header: x-api-key
  - name: Dataverse
    type: first_party
    description: Dataverse connector for transactional storage, anomaly records, and profiles.

flows:
  - name: IngestFuelTransactions
    trigger: recurrence_hourly
    description: Pulls new fuel card transactions from the provider every hour, enriches each record with vehicle class, driver name, and route correlation from Dataverse and telematics, then upserts into the FuelTransactions table.
    steps:
      - action: connector_action
        connector: FuelCardConnector
        action_name: GetTransactions
        params:
          fromDate: "{last_run_timestamp}"
          pageSize: 200
      - action: parse_json
      - action: for_each
        input: transactions
        steps:
          - action: get_row
            connector: Dataverse
            table: VehicleMaster
            filter: crd_vehicle_id eq transaction.vehicle_id
            output: vehicle_record
          - action: get_row
            connector: Dataverse
            table: DriverMaster
            filter: crd_driver_id eq transaction.driver_id
            output: driver_record
          - action: http_get
            connector: TelematicsApiHttp
            path: /route/correlation
            params:
              vehicleId: "{transaction.vehicle_id}"
              timestamp: "{transaction.timestamp}"
            output: route_context
          - action: upsert_dataverse
            connector: Dataverse
            table: FuelTransactions
            key: crd_transaction_id
            enrichment:
              vehicle_class: "{vehicle_record.vehicle_class}"
              driver_name: "{driver_record.driver_name}"
              route_id: "{route_context.route_id}"
              route_deviation_miles: "{route_context.deviation_miles}"

  - name: DetectAnomalies
    trigger: on_fueltransactions_create_or_update
    description: Evaluates each new or updated FuelTransactions record against all enabled FuelAnomalyRules and writes FuelAnomalies records. Sends email alert for high or critical severity findings.
    steps:
      - action: list_rows
        connector: Dataverse
        table: FuelAnomalyRules
        filter: crd_enabled eq true
      - action: http_get
        connector: TelematicsApiHttp
        path: /vehicle/context
      - action: evaluate_rules
        rule_evaluations:
          - rule_type: tank_capacity_overfill
            condition: transaction.gallons > vehicle_record.tank_capacity_gallons + threshold_value
          - rule_type: multiple_fills_short_period
            condition: prior_fill_count_within_hours(transaction.card_number, threshold_value) > 1
          - rule_type: off_route_fueling
            condition: distance_from_route(transaction.location_lat, transaction.location_lon, route_context.route_id) > threshold_value
          - rule_type: price_above_market
            condition: transaction.price_per_gallon > market_price * (1 + threshold_value / 100)
          - rule_type: after_hours_fueling
            condition: transaction_hour_local(transaction.timestamp) < operating_start_hour or transaction_hour_local(transaction.timestamp) > operating_end_hour
      - action: create_rows
        connector: Dataverse
        table: FuelAnomalies
      - action: send_email
        to_env_var: FinanceAlertEmail
        condition: high_or_critical

  - name: GetFuelPrices
    trigger: instant_from_agent
    description: Returns nearby fuel stations with route-aware ranking.
    inputs:
      - location
      - routeId
    outputs:
      - recommendations
    steps:
      - action: http_get
        connector: FuelPriceApiHttp
        path: /prices/nearby
      - action: transform_rank
      - action: respond_to_agent

  - name: SuspendFuelCard
    trigger: instant_from_agent
    description: Suspends a fuel card through the provider API using the SuspendCard action and updates the Dataverse FuelCards table.
    inputs:
      - cardLast4
      - action
    outputs:
      - status
      - providerReference
    steps:
      - action: get_row
        connector: Dataverse
        table: FuelCards
        filter: crd_card_last4 eq cardLast4 and crd_status eq 'active'
        output: card_record
      - action: connector_action
        connector: FuelCardConnector
        action_name: SuspendCard
        params:
          cardNumber: "{card_record.card_number}"
          reason: "Suspended via Fuel Tracking agent — action: {action}"
      - action: update_row
        connector: Dataverse
        table: FuelCards
      - action: respond_to_agent

  - name: GetVehicleFuelProfile
    trigger: instant_from_agent
    description: Computes and returns vehicle profile metrics for agent responses.
    inputs:
      - vehicleId
    outputs:
      - avgMpg
      - fillFrequency
      - costPerMile
      - trendVsFleetAvg
    steps:
      - action: query_dataverse
        connector: Dataverse
        table: FuelTransactions
      - action: compute_profile_metrics
      - action: upsert_dataverse
        connector: Dataverse
        table: VehicleFuelProfiles
      - action: respond_to_agent

  - name: GetVehicleTankLevel
    trigger: instant_from_agent
    description: >
      Reads current tank level percentage and capacity from VehicleMaster,
      enriched with the latest telematics sensor reading. Called by Route
      Optimizer during fuel-route correlation to determine whether fuel stop
      insertion is needed.
    inputs:
      - vehicleId
    outputs:
      - tankLevelPct
      - tankCapacityGallons
      - fuelType
      - estimatedRangeMiles
    steps:
      - action: get_row
        connector: Dataverse
        table: VehicleMaster
        key: crd_vehicle_id
        filter: crd_vehicle_id eq vehicleId
      - action: http_get
        connector: TelematicsApiHttp
        path: /vehicle/fuel-level
        params:
          vehicleId: "{vehicleId}"
      - action: merge_telematics_with_master
      - action: respond_to_agent

  - name: GetFuelCardForVehicle
    trigger: instant_from_agent
    description: >
      Returns the active fuel card record associated with the given vehicle.
      Used by the Fuel Card Breakdown Check topic to identify which card may
      need suspension after a breakdown.
    inputs:
      - vehicleId
    outputs:
      - cardLast4
      - cardStatus
      - cardNumber
    steps:
      - action: get_row
        connector: Dataverse
        table: FuelCards
        filter: crd_vehicle_id eq vehicleId and crd_status eq 'active'
      - action: respond_to_agent

  - name: CheckFuelCardOnBreakdown
    trigger: http_post
    description: >
      HTTP-triggered entry point called by Fleet Coordinator's
      TriggerCrossAgentEscalation flow when a breakdown incident is reported.
      Looks up the vehicle's fuel card, presents a suspension decision to the
      dispatcher, and executes suspension if confirmed. Returns card action
      status to the calling flow.
    inputs:
      - vehicle_id
      - incident_id
    outputs:
      - card_action_taken
      - card_last4
      - provider_reference
    steps:
      - action: call_flow
        flow: GetFuelCardForVehicle
        input:
          vehicleId: "{vehicle_id}"
      - action: condition
        if: cardStatus = 'active'
        then:
          - action: send_adaptive_card_with_override
            channel: teams
            title: "Fuel Card Check — Broken Down Vehicle"
            body: "Vehicle {vehicle_id} is stranded (Incident {incident_id}). Suspend fuel card ending {cardLast4}?"
            buttons:
              - label: Suspend Card
                value: suspend
              - label: Leave Active
                value: skip
          - action: condition
            if: dispatcher_response = suspend
            then:
              - action: call_flow
                flow: SuspendFuelCard
                input:
                  cardLast4: "{cardLast4}"
                  action: suspend
      - action: http_response
        status: 200
        body:
          card_action_taken: "{card_action_taken}"
          card_last4: "{cardLast4}"
          provider_reference: "{providerReference}"

  - name: GetFuelSummary
    trigger: instant_from_agent
    description: Aggregates fuel spend, budget variance, and segment breakdowns for a given fleet and period. Returns totals and breakdown tables for the Fuel Summary topic.
    inputs:
      - period
      - fleet
    outputs:
      - totalSpend
      - budget
      - budgetVariance
      - topRegion
      - topVehicleSegment
      - byFleetTable
      - byRegionTable
      - byVehicleClassTable
    steps:
      - action: query_dataverse
        connector: Dataverse
        table: FuelTransactions
        filter: crd_timestamp ge period_start and crd_timestamp le period_end
        aggregate:
          - sum(crd_total_cost) as totalSpend
          - group_by(crd_vehicle_class) as byVehicleClassTable
          - group_by(crd_region) as byRegionTable
      - action: compute_budget_variance
      - action: respond_to_agent

  - name: GetDriverEfficiencyRanking
    trigger: instant_from_agent
    description: Ranks drivers by normalized MPG adjusted for load, route type, and seasonal factors for a given reporting period.
    inputs:
      - period
    outputs:
      - driverRankingTable
    steps:
      - action: query_dataverse
        connector: Dataverse
        table: FuelTransactions
        filter: crd_timestamp ge period_start and crd_timestamp le period_end
        join:
          - table: DriverMaster
            on: crd_driver_id
      - action: compute_normalized_mpg
      - action: respond_to_agent

  - name: GetFuelTransactions
    trigger: instant_from_agent
    description: Returns filtered fuel card transactions by card last-4, vehicle ID, or date range with merchant and location details.
    inputs:
      - cardLast4
      - vehicleId
      - dateFrom
      - dateTo
    outputs:
      - transactionCount
      - transactionResultTable
    steps:
      - action: query_dataverse
        connector: Dataverse
        table: FuelTransactions
        filter: >
          (cardLast4 eq null or crd_card_number endswith cardLast4)
          and (vehicleId eq null or crd_vehicle_id eq vehicleId)
          and (dateFrom eq null or crd_timestamp ge dateFrom)
          and (dateTo eq null or crd_timestamp le dateTo)
        order_by: crd_timestamp desc
      - action: respond_to_agent

  - name: GetFuelAnomalies
    trigger: instant_from_agent
    description: Returns open and under-review fuel anomalies for a given period with rule type and confidence score.
    inputs:
      - period
    outputs:
      - anomalyCount
      - ruleTypeSummary
      - anomalyTable
      - topAnomalyTransactionId
      - topAnomalyCardLast4
    steps:
      - action: query_dataverse
        connector: Dataverse
        table: FuelAnomalies
        filter: >
          crd_detected_on ge period_start
          and crd_status in ('open', 'under_review')
        order_by: crd_confidence_score desc
      - action: compute_rule_type_summary
      - action: respond_to_agent

  - name: InvestigateFuelTransaction
    trigger: instant_from_agent
    description: >
      Pulls full investigation context for a specific transaction: anomaly record,
      GPS location at time of fill, driver assignment, route history, prior
      transactions in the past 30 days, and telematics fuel-level reading.
      Returns an evidence summary used by the Anomaly Investigation topic.
    inputs:
      - transactionId
    outputs:
      - ruleType
      - confidenceScore
      - evidenceSummary
      - gpsLocationAtFill
      - routeDeviationMiles
      - driverName
      - driverId
      - vehicleId
      - routeName
      - routeId
      - priorTransactionCount
      - telematicsFuelReading
      - telematicsConsistency
      - cardLast4
      - anomalyId
    steps:
      - action: get_row
        connector: Dataverse
        table: FuelTransactions
        filter: crd_transaction_id eq transactionId
        output: transaction_record
      - action: get_row
        connector: Dataverse
        table: FuelAnomalies
        filter: crd_transaction_id eq transactionId
        order_by: crd_confidence_score desc
        output: anomaly_record
      - action: http_get
        connector: TelematicsApiHttp
        path: /vehicle/gps-at-time
        params:
          vehicleId: "{transaction_record.vehicle_id}"
          timestamp: "{transaction_record.timestamp}"
        output: gps_context
      - action: get_row
        connector: Dataverse
        table: DriverMaster
        filter: crd_driver_id eq transaction_record.driver_id
        output: driver_record
      - action: http_get
        connector: TelematicsApiHttp
        path: /route/history
        params:
          vehicleId: "{transaction_record.vehicle_id}"
          timestamp: "{transaction_record.timestamp}"
        output: route_history
      - action: count_rows
        connector: Dataverse
        table: FuelTransactions
        filter: >
          crd_card_number eq transaction_record.card_number
          and crd_timestamp ge prior_30_days
          and crd_transaction_id ne transactionId
        output: prior_transaction_count
      - action: http_get
        connector: TelematicsApiHttp
        path: /vehicle/fuel-level-at-time
        params:
          vehicleId: "{transaction_record.vehicle_id}"
          timestamp: "{transaction_record.timestamp}"
        output: telematics_fuel
      - action: connector_action
        connector: FuelCardConnector
        action_name: GetMerchantInfo
        params:
          merchantId: "{transaction_record.merchant_id}"
        output: merchant_record
      - action: respond_to_agent

  - name: ProactiveAnomalyAlert
    trigger: on_fuelanomalies_create
    description: >
      Proactively notifies fleet managers via Teams adaptive card when a new
      high or critical severity anomaly is written to the FuelAnomalies table.
      The card includes evidence details and one-click actions: Investigate,
      Suspend Card, and Dismiss.
    steps:
      - action: condition
        if: anomaly_record.severity in ('high', 'critical')
        then:
          - action: get_row
            connector: Dataverse
            table: FuelTransactions
            filter: crd_transaction_id eq anomaly_record.transaction_id
            output: transaction_record
          - action: get_row
            connector: Dataverse
            table: FuelCards
            filter: crd_card_number eq transaction_record.card_number
            output: card_record
          - action: send_adaptive_card
            channel: teams
            recipient_env_var: FinanceAlertEmail
            title: "Fuel Anomaly Detected — {anomaly_record.rule_type}"
            body: >
              Anomaly ID: {anomaly_record.anomaly_id}
              Transaction: {anomaly_record.transaction_id}
              Vehicle: {transaction_record.vehicle_id}
              Card ending: {card_record.card_last4}
              Confidence: {anomaly_record.confidence_score}
              Evidence: {anomaly_record.evidence_json}
            actions:
              - type: Action.Submit
                title: Investigate
                data:
                  action: investigate
                  transaction_id: "{anomaly_record.transaction_id}"
              - type: Action.Submit
                title: Suspend Card
                data:
                  action: suspend_card
                  card_last4: "{card_record.card_last4}"
              - type: Action.Submit
                title: Dismiss
                data:
                  action: dismiss
