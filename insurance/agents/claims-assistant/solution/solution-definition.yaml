# Copilot Studio Solution Definition — Claims Assistant (Enterprise P&C)

solution:
  name: InsuranceClaimsAssistant
  display_name: "Insurance - Claims Assistant Enterprise"
  version: "2.1.0"
  publisher: Copilot Agent Development
  description: >
    Enterprise multi-line P&C claims assistant solution with FNOL intake,
    state compliance management, fraud signal collection, SLA monitoring,
    CAT event operations, and dual channel deployment.

environment_variables:
  - name: ClaimsManagementApiBaseUrl
    display_name: Claims Management API Base URL
    type: string
    description: Guidewire ClaimCenter or Duck Creek API base URL.
    default_value: ""

  - name: ClaimsManagementApiClientId
    display_name: Claims Management API Client ID
    type: string
    description: OAuth client ID for claims management API.
    default_value: ""

  - name: ClaimsManagementApiClientSecret
    display_name: Claims Management API Client Secret
    type: secret
    description: OAuth client secret for claims management API.
    default_value: ""

  - name: DocumentStorageBaseUrl
    display_name: Document Storage Base URL
    type: string
    description: Base URL for enterprise claim document storage.
    default_value: ""

  - name: PaymentGatewayApiBaseUrl
    display_name: Payment Gateway API Base URL
    type: string
    description: API endpoint for claim payment status retrieval.
    default_value: ""

  - name: HandlerEscalationQueueEmail
    display_name: Handler Escalation Queue Email
    type: string
    description: Email distribution for urgent and human-required claim escalations.
    default_value: ""

  - name: StateComplianceDefaultTimezone
    display_name: State Compliance Default Timezone
    type: string
    description: Default timezone for SLA deadline calculation.
    default_value: "America/Chicago"

  - name: ActuarialApiBaseUrl
    display_name: Actuarial API Base URL
    type: string
    description: Base URL of the actuarial and reserving system REST API.
    default_value: ""

  - name: ActuarialApiTokenUrl
    display_name: Actuarial API OAuth Token URL
    type: string
    description: OAuth 2.0 token endpoint for the actuarial system client credentials flow.
    default_value: ""

  - name: ActuarialApiClientId
    display_name: Actuarial API OAuth Client ID
    type: string
    description: OAuth client ID registered with the actuarial system identity provider.
    default_value: ""

  - name: ActuarialApiClientSecret
    display_name: Actuarial API OAuth Client Secret
    type: secret
    description: OAuth client secret for the actuarial system. Stored as a secret environment variable.
    default_value: ""

components:
  dataverse_tables:
    - name: ClaimRecords
      display_name: Claim Records
      description: Master claim intake and lifecycle record.
      columns:
        - ClaimReference
        - PolicyNumber
        - StateCode
        - LineOfBusiness
        - IncidentDateTime
        - ClaimStatus
        - PaymentStatus
        - AssignedAdjusterId
        - CatEventFlag
        - CreatedOn

    - name: FraudSignals
      display_name: Fraud Signals
      description: Intake fraud indicators and composite fraud score.
      columns:
        - ClaimReference
        - ReportDelayDays
        - DescriptionDamageMismatch
        - PriorClaimFrequency
        - GeographicAnomalyScore
        - FraudScore
        - RiskTier
        - CreatedOn

    - name: StateComplianceRules
      display_name: State Compliance Rules
      description: State and line specific regulatory timelines and disclosures.
      columns:
        - StateCode
        - LineOfBusiness
        - AcknowledgementDueDays
        - PaymentDueDaysFromProof
        - RequiredFraudDisclosureText
        - EscalationThresholdHours
        - EffectiveDate

    - name: SlaTracking
      display_name: SLA Tracking
      description: Claim-level SLA monitoring and breach indicators.
      columns:
        - ClaimReference
        - AcknowledgementDueDateTime
        - PaymentDueDateTime
        - SlaStatus
        - LastEvaluatedOn
        - BreachReason

    - name: AdjusterCapacity
      display_name: Adjuster Capacity
      description: Adjuster assignment capacity and queue balancing metadata.
      columns:
        - AdjusterId
        - StateCode
        - LineOfBusiness
        - MaxOpenClaims
        - CurrentOpenClaims
        - AvailabilityStatus

    - name: ActuarialReserveEstimates
      display_name: Actuarial Reserve Estimates
      description: Initial reserve estimates returned by the actuarial system during FNOL intake.
      columns:
        - ClaimReference
        - SuggestedReserveAmount
        - ReserveConfidenceLevel
        - ComparableClaimCount
        - ReserveBasis
        - CalculatedAt
        - AdjusterReviewedFlag
        - AdjusterApprovedReserve
        - ReviewedBy
        - ReviewedOn

    - name: LossDevelopmentData
      display_name: Loss Development Data
      description: IBNR estimates and loss development query results cached from the actuarial system.
      columns:
        - PeriodLabel
        - LineOfBusiness
        - StateCode
        - IbnrEstimate
        - IbnrLow
        - IbnrHigh
        - DevelopmentMethod
        - EvaluatedThrough
        - RetrievedOn

  ai_builder:
    - name: ClaimDocumentOCR
      display_name: Claim Document OCR
      description: AI Builder OCR model for police reports and repair estimates.
      model_type: document_processing
      use_cases:
        - police_report_extraction
        - repair_estimate_extraction

  agents:
    - name: ClaimsAssistant
      template_file: ../templates/agent-template.yaml
      knowledge_sources:
        - id: policy-knowledge
          type: sharepoint
          url: "${DocumentStorageBaseUrl}"
      authentication:
        modes:
          - type: azure_ad_b2c
            audience: external_policyholders
            allow_unauthenticated: false
          - type: azure_ad
            audience: internal_claims_handlers
            allow_unauthenticated: false

  power_automate_flows:
    - name: CreateClaimRecord
      description: Creates claim records and receives generated claim number.
      trigger: copilot_studio_topic_action
      connector: http
      dependencies:
        - ClaimRecords
        - ClaimsManagementApiBaseUrl

    - name: GetClaimStatus
      description: Retrieves claim, adjuster, and payment status details.
      trigger: copilot_studio_topic_action
      connector: http
      dependencies:
        - ClaimRecords
        - PaymentGatewayApiBaseUrl

    - name: CalculateFraudScore
      description: Computes intake fraud signals and risk score.
      trigger: copilot_studio_topic_action
      connector: dataverse
      dependencies:
        - FraudSignals

    - name: CheckSlaCompliance
      description: Calculates SLA due windows and breach risk by state.
      trigger: scheduled
      connector: dataverse
      schedule: "*/15 * * * *"
      dependencies:
        - SlaTracking
        - StateComplianceRules

    - name: ActivateCatMode
      description: Activates catastrophe routing and expedited intake mode.
      trigger: copilot_studio_topic_action
      connector: dataverse
      dependencies:
        - StateComplianceRules
        - AdjusterCapacity

    - name: EstimateInitialReserve
      description: >
        Calls the actuarial system API to calculate an initial reserve amount during
        FNOL intake. Passes claim type, severity indicators, and historical context
        to the actuarial API and returns the suggested reserve for adjuster review.
        Result is stored in ActuarialReserveEstimates table.
      trigger: copilot_studio_topic_action
      connector: ActuarialSystemConnector
      dependencies:
        - ActuarialApiBaseUrl
        - ActuarialApiClientId
        - ActuarialApiClientSecret
        - ActuarialApiTokenUrl
        - ActuarialReserveEstimates

    - name: GetIbnrEstimate
      description: >
        Queries the actuarial reserving system for the IBNR estimate for a specified
        reporting period and line of business. Caches results in LossDevelopmentData.
      trigger: copilot_studio_topic_action
      connector: ActuarialSystemConnector
      dependencies:
        - ActuarialApiBaseUrl
        - ActuarialApiClientId
        - ActuarialApiClientSecret
        - ActuarialApiTokenUrl
        - LossDevelopmentData

    - name: GetClaimsTrendAnalysis
      description: >
        Retrieves claims frequency, severity, and loss ratio trend data from the
        actuarial analytics API for a specified line of business and region.
      trigger: copilot_studio_topic_action
      connector: ActuarialSystemConnector
      dependencies:
        - ActuarialApiBaseUrl
        - ActuarialApiClientId
        - ActuarialApiClientSecret
        - ActuarialApiTokenUrl

    - name: GetPeerClaimComparison
      description: >
        Compares a specific claim's reserve and open duration against a peer set
        of similar historical claims using the actuarial API peer comparison endpoint.
      trigger: copilot_studio_topic_action
      connector: ActuarialSystemConnector
      dependencies:
        - ActuarialApiBaseUrl
        - ActuarialApiClientId
        - ActuarialApiClientSecret
        - ActuarialApiTokenUrl

connections:
  - connector: http
    display_name: HTTP (Claims and Payment APIs)
  - connector: dataverse
    display_name: Microsoft Dataverse
  - connector: sharepoint
    display_name: SharePoint Document Storage
  - connector: ai_builder
    display_name: AI Builder OCR
  - connector: office365_outlook
    display_name: Office 365 Outlook
  - connector: ActuarialSystemConnector
    display_name: Actuarial System API
    connector_file: ../connectors/actuarial-system-connector.yaml
    connection_reference: cr_actuarial_insurance
    authentication: oauth2_client_credentials

channels:
  - type: custom_website
    enabled: true
    display_name: Policyholder Web Portal
    authentication: azure_ad_b2c
    embed_type: webchat
  - type: microsoft_teams
    enabled: true
    display_name: Claims Handler Teams Channel
    authentication: azure_ad
    require_admin_approval: true
