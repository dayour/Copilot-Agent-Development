# Topic: Escalate
# Transfers conversation to a human claims handler with context.
# Docs: https://learn.microsoft.com/microsoft-copilot-studio/authoring-create-edit-topics

kind: AdaptiveDialog
modelDescription: |-
  Transfer the conversation to a human claims handler. Used when the
  policyholder requests human assistance, an attorney is involved,
  bodily injury requires licensed adjuster judgment, or any situation
  exceeds the agent's authorized scope.
startBehavior: CancelOtherTopics

beginDialog:
  kind: OnEscalate
  id: main
  intent:
    displayName: Escalate
    includeInOnSelectIntent: false
    triggerQueries:
      - talk to a person
      - I need a human
      - connect me to a claims handler
      - I want to speak to an adjuster
      - I have an attorney
      - this needs escalation

  actions:
    - kind: SendActivity
      id: esc_msg
      conversationOutcome: Escalated
      activity: |-
        I am transferring you to a claims handler now. They will have the context from our conversation.
        Please hold while I connect you.
