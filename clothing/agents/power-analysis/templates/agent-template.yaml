# Copilot Studio Agent Template — Power Analysis (Clothing Retail)
# Analytical-reasoning-focused topic design with decomposition and context passing.

agent:
  name: Power Analysis
  description: >
    A deep reasoning analytics agent for global clothing retail operations.
    It decomposes complex business questions into sequenced sub-queries across
    sales, inventory, staffing, and external factors using Dataverse and Power BI.
  language: en-US
  orchestration_mode: generative
  fallback_message: >
    I could not complete the analysis with the available context. Please provide
    store, period, and metric scope, or ask for a guided root cause workflow.

global_variables:
  - name: Analysis.Store
    type: string
  - name: Analysis.Period
    type: string
  - name: Analysis.Category
    type: string
  - name: Analysis.Brand
    type: string
  - name: Analysis.Channel
    type: string
  - name: Analysis.Question
    type: string
  - name: Analysis.ContextSummary
    type: string

topics:

  - name: Greeting
    description: Introduces analytical capabilities and offers guided reasoning paths.
    trigger_phrases:
      - hello
      - hi
      - start analysis
      - analyze store performance
      - show retail insights
    messages:
      - text: >
          You are connected to Power Analysis. I can run decomposition analysis,
          comparative benchmarking, trend detection, what-if simulation, and anomaly review.
          Which analytical task should we run?
    quick_replies:
      - Sales performance analysis
      - Root cause analysis
      - Inventory intelligence
      - Trend detection
      - What-if analysis
      - Anomaly alerts

  - name: Sales Performance
    description: >
      Returns core retail KPIs by store, category, brand, and channel with explicit formulas.
    trigger_phrases:
      - analyze sales performance
      - sales kpis for {store}
      - compare sales by {channel}
      - show sell through and gmroi
    entities:
      - name: store
        type: string
        prompt: Specify store or region. Use All Stores for enterprise view.
      - name: category
        type: string
        prompt: Specify category or use All Categories.
      - name: brand
        type: string
        prompt: Specify brand or use All Brands.
      - name: channel
        type: choice
        options: [all, store, ecommerce, outlet, marketplace]
        default: all
        prompt: Select selling channel.
      - name: period
        type: choice
        options: [this week, last week, this month, last month, quarter to date, year to date]
        default: this month
        prompt: Select analysis period.
    actions:
      - type: set_variable
        variable: Analysis.Store
        value: "{store}"
      - type: set_variable
        variable: Analysis.Period
        value: "{period}"
      - type: set_variable
        variable: Analysis.Category
        value: "{category}"
      - type: set_variable
        variable: Analysis.Brand
        value: "{brand}"
      - type: set_variable
        variable: Analysis.Channel
        value: "{channel}"
      - type: power_automate_flow
        flow_name: MultiMeasureQuery
        input:
          dataset_id: "${PowerBiDatasetId}"
          query_template: SalesPerformance
          filters:
            store: "{store}"
            category: "{category}"
            brand: "{brand}"
            channel: "{channel}"
            period: "{period}"
          measures:
            - "SellThroughRate = (Units Sold / Units Received) * 100"
            - "GMROI = Gross Margin / Average Inventory Cost"
            - "WeeksOfCover = Ending Inventory / Average Weekly Sales"
            - "StockTurn = COGS / Average Inventory Cost"
            - "OpenToBuy = Planned Inventory - (On Order + Current Inventory)"
        output_message: >
          Sales Performance Summary
          Scope: Store={store}; Category={category}; Brand={brand}; Channel={channel}; Period={period}
          - Sell-Through Rate (Units Sold / Units Received x 100): {sell_through_rate_pct}
          - GMROI (Gross Margin / Average Inventory Cost): {gmroi}
          - Weeks of Cover (Ending Inventory / Average Weekly Sales): {weeks_of_cover}
          - Stock Turn (COGS / Average Inventory Cost): {stock_turn}
          - Open-to-Buy (Planned - On Order - Current Inventory): {open_to_buy}

  - name: Root Cause Analysis
    description: >
      Decomposes underperformance questions into sequenced diagnostics and synthesizes drivers.
    trigger_phrases:
      - why did {store} underperform
      - root cause for low performance
      - explain underperformance for {store}
      - investigate performance drop
    entities:
      - name: store
        type: string
        prompt: Which store or store cluster is under review?
      - name: period
        type: choice
        options: [this week, last week, this month, last month, quarter to date]
        default: this month
        prompt: Which period should be diagnosed?
    actions:
      - type: set_variable
        variable: Analysis.Store
        value: "{store}"
      - type: set_variable
        variable: Analysis.Period
        value: "{period}"
      - type: set_variable
        variable: Analysis.Question
        value: "Root cause analysis"
      - type: redirect_to_topic
        target_topic: RCA - Sales Diagnostics

  - name: RCA - Sales Diagnostics
    description: Step 1 for root cause analysis. Validates demand and conversion movement.
    actions:
      - type: power_automate_flow
        flow_name: MultiMeasureQuery
        input:
          dataset_id: "${PowerBiDatasetId}"
          query_template: RCASalesDiagnostics
          filters:
            store: "{Analysis.Store}"
            period: "{Analysis.Period}"
      - type: set_variable
        variable: Analysis.ContextSummary
        value: "{sales_diagnostic_summary}"
      - type: redirect_to_topic
        target_topic: RCA - Inventory Diagnostics

  - name: RCA - Inventory Diagnostics
    description: Step 2 for root cause analysis. Tests stock availability and assortment health.
    actions:
      - type: power_automate_flow
        flow_name: MultiMeasureQuery
        input:
          dataset_id: "${PowerBiDatasetId}"
          query_template: RCAInventoryDiagnostics
          filters:
            store: "{Analysis.Store}"
            period: "{Analysis.Period}"
      - type: set_variable
        variable: Analysis.ContextSummary
        value: "{Analysis.ContextSummary}; {inventory_diagnostic_summary}"
      - type: redirect_to_topic
        target_topic: RCA - Staffing and External Factors

  - name: RCA - Staffing and External Factors
    description: Step 3 for root cause analysis. Assesses labor coverage and external disruptions.
    actions:
      - type: power_automate_flow
        flow_name: MultiMeasureQuery
        input:
          dataset_id: "${PowerBiDatasetId}"
          query_template: RCAStaffingExternal
          filters:
            store: "{Analysis.Store}"
            period: "{Analysis.Period}"
      - type: redirect_to_topic
        target_topic: RCA - Synthesis and Recommendations

  - name: RCA - Synthesis and Recommendations
    description: Step 4 for root cause analysis. Produces ranked drivers and corrective actions.
    actions:
      - type: prompt
        prompt_name: RootCauseSynthesisPrompt
        input:
          store: "{Analysis.Store}"
          period: "{Analysis.Period}"
          sales_summary: "{sales_diagnostic_summary}"
          inventory_summary: "{inventory_diagnostic_summary}"
          staffing_external_summary: "{staffing_external_summary}"
      - type: message
        text: >
          Root Cause Analysis for {Analysis.Store} ({Analysis.Period})
          Primary Drivers:
          {root_cause_ranked_drivers}
          Recommended Actions:
          {root_cause_recommended_actions}

  - name: Inventory Intelligence
    description: >
      Detects stock risk and proposes reorder actions using weeks of cover thresholds.
    trigger_phrases:
      - inventory intelligence for {store}
      - stock risk by category
      - reorder recommendation
      - where is weeks cover low
    entities:
      - name: store
        type: string
        prompt: Specify store or use All Stores.
      - name: category
        type: string
        prompt: Specify category or use All Categories.
      - name: weeks_cover_threshold
        type: number
        prompt: Enter minimum acceptable weeks of cover.
        default: 4
    actions:
      - type: power_automate_flow
        flow_name: MultiMeasureQuery
        input:
          dataset_id: "${PowerBiDatasetId}"
          query_template: InventoryIntelligence
          filters:
            store: "{store}"
            category: "{category}"
            weeks_cover_threshold: "{weeks_cover_threshold}"
      - type: message
        text: >
          Inventory Intelligence
          Scope: Store={store}; Category={category}
          - Low Cover SKUs: {low_cover_sku_count}
          - Overstock SKUs: {overstock_sku_count}
          - Recommended Reorder Units: {recommended_reorder_units}
          - Priority Actions: {inventory_actions}

  - name: Trend Detection
    description: >
      Performs period-over-period comparisons and generates narrative insights.
    trigger_phrases:
      - detect sales trends
      - compare this period vs prior period
      - trend analysis by brand
      - show growth and decline drivers
    entities:
      - name: current_period
        type: string
        prompt: Enter current period (for example 2025-W14 or 2025-03).
      - name: comparison_period
        type: string
        prompt: Enter comparison period.
      - name: dimension
        type: choice
        options: [store, category, brand, channel]
        default: category
        prompt: Select comparison dimension.
    actions:
      - type: power_automate_flow
        flow_name: TrendAnalysis
        input:
          current_period: "{current_period}"
          comparison_period: "{comparison_period}"
          dimension: "{dimension}"
      - type: prompt
        prompt_name: TrendInsightNarrativePrompt
        input:
          trend_data: "{trend_result_payload}"
      - type: message
        text: >
          Trend Detection Result
          - Largest Positive Contributor: {top_positive_driver}
          - Largest Negative Contributor: {top_negative_driver}
          - Net Change: {net_change_pct}
          - Insight Narrative: {trend_insight_narrative}

  - name: What-If Analysis
    description: Projects KPI impact from scenario parameter changes.
    trigger_phrases:
      - run what if analysis
      - project impact of markdown change
      - simulate demand uplift
      - forecast gmroi under scenario
    entities:
      - name: markdown_change_pct
        type: number
        prompt: Enter markdown percentage change (for example -5 or +3).
      - name: demand_uplift_pct
        type: number
        prompt: Enter expected demand uplift percentage.
      - name: cost_inflation_pct
        type: number
        prompt: Enter expected cost inflation percentage.
      - name: scope
        type: string
        prompt: Specify scope (store, category, brand, or enterprise).
    actions:
      - type: power_automate_flow
        flow_name: WhatIfScenario
        input:
          markdown_change_pct: "{markdown_change_pct}"
          demand_uplift_pct: "{demand_uplift_pct}"
          cost_inflation_pct: "{cost_inflation_pct}"
          scope: "{scope}"
      - type: message
        text: >
          What-If Scenario Output
          Scope: {scope}
          - Projected Revenue: {projected_revenue}
          - Projected Gross Margin: {projected_gross_margin}
          - Projected STR: {projected_sell_through}
          - Projected GMROI: {projected_gmroi}
          - Recommendation: {scenario_recommendation}

  - name: Anomaly Alerts
    description: Detects metric deviations and optionally triggers proactive notifications.
    trigger_phrases:
      - show anomaly alerts
      - detect unusual performance
      - where are kpis out of range
      - run anomaly detection
    entities:
      - name: period
        type: choice
        options: [today, yesterday, this week, last week, this month]
        default: today
        prompt: Select anomaly detection period.
      - name: zscore_threshold
        type: number
        default: 2
        prompt: Enter anomaly sensitivity threshold in standard deviations.
    actions:
      - type: power_automate_flow
        flow_name: AnomalyDetection
        input:
          period: "{period}"
          zscore_threshold: "{zscore_threshold}"
      - type: condition
        expression: "{anomaly_count} > 0"
        true_actions:
          - type: power_automate_flow
            flow_name: SendAnomalyAlertNotification
            input:
              teams_channel_id: "${AnalyticsTeamsChannelId}"
              anomaly_summary: "{anomaly_summary}"
          - type: message
            text: >
              Anomalies detected: {anomaly_count}
              Summary: {anomaly_summary}
              Notification has been posted to the analytics channel.
        false_actions:
          - type: message
            text: >
              No statistically significant anomalies were detected for {period}
              at threshold {zscore_threshold}.
