# Copilot Studio Agent Template — Power Analysis (Clothing)
# Import this file as a starting point. Customise trigger phrases,
# Power BI measure names, and report IDs to match your retail data model.

agent:
  name: Power Analysis
  description: >
    A business intelligence agent for clothing retail organisations.
    Provides conversational access to sales performance, inventory analytics,
    trend insights, customer metrics, and operational KPIs via Power BI.
  language: en-US
  fallback_message: >
    I'm sorry, I couldn't find data for that query. Please try rephrasing,
    or ask me to show available reports and KPIs.

topics:

  - name: Greeting
    trigger_phrases:
      - Hello
      - Hi
      - Show me my data
      - What are my numbers?
      - Business overview
    messages:
      - text: >
          Hi! 📊 I'm Power Analysis, your retail BI assistant. I can pull
          sales figures, inventory data, trend insights, and operational KPIs
          directly from your Power BI reports. What would you like to explore?
    quick_replies:
      - Sales performance
      - Inventory analysis
      - Top trending SKUs
      - Customer analytics
      - Operational KPIs

  - name: Sales Performance
    trigger_phrases:
      - Show me sales for {period}
      - How did {store} perform {period}?
      - Revenue vs target for {period}
      - What were our sales {period}?
    entities:
      - name: period
        type: choice
        options: [today, yesterday, this week, last week, this month, last month, this quarter]
        default: today
        prompt: Which time period would you like sales data for?
      - name: store
        type: string
        prompt: Which store or region? (leave blank for all stores)
    actions:
      - type: power_automate_flow
        flow_name: QueryPowerBiMeasure
        input:
          dataset_id: "${PowerBiDatasetId}"
          measures:
            - "[Total Sales]"
            - "[Sales vs Target %]"
            - "[Number of Transactions]"
            - "[Average Basket Value]"
          filters:
            period: "{period}"
            store: "{store}"
        output_message: >
          **Sales — {store} — {period}**
          - Total Sales: {total_sales}
          - vs Target: {sales_vs_target}
          - Transactions: {num_transactions}
          - Avg Basket: {avg_basket_value}

  - name: Inventory Analysis
    trigger_phrases:
      - Show me inventory for {category}
      - Stock levels for {category}
      - What is overstocked?
      - What is understocked?
      - Sell-through rate for {category}
    entities:
      - name: category
        type: string
        prompt: Which product category? (leave blank for all categories)
    actions:
      - type: power_automate_flow
        flow_name: QueryPowerBiMeasure
        input:
          dataset_id: "${PowerBiDatasetId}"
          measures:
            - "[Stock on Hand Units]"
            - "[Sell-Through Rate %]"
            - "[Weeks Cover]"
            - "[Overstock SKU Count]"
            - "[Understock SKU Count]"
          filters:
            category: "{category}"
        output_message: >
          **Inventory — {category}**
          - Stock on Hand: {stock_on_hand} units
          - Sell-Through Rate: {sell_through_rate}
          - Weeks Cover: {weeks_cover}
          - Overstock SKUs: {overstock_sku_count}
          - Understock SKUs: {understock_sku_count}

  - name: Trend Insights
    trigger_phrases:
      - What are the top selling SKUs?
      - Show trending products
      - Best performers this {period}
      - What categories are growing?
    entities:
      - name: period
        type: choice
        options: [this week, last week, this month, last month, this season]
        default: this week
        prompt: Which period would you like trend data for?
    actions:
      - type: power_automate_flow
        flow_name: QueryPowerBiMeasure
        input:
          dataset_id: "${PowerBiDatasetId}"
          measures:
            - "[Top 5 SKUs by Revenue]"
            - "[Top 3 Growing Categories]"
            - "[New In Sell-Through Rate %]"
          filters:
            period: "{period}"
        output_message: >
          **Trends — {period}**
          Top SKUs: {top_5_skus}
          Growing Categories: {top_3_growing_categories}
          New In Sell-Through: {new_in_sell_through}

  - name: Customer Analytics
    trigger_phrases:
      - Show me customer metrics
      - What is our conversion rate?
      - Footfall for {period}
      - Loyalty programme stats
    entities:
      - name: period
        type: choice
        options: [today, this week, this month, last month]
        default: this week
        prompt: Which period would you like customer data for?
    actions:
      - type: power_automate_flow
        flow_name: QueryPowerBiMeasure
        input:
          dataset_id: "${PowerBiDatasetId}"
          measures:
            - "[Footfall]"
            - "[Conversion Rate %]"
            - "[Average Basket Value]"
            - "[Active Loyalty Members]"
            - "[Loyalty Redemption Rate %]"
          filters:
            period: "{period}"
        output_message: >
          **Customer Analytics — {period}**
          - Footfall: {footfall}
          - Conversion Rate: {conversion_rate}
          - Avg Basket: {avg_basket_value}
          - Active Loyalty Members: {active_loyalty_members}
          - Loyalty Redemption: {loyalty_redemption_rate}

  - name: Operational KPIs
    trigger_phrases:
      - Show operational KPIs
      - Labour cost ratio
      - Shrinkage report
      - Markdown rate
    actions:
      - type: power_automate_flow
        flow_name: QueryPowerBiMeasure
        input:
          dataset_id: "${PowerBiDatasetId}"
          measures:
            - "[Labour Cost as % of Sales]"
            - "[Shrinkage Rate %]"
            - "[Markdown Rate %]"
            - "[Return Rate %]"
        output_message: >
          **Operational KPIs — Current Period**
          - Labour Cost %: {labour_cost_pct}
          - Shrinkage Rate: {shrinkage_rate}
          - Markdown Rate: {markdown_rate}
          - Return Rate: {return_rate}

  - name: Open Report
    trigger_phrases:
      - Open the {report_name} report
      - Show me the {report_name} dashboard
      - Launch {report_name}
    entities:
      - name: report_name
        type: choice
        options: [Sales Dashboard, Inventory Report, Customer Analytics, Operations Report]
        prompt: Which report would you like to open?
    actions:
      - type: send_adaptive_card
        card:
          title: "{report_name}"
          body: "Click below to open the full report in Power BI."
          actions:
            - type: open_url
              title: "Open in Power BI"
              url: "https://app.powerbi.com/groups/${PowerBiWorkspaceId}/reports/${SalesDashboardReportId}"

  - name: KPI Glossary
    trigger_phrases:
      - What does {kpi} mean?
      - Define {kpi}
      - Explain {kpi}
    entities:
      - name: kpi
        type: string
        prompt: Which KPI or metric would you like explained?
    actions:
      - type: knowledge_search
        query: "definition {kpi} retail KPI"
        source: bi-glossary-library
    fallback_message: >
      I couldn't find a definition for that metric. Please check the BI glossary
      in SharePoint or contact your BI team.
