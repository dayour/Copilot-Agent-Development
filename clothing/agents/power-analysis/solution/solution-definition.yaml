  agents:
    - name: PowerAnalysis
      template_file: ../templates/agent-template.yaml
      knowledge_sources:
        - id: bi-glossary-library
          type: sharepoint
          url: "${BiGlossaryLibraryUrl}"
      authentication:
        type: azure_ad
        tenant_restriction: true

  power_automate_flows:
    - name: MultiMeasureQuery
      description: >
        Accepts an array of measures, filters, and grouping dimensions from a Copilot Studio
        topic action. Fans out parallel DAX queries against the Power BI semantic model
        (one query per requested measure group), then merges the results into a single unified
        dataset. Returns structured JSON for agent consumption so multi-metric analyses
        are answered in a single round-trip.
      trigger: copilot_studio_topic_action
      connector: power_bi
      input_parameters:
        - name: measures
          type: array
          items: string
          description: >
            List of DAX measure names to evaluate (e.g., [NetSalesAmount, GrossMarginPct,
            SellThroughRatePct]). Each measure is executed in its own parallel branch.
          required: true
        - name: filters
          type: object
          description: >
            Key-value pairs defining slicer context for the query: StoreId, RegionCode,
            CategoryCode, BrandName, Channel, StartDate, EndDate. All filters are optional;
            omitted filters apply no restriction.
          required: false
        - name: grouping_dimensions
          type: array
          items: string
          description: >
            Dimensions to include as rows in the result set (e.g., [StoreId, WeekKey]).
            Must match dimension table columns in the semantic model.
          required: true
        - name: period
          type: string
          description: >
            Shorthand period selector applied when StartDate/EndDate are omitted.
            Accepted values: CurrentWeek, LastWeek, CurrentMonth, LastMonth,
            QuarterToDate, YearToDate, Last52Weeks.
          required: false
      execution:
        strategy: parallel_fan_out
        description: >
          Each measure in the measures array is dispatched as an independent Power BI
          Execute Queries API call using the Apply to Each (parallel) pattern.
          Concurrency limit is 10 simultaneous branches.
        concurrency_limit: 10
        merge_strategy: >
          After all branches complete, results are joined on the shared grouping_dimensions
          keys using a left outer join. Measures with no data for a dimension key are
          populated as null. The merged dataset is sorted by the first grouping dimension
          in ascending order.
      output_schema:
        type: object
        properties:
          query_id:
            type: string
            description: Unique identifier for this query execution, used for caching and tracing.
          executed_at:
            type: string
            format: datetime
          measures_returned:
            type: array
            items: string
          rows:
            type: array
            description: >
              Each row contains values for all requested measures keyed by their DAX
              measure name, plus all grouping dimension values.
          total_row_count:
            type: integer
          data_as_of:
            type: string
            format: datetime
            description: Timestamp of the semantic model's most recent refresh.
          errors:
            type: array
            description: Per-measure errors when a specific DAX query fails. Partial results are returned.
      query_patterns:
        - SalesPerformance
        - RCASalesDiagnostics
        - RCAInventoryDiagnostics
        - RCAStaffingExternal
        - InventoryIntelligence
      retry_policy:
        max_retries: 3
        initial_delay_seconds: 10
        backoff_multiplier: 2
        max_delay_seconds: 80
      error_handling:
        partial_failure: return_available_measures_with_error_array
        full_failure: return_empty_rows_with_error_message

    - name: TrendAnalysis
      description: >
        Calculates rolling averages (7-day, 28-day, 52-week), period-over-period growth
        rates (WoW, MoM, YoY), and seasonal decomposition for any requested metric.
        Returns trend data with confidence intervals. Long-window requests (more than
        13 months) are routed to the Synapse workspace rather than querying Dataverse
        directly to avoid timeout on large row counts.
      trigger: copilot_studio_topic_action
      connector: power_bi
      input_parameters:
        - name: metric
          type: string
          description: >
            DAX measure name to trend (e.g., NetSalesAmount, GrossMarginPct,
            SellThroughRatePct, UnitsOnHand).
          required: true
        - name: filters
          type: object
          description: Slicer context (StoreId, RegionCode, CategoryCode, BrandName, Channel).
          required: false
        - name: analysis_window_days
          type: integer
          description: >
            Number of calendar days to include in the trend window. Values above 395
            route the query to Synapse rather than the semantic model.
          required: true
        - name: rolling_averages
          type: array
          items:
            type: integer
          description: >
            List of rolling-average window sizes in days to compute alongside daily values.
            Default windows are [7, 28, 364].
          required: false
          default: [7, 28, 364]
        - name: include_period_over_period
          type: boolean
          description: >
            When true, calculates WoW, MoM, and YoY growth rates for each date point.
          required: false
          default: true
        - name: include_seasonal_decomposition
          type: boolean
          description: >
            When true, decomposes the time series into trend, seasonal, and residual
            components using additive decomposition.
          required: false
          default: false
        - name: confidence_level
          type: decimal
          description: >
            Confidence level for calculated intervals. Defaults to the
            TrendAnalysisConfidenceLevel environment variable (default 0.95).
          required: false
      calculations:
        rolling_averages:
          description: >
            For each rolling window size, calculates the simple moving average of the
            metric over the preceding N days for every date in the result set.
            Dates with insufficient history are marked with a null rolling average value.
        period_over_period_growth:
          wow:
            description: >
              Week-over-week growth rate: (current_week_value - prior_week_value)
              / prior_week_value, expressed as a decimal.
          mom:
            description: >
              Month-over-month growth rate: (current_month_value - prior_month_value)
              / prior_month_value.
          yoy:
            description: >
              Year-over-year growth rate: (current_period_value - same_period_last_year_value)
              / same_period_last_year_value.
        seasonal_decomposition:
          method: additive
          season_length_days: 364
          description: >
            Splits the time series into three components: trend (long-run direction),
            seasonal (repeating cycle), and residual (unexplained variance). Returns all
            three component series alongside the original metric series.
        confidence_intervals:
          method: bootstrap
          iterations: 1000
          description: >
            Calculates upper and lower confidence bounds for each rolling average and
            period-over-period growth rate using bootstrap resampling.
      data_routing:
        short_window:
          max_days: 395
          source: power_bi_semantic_model
        long_window:
          min_days: 396
          source: synapse_workspace
          synapse_url_variable: "${SynapseWorkspaceUrl}"
      output_schema:
        type: object
        properties:
          metric:
            type: string
          analysis_window_days:
            type: integer
          data_as_of:
            type: string
            format: datetime
          series:
            type: array
            description: >
              One row per calendar day. Each row includes the raw metric value,
              each requested rolling average, WoW/MoM/YoY growth rates, seasonal
              component values (when requested), and confidence interval bounds.
          summary:
            type: object
            description: >
              Aggregate summary: overall trend direction, peak date, trough date,
              average WoW growth, average MoM growth, seasonality strength index.
      retry_policy:
        max_retries: 3
        initial_delay_seconds: 15
        backoff_multiplier: 2
        max_delay_seconds: 120

    - name: AnomalyDetection
      description: >
        Scheduled daily flow that runs statistical analysis on sales data across all active
        stores. Detects outliers where a store's metric value is 2 or more standard deviations
        from the regional mean (z-score threshold configurable via
        AnomalyDetectionStdDevThreshold). Writes alert records to the AnomalyAlerts Dataverse
        table. Categorizes anomalies as positive (overperformance) or negative
        (underperformance). Triggers SendAnomalyAlertNotification for critical and high
        severity anomalies.
      trigger: scheduled_recurrence
      schedule: daily
      schedule_time: "06:30 UTC"
      connector: power_bi
      metrics_evaluated:
        - name: NetSalesAmount
          description: Daily net sales amount per store.
        - name: GrossMarginPct
          description: Gross margin percentage per store.
        - name: SellThroughRatePct
          description: Sell-through rate percentage per store.
        - name: UnitsOnHand
          description: End-of-day units on hand per store.
        - name: WeeksCoverValue
          description: Weeks of cover per store.
      detection_logic:
        step_1_aggregate:
          description: >
            Query the Power BI semantic model for the current day's metric values
            grouped by StoreId and RegionCode for all active stores.
        step_2_compute_regional_statistics:
          description: >
            For each RegionCode and metric combination, calculate the mean and standard
            deviation across all stores in that region using the current day's values.
        step_3_z_score:
          description: >
            Compute z-score for each store-metric pair:
            z_score = (store_value - regional_mean) / regional_std_dev.
            Stores where regional_std_dev equals zero are skipped (no variance in region).
        step_4_flag_anomalies:
          description: >
            Flag a store-metric combination as an anomaly when abs(z_score) >=
            AnomalyDetectionStdDevThreshold. Classify as positive when z_score is above
            the positive threshold, negative when below the negative threshold.
        step_5_severity_band:
          description: >
            Assign severity based on abs(z_score):
            2.0 to 2.5 = low, 2.5 to 3.0 = medium, 3.0 to 4.0 = high, 4.0+ = critical.
        step_6_write_alerts:
          description: >
            For each detected anomaly, upsert an AnomalyAlerts record with StoreId,
            RegionCode, MetricName, MetricValue, RegionalMean, RegionalStdDev, ZScore,
            AnomalyType, Severity, DetectionPeriod, Status=new, and CorrelationId.
          target_table: AnomalyAlerts
          upsert_key_composite: [StoreId, MetricName, DetectionPeriod]
        step_7_notify:
          description: >
            For anomalies with Severity equal to high or critical, call
            SendAnomalyAlertNotification to post a summary to the analytics Teams channel.
          severity_threshold: [high, critical]
      output:
        anomalies_written: integer
        stores_evaluated: integer
        metrics_evaluated: integer
        run_date: string
      retry_policy:
        max_retries: 3
        initial_delay_seconds: 30
        backoff_multiplier: 2
        max_delay_seconds: 240
      error_logging:
        table: PipelineHealth
        pipeline_name: AnomalyDetection
        on_failure: write_failure_record
        on_success: write_success_record

    - name: WhatIfScenario
      description: >
        Accepts parameter variations for price change percentage, promotional discount
        percentage, and stock increase percentage. Calculates projected impact on revenue
        and gross margin using historical price and promotion elasticity data drawn from
        the configured ElasticityDataLookbackDays period. Returns a scenario comparison
        table showing baseline, scenario, and delta values for key KPIs.
      trigger: copilot_studio_topic_action
      connector: power_bi
      input_parameters:
        - name: scope
          type: object
          description: >
            Scope of the scenario: StoreId and/or CategoryCode and/or BrandName.
            At least one scope dimension is required.
          required: true
        - name: base_period
          type: string
          description: >
            Reference period for baseline metrics. Accepted values: LastWeek, LastMonth,
            LastQuarter, Last52Weeks. Default is LastMonth.
          required: false
          default: LastMonth
        - name: price_change_pct
          type: decimal
          description: >
            Percentage change applied to the average selling price.
            Positive values represent a price increase; negative a decrease.
            Example: 5.0 means a 5% price increase. Null means no price change.
          required: false
        - name: promo_discount_pct
          type: decimal
          description: >
            Promotional discount percentage applied on top of the current selling price.
            Example: 20.0 means a 20% off promotion. Null means no promotional change.
          required: false
        - name: stock_increase_pct
          type: decimal
          description: >
            Percentage increase in available stock units relative to the current inventory
            position. Example: 15.0 means 15% more units available. Null means no change.
          required: false
      calculations:
        elasticity_lookup:
          description: >
            Queries the Power BI semantic model for historical price elasticity and
            promotion response data over the ElasticityDataLookbackDays window for the
            requested scope. Elasticity is calculated as:
            price_elasticity = % change in units_sold / % change in price.
            Promotion lift is the average incremental units sold during historical promotions.
          lookback_variable: "${ElasticityDataLookbackDays}"
        baseline_metrics:
          description: >
            Retrieves current baseline values for the scope and base_period:
            NetSalesAmount, GrossMarginAmount, GrossMarginPct, UnitsSold, AverageSellPrice.
        projected_units:
          description: >
            Applies price elasticity to estimate unit volume change from price_change_pct.
            Applies promotion lift factor to estimate additional units from promo_discount_pct.
            Applies direct stock availability multiplier from stock_increase_pct (capped at
            historical demand ceiling).
        projected_revenue:
          description: >
            Calculates projected net sales as: projected_units * adjusted_sell_price,
            where adjusted_sell_price accounts for both price_change_pct and promo_discount_pct.
        projected_margin:
          description: >
            Calculates projected gross margin using the standard cost from ProductCatalog
            and the adjusted sell price. Returns both absolute margin and margin percentage.
      output_schema:
        type: object
        properties:
          scope_description:
            type: string
          base_period:
            type: string
          parameters_applied:
            type: object
            description: Echo of the input parameter values used in this scenario.
          scenario_comparison:
            type: array
            description: >
              One row per KPI. Each row contains the KPI name, baseline value,
              projected value, absolute delta, and percentage delta.
            items:
              type: object
              properties:
                kpi:
                  type: string
                baseline:
                  type: decimal
                projected:
                  type: decimal
                delta_absolute:
                  type: decimal
                delta_pct:
                  type: decimal
          elasticity_inputs:
            type: object
            description: >
              Shows the price elasticity and promotion lift coefficients used so the agent
              can communicate model assumptions transparently.
          confidence_note:
            type: string
            description: >
              Qualitative confidence note based on the historical data depth available
              for elasticity calculation (e.g., "Based on 12 months of data" or
              "Limited history; treat projections as indicative only").
      retry_policy:
        max_retries: 3
        initial_delay_seconds: 10
        backoff_multiplier: 2
        max_delay_seconds: 80

    - name: SendAnomalyAlertNotification
      description: >
        Sends anomaly summaries and impacted KPI details to analytics stakeholders in
        the analytics Teams channel. Called by the AnomalyDetection flow for anomalies
        with high or critical severity. Posts an adaptive card summarizing the store,
        metric, z-score, anomaly type, and a direct link to the AnomalyAlerts record in
        Dataverse for acknowledgement.
      trigger: flow_called_from_anomaly_detection
      connector: microsoft_teams
      alert_channel_variable: "${AnalyticsTeamsChannelId}"
      card_content:
        - StoreId
        - StoreName
        - RegionCode
        - MetricName
        - MetricValue
        - RegionalMean
        - ZScore
        - AnomalyType
        - Severity
        - DetectionPeriod
        - link_to_anomaly_alert_record

    - name: CrossDomainCorrelation
      description: >
        Correlates retail sales data with external signals to identify statistically
        significant drivers for root cause analysis. Ingests weather data
        (temperature, precipitation), local events calendar data (concerts, sports,
        holidays), and social media sentiment (brand mentions, trending topics) for
        the requested scope and period. Calculates Pearson correlation coefficients
        between each external signal and the selected sales metric. Returns only
        correlations where the p-value is below the CorrelationSignificanceLevel
        threshold, ranked by absolute correlation strength.
      trigger: copilot_studio_topic_action
      connector: power_bi
      input_parameters:
        - name: metric
          type: string
          description: >
            Sales metric to correlate against external signals (e.g., NetSalesAmount,
            UnitsSold, FootTraffic).
          required: true
        - name: filters
          type: object
          description: >
            Slicer context: StoreId, RegionCode, CategoryCode. At least StoreId or
            RegionCode is required to scope the geographic signals.
          required: true
        - name: analysis_window_days
          type: integer
          description: >
            Number of days to include in the correlation window. Minimum 28 days for
            statistical validity. Maximum 365 days.
          required: true
          minimum: 28
          maximum: 365
        - name: signals
          type: array
          items:
            type: string
            enum: [weather, local_events, social_media_sentiment]
          description: >
            List of external signal categories to include. All three are included by
            default when not specified.
          required: false
          default: [weather, local_events, social_media_sentiment]
      external_data_ingestion:
        weather:
          connector: WeatherConnector
          api_base_url_variable: "${WeatherApiBaseUrl}"
          api_key_variable: "${WeatherApiKey}"
          data_points:
            - name: max_temperature_c
              description: Daily maximum temperature in Celsius at the nearest weather station.
            - name: min_temperature_c
              description: Daily minimum temperature in Celsius.
            - name: precipitation_mm
              description: Total daily precipitation in millimetres.
            - name: weather_event_flag
              description: >
                Binary flag set to 1 when an extreme weather event (storm, heatwave,
                heavy snow) was recorded for the day.
          granularity: daily
          geographic_matching: nearest_station_to_store_postcode
        local_events:
          connector: EventsCalendarConnector
          api_base_url_variable: "${EventsCalendarApiBaseUrl}"
          api_key_variable: "${EventsCalendarApiKey}"
          data_points:
            - name: event_count
              description: Number of publicly listed events within 5 km of the store on that day.
            - name: event_category
              description: >
                Dominant event category: concert, sports, festival, public_holiday, market,
                other.
            - name: estimated_attendance
              description: Sum of estimated attendance figures for all events near the store.
            - name: public_holiday_flag
              description: Binary flag set to 1 when the date is a public holiday in the store's country.
          granularity: daily
          geographic_radius_km: 5
        social_media_sentiment:
          connector: SocialMediaConnector
          api_base_url_variable: "${SocialMediaApiBaseUrl}"
          api_key_variable: "${SocialMediaApiKey}"
          data_points:
            - name: brand_mention_count
              description: Total brand mentions in the analysis window day.
            - name: sentiment_score
              description: >
                Aggregate sentiment score for brand mentions on the day, ranging from
                -1.0 (fully negative) to 1.0 (fully positive).
            - name: trending_topic_flag
              description: >
                Binary flag set to 1 when a brand or product hashtag is trending in the
                store's geographic market on that day.
          granularity: daily
          geographic_scoping: store_market_region
      correlation_analysis:
        method: pearson
        description: >
          Calculates Pearson correlation coefficients between the daily sales metric series
          and each external signal series over the analysis window. Filters to only return
          pairs where the two-tailed p-value is below the CorrelationSignificanceLevel
          threshold. Results are ranked by absolute correlation coefficient descending.
        significance_level_variable: "${CorrelationSignificanceLevel}"
        lag_analysis:
          enabled: true
          max_lag_days: 7
          description: >
            In addition to same-day correlation, tests lagged correlations (signal on day
            D correlated with sales on day D+1 through D+7) to detect leading indicators.
      output_schema:
        type: object
        properties:
          metric:
            type: string
          analysis_window_days:
            type: integer
          analysis_period:
            type: object
            properties:
              start_date:
                type: string
                format: date
              end_date:
                type: string
                format: date
          significant_correlations:
            type: array
            description: >
              Each entry represents a statistically significant correlation. Empty when
              no signals meet the significance threshold.
            items:
              type: object
              properties:
                signal_category:
                  type: string
                  description: "weather, local_events, or social_media_sentiment."
                signal_name:
                  type: string
                correlation_coefficient:
                  type: decimal
                  description: Pearson r value ranging from -1.0 to 1.0.
                p_value:
                  type: decimal
                lag_days:
                  type: integer
                  description: 0 for same-day correlation; positive integer for lagged.
                interpretation:
                  type: string
                  description: >
                    Short plain-text interpretation generated by the flow
                    (e.g., "Strong positive same-day correlation with event attendance").
          non_significant_signals:
            type: array
            description: Signals tested but not meeting the significance threshold (for transparency).
          data_coverage_pct:
            type: decimal
            description: Percentage of days in the window for which all three signal categories had data.
      retry_policy:
        max_retries: 3
        initial_delay_seconds: 15
        backoff_multiplier: 2
        max_delay_seconds: 120
      error_handling:
        partial_signal_failure: >
          If one or two signal categories fail to retrieve data, the flow proceeds with
          the available signals and includes a data_coverage_warning in the output.
        full_failure: return_empty_correlations_with_error_message

    - name: PosDataSync
      description: >
        Daily batch sync of POS sales transactions, basket line items, and tender mix
        into Dataverse. Uses incremental load with change tracking via a last-sync
        watermark timestamp. Processes approximately 500K to 1M transactions per day
        across all stores. Writes a PipelineHealth row for each run. Applies
        exponential backoff with up to 3 retries on transient failures.
      trigger: scheduled_recurrence
      schedule: daily
      schedule_time: "02:00 UTC"
      connector: custom_pos_connector
      sync_strategy:
        method: incremental
        watermark_field: TransactionTimestamp
        watermark_variable: PosSyncLastSuccessfulTimestamp
        upsert_key: SalesTransactionId
      targets:
        - table: SalesTransactions
          upsert_key: SalesTransactionId
        - table: BasketDetails
          upsert_key: BasketDetailId
        - table: TenderMix
          upsert_key: TenderMixId
      data_quality_checks:
        - check: null_detection
          columns: [SalesTransactionId, StoreId, ProductId, TransactionDate, UnitsSold, NetSalesAmount]
        - check: range_validation
          rules:
            - column: UnitsSold
              min: 0
            - column: NetSalesAmount
              min: 0
            - column: GrossMarginAmount
              min: -999999
        - check: referential_integrity
          rules:
            - from: SalesTransactions.StoreId
              to: StoreMaster.StoreId
            - from: SalesTransactions.ProductId
              to: ProductCatalog.ProductId
      retry_policy:
        max_retries: 3
        initial_delay_seconds: 30
        backoff_multiplier: 2
        max_delay_seconds: 240
      error_logging:
        table: PipelineHealth
        on_failure: write_failure_record
        on_success: write_success_record
      estimated_volume: "500K to 1M transactions per day"

    - name: ErpDataSync
      description: >
        Daily delta sync of ERP product catalog updates, cost price changes, and
        purchase order lines into Dataverse. Uses modified-date delta strategy to
        load only changed records. Processes approximately 10K product updates and
        5K PO lines per day. Writes a PipelineHealth row for each run. Applies
        exponential backoff with up to 3 retries on transient failures.
      trigger: scheduled_recurrence
      schedule: daily
      schedule_time: "03:00 UTC"
      connector: custom_erp_connector
      sync_strategy:
        method: delta
        watermark_field: ModifiedDate
        watermark_variable: ErpSyncLastSuccessfulTimestamp
        upsert_key: ProductId
      targets:
        - table: ProductCatalog
          upsert_key: ProductId
          delta_field: ModifiedDate
        - table: PurchaseOrders
          upsert_key: PurchaseOrderId
          delta_field: ModifiedDate
      data_quality_checks:
        - check: null_detection
          columns: [ProductId, SKU, Brand, Category, StandardCost]
        - check: range_validation
          rules:
            - column: StandardCost
              min: 0
        - check: referential_integrity
          rules:
            - from: PurchaseOrders.ProductId
              to: ProductCatalog.ProductId
            - from: PurchaseOrders.StoreId
              to: StoreMaster.StoreId
        - check: uniqueness
          columns: [ProductCatalog.ProductId]
      retry_policy:
        max_retries: 3
        initial_delay_seconds: 30
        backoff_multiplier: 2
        max_delay_seconds: 240
      error_logging:
        table: PipelineHealth
        on_failure: write_failure_record
        on_success: write_success_record
      estimated_volume: "10K product updates, 5K PO lines per day"

    - name: AllocationDataSync
      description: >
        Hourly sync of inventory data from the allocation system into Dataverse.
        Performs a full snapshot upsert for InventorySnapshots and an incremental
        load for StockMovements and TransferOrders. Processes approximately 200K
        inventory records per snapshot. Writes a PipelineHealth row for each run.
        Applies exponential backoff with up to 3 retries on transient failures.
      trigger: scheduled_recurrence
      schedule: hourly
      connector: custom_allocation_connector
      sync_strategy:
        inventory_snapshots:
          method: full_snapshot
          upsert_key: SnapshotId
          composite_key: [SnapshotDate, StoreId, ProductId]
        stock_movements:
          method: incremental
          watermark_field: PostedTimestamp
          watermark_variable: AllocationSyncLastSuccessfulTimestamp
          upsert_key: StockMovementId
        transfer_orders:
          method: incremental
          watermark_field: ModifiedTimestamp
          upsert_key: TransferOrderId
      targets:
        - table: InventorySnapshots
          upsert_key: SnapshotId
        - table: StockMovements
          upsert_key: StockMovementId
        - table: TransferOrders
          upsert_key: TransferOrderId
      data_quality_checks:
        - check: null_detection
          columns: [SnapshotId, SnapshotDate, StoreId, ProductId, UnitsOnHand]
        - check: range_validation
          rules:
            - column: UnitsOnHand
              min: 0
            - column: InventoryCost
              min: 0
            - column: WeeksCover
              min: 0
              max: 52
        - check: referential_integrity
          rules:
            - from: InventorySnapshots.StoreId
              to: StoreMaster.StoreId
            - from: InventorySnapshots.ProductId
              to: ProductCatalog.ProductId
            - from: StockMovements.StoreId
              to: StoreMaster.StoreId
            - from: StockMovements.ProductId
              to: ProductCatalog.ProductId
        - check: uniqueness
          composite_key: [SnapshotDate, StoreId, ProductId]
          table: InventorySnapshots
      retry_policy:
        max_retries: 3
        initial_delay_seconds: 30
        backoff_multiplier: 2
        max_delay_seconds: 240
      error_logging:
        table: PipelineHealth
        on_failure: write_failure_record
        on_success: write_success_record
      estimated_volume: "200K inventory records per snapshot"

    - name: KpiCacheRefresh
      description: >
        Scheduled refresh that queries pre-calculated KPIs and aggregated metrics
        from the Power BI semantic model and writes them into the Dataverse KpiCache
        table. Runs every 4 hours to keep common agent queries fast without
        triggering real-time DAX execution. Covers store scorecards, category
        performance, and regional summaries. Writes a PipelineHealth row for each run.
      trigger: scheduled_recurrence
      schedule: every_4_hours
      connector: power_bi
      targets:
        - table: KpiCache
          grain_types:
            - StoreScorecard
            - CategoryPerformance
            - RegionalSummary
      kpi_queries:
        - grain: StoreScorecard
          measures: [SellThroughRatePct, GmroiValue, WeeksCoverValue, StockTurnValue, NetSalesAmount, GrossMarginPct, OpenToBuyValue]
          dimensions: [StoreId]
          periods: [CurrentWeek, CurrentMonth, QuarterToDate]
        - grain: CategoryPerformance
          measures: [SellThroughRatePct, GmroiValue, WeeksCoverValue, NetSalesAmount, GrossMarginPct]
          dimensions: [CategoryCode]
          periods: [CurrentWeek, CurrentMonth]
        - grain: RegionalSummary
          measures: [NetSalesAmount, GrossMarginPct, SellThroughRatePct, UnitsOnHand]
          dimensions: [RegionCode]
          periods: [CurrentWeek, CurrentMonth, QuarterToDate]
      retry_policy:
        max_retries: 3
        initial_delay_seconds: 60
        backoff_multiplier: 2
        max_delay_seconds: 480
      error_logging:
        table: PipelineHealth
        on_failure: write_failure_record
        on_success: write_success_record

    - name: DataQualityValidation
      description: >
        Standalone validation flow executed after each sync pipeline completes.
        Runs null detection, range validation, uniqueness, and referential integrity
        checks across all sync target tables. Writes check results to PipelineHealth.
        If critical rules fail, posts an alert to the pipeline alert Teams channel
        and halts any pending downstream processing.
      trigger: flow_called_from_sync_pipeline
      connector: dataverse
      validation_rules:
        null_checks:
          - table: SalesTransactions
            required_columns: [SalesTransactionId, StoreId, ProductId, TransactionDate]
          - table: ProductCatalog
            required_columns: [ProductId, SKU, Brand, Category, StandardCost]
          - table: InventorySnapshots
            required_columns: [SnapshotId, SnapshotDate, StoreId, ProductId, UnitsOnHand]
          - table: PurchaseOrders
            required_columns: [PurchaseOrderId, ProductId, OrderDate, OrderedQuantity, UnitCost]
        range_checks:
          - table: SalesTransactions
            column: UnitsSold
            min: 0
          - table: InventorySnapshots
            column: UnitsOnHand
            min: 0
          - table: InventorySnapshots
            column: WeeksCover
            min: 0
            max: 52
          - table: ProductCatalog
            column: StandardCost
            min: 0
        uniqueness_checks:
          - table: SalesTransactions
            key: SalesTransactionId
          - table: ProductCatalog
            key: ProductId
          - table: InventorySnapshots
            composite_key: [SnapshotDate, StoreId, ProductId]
          - table: PurchaseOrders
            key: PurchaseOrderId
        referential_integrity_checks:
          - from_table: SalesTransactions
            from_column: StoreId
            to_table: StoreMaster
            to_column: StoreId
          - from_table: SalesTransactions
            from_column: ProductId
            to_table: ProductCatalog
            to_column: ProductId
          - from_table: BasketDetails
            from_column: SalesTransactionId
            to_table: SalesTransactions
            to_column: SalesTransactionId
          - from_table: InventorySnapshots
            from_column: StoreId
            to_table: StoreMaster
            to_column: StoreId
          - from_table: InventorySnapshots
            from_column: ProductId
            to_table: ProductCatalog
            to_column: ProductId
        reconciliation_checks:
          - description: POS daily totals vs Power BI semantic model totals at day and store level
            method: sum_comparison
            tolerance_pct: 0.01

    - name: PipelineHealthAlert
      description: >
        Monitors the PipelineHealth table and posts failure alerts to the pipeline
        alert Teams channel. Triggered when a sync pipeline writes a Failed or
        PartialFailure status. Provides pipeline name, error details, retry count,
        and last successful run timestamp so operations teams can respond quickly.
        Also surfaces results to the agent via the Pipeline Health Check topic.
      trigger: dataverse_row_created
      table: PipelineHealth
      filter: "RunStatus eq 'Failed' or RunStatus eq 'PartialFailure'"
      connector: microsoft_teams
      alert_content:
        - PipelineName
        - RunStatus
        - RunStartTimestamp
        - RecordsProcessed
        - RecordsFailed
        - ErrorCode
        - ErrorMessage
        - RetryAttempt
        - DataQualityFailureDetails

    - name: InvokeDemandForecastModel
      description: >
        Calls the AI Builder demand forecasting prediction model for a given SKU and store
        combination. Writes forecast results to the DemandForecasts Dataverse table and
        returns predicted units, confidence interval, and key drivers to the agent topic.
      trigger: copilot_studio_topic_action
      connector: ai_builder
      ai_builder_model_type: prediction
      model_id_variable: "${DemandForecastingModelId}"

    - name: InvokeCategoryClassificationModel
      description: >
        Calls the AI Builder text classification model to assign merchandising categories
        to submitted product IDs. Writes accepted classifications to ProductCatalog and
        queues low-confidence results for human review.
      trigger: copilot_studio_topic_action
      connector: ai_builder
      ai_builder_model_type: text_classification
      model_id_variable: "${CategoryClassificationModelId}"

    - name: InvokeSentimentAnalysisModel
      description: >
        Calls the AI Builder sentiment analysis model against aggregated customer feedback
        for the requested category, period, and source. Writes results to SentimentResults
        and triggers a Teams alert when negative sentiment exceeds the configured threshold.
      trigger: copilot_studio_topic_action
      connector: ai_builder
      ai_builder_model_type: sentiment_analysis
      model_id_variable: "${SentimentAnalysisModelId}"

    - name: InvokeDocumentProcessingModel
      description: >
        Calls the AI Builder document processing model on an uploaded file. Extracts
        structured fields and line items and writes results to DocumentExtractionResults
        for downstream review and approval.
      trigger: copilot_studio_topic_action
      connector: ai_builder
      ai_builder_model_type: document_processing
      model_id_variable: "${DocumentProcessingModelId}"

    - name: ScheduleModelRetraining
      description: >
        Orchestrates periodic retraining of all AI Builder models with fresh Dataverse data.
        Publishes the new model version after passing accuracy and precision thresholds.
        Logs version history and sends a status report to the analytics Teams channel.
      trigger: scheduled_recurrence
      schedule: "${ModelRetrainingSchedule}"
      connector: ai_builder
    - name: AlertRuleCreate
      description: >
        Creates a new alert rule record in the AlertRules Dataverse table.
        Validates metric name, operator, and threshold before writing.
        Called from the agent when a user defines a new alert via conversation.
      trigger: copilot_studio_topic_action
      connector: dataverse

    - name: AlertRuleUpdate
      description: >
        Updates threshold, operator, frequency, or active flag on an existing
        AlertRules record. Enforces owner-or-admin authorization check before write.
      trigger: copilot_studio_topic_action
      connector: dataverse

    - name: AlertRuleDelete
      description: >
        Soft-deletes an alert rule by setting IsActive to false.
        Enforces owner-or-admin authorization check.
      trigger: copilot_studio_topic_action
      connector: dataverse

    - name: AlertRuleList
      description: >
        Retrieves active alert rules scoped to the requesting user or all rules
        for admin users. Returns rule name, metric, threshold, scope, and status.
      trigger: copilot_studio_topic_action
      connector: dataverse

    - name: AlertHistoryQuery
      description: >
        Queries AlertHistory for triggered alerts filtered by status, date range,
        scope, or rule. Supports natural language requests such as
        "What alerts are firing right now?" or "Show resolved alerts this week."
      trigger: copilot_studio_topic_action
      connector: dataverse

    - name: AlertAcknowledge
      description: >
        Sets the status of an AlertHistory record to acknowledged and records
        the acknowledging user and timestamp.
      trigger: copilot_studio_topic_action
      connector: dataverse

    - name: AlertResolve
      description: >
        Sets the status of an AlertHistory record to resolved, records resolved
        timestamp, and persists optional resolution notes.
      trigger: copilot_studio_topic_action
      connector: dataverse

    - name: AlertRuleEvaluator
      description: >
        Evaluates all active AlertRules against the latest metric values from the
        semantic model and writes new AlertHistory records for any threshold breaches.
        Supports compound AND/OR rules.
      trigger: scheduled_recurrence
      schedule: hourly
      connector: dataverse

    - name: SavedAnalysisCreate
      description: >
        Persists the current analysis context (query parameters, result snapshot,
        generated insights) as a new SavedAnalyses record in Dataverse.
      trigger: copilot_studio_topic_action
      connector: dataverse

    - name: SavedAnalysisQuery
      description: >
        Retrieves saved analyses for the requesting user filtered by name, date,
        or analysis type. Supports recall requests such as
        "Show me the analysis I saved last Tuesday."
      trigger: copilot_studio_topic_action
      connector: dataverse

    - name: SavedAnalysisShare
      description: >
        Updates the SharedWith field and IsShared flag on a SavedAnalyses record
        to grant read access to specified users or Entra groups.
      trigger: copilot_studio_topic_action
      connector: dataverse

    - name: SavedAnalysisDelete
      description: >
        Deletes a SavedAnalyses record. Enforces owner-or-admin authorization.
      trigger: copilot_studio_topic_action
      connector: dataverse

    - name: ScheduledReportCreate
      description: >
        Creates a new ScheduledReports record and provisions a corresponding
        Power Automate recurrence flow to execute and deliver the report on schedule.
      trigger: copilot_studio_topic_action
      connector: dataverse

    - name: ScheduledReportList
      description: >
        Lists scheduled reports for the requesting user, including schedule,
        recipients, output format, and next run time.
      trigger: copilot_studio_topic_action
      connector: dataverse

    - name: ScheduledReportUpdate
      description: >
        Modifies schedule, recipients, or output format for an existing scheduled
        report and updates the backing Power Automate recurrence flow accordingly.
      trigger: copilot_studio_topic_action
      connector: dataverse

    - name: ScheduledReportCancel
      description: >
        Deactivates a ScheduledReports record and disables the backing
        Power Automate recurrence flow.
      trigger: copilot_studio_topic_action
      connector: dataverse

    - name: ScheduledReportDelivery
      description: >
        Executes the query definition for a scheduled report, formats output
        per the specified format (Teams/email/PDF), and delivers to recipients.
        Triggered by each report's individual recurrence flow.
      trigger: flow_called_from_scheduled_report
      connector: microsoft_teams

connections:
  - connector: power_bi
    display_name: Power BI
  - connector: dataverse
    display_name: Dataverse
  - connector: microsoft_teams
    display_name: Microsoft Teams
  - connector: ai_builder
    display_name: AI Builder
  - connector: custom_pos_connector
    display_name: POS Connector
  - connector: custom_erp_connector
    display_name: ERP Connector
  - connector: custom_allocation_connector
    display_name: Allocation Connector
  - connector: dataverse
    display_name: Microsoft Dataverse
  - connector: custom_weather_connector
    display_name: Weather Connector
  - connector: custom_events_calendar_connector
    display_name: Events Calendar Connector
  - connector: custom_social_media_connector
    display_name: Social Media Connector

custom_connectors:
  - name: PosConnector
    source: openapi
    base_url: "${PosApiBaseUrl}"
    auth: oauth2
    operations:
      - name: GetTransactions
        description: Retrieves sales transactions changed after a given timestamp.
        parameters:
          - name: since_timestamp
            type: string
            format: datetime
          - name: page_size
            type: integer
            default: 1000
          - name: page_token
            type: string
      - name: GetBasketDetails
        description: Retrieves basket line items for a set of transaction IDs.
      - name: GetTenderMix
        description: Retrieves tender payment details for a set of transaction IDs.
      - name: GetHealthStatus
        description: Probe endpoint for connector health check.
        path: /health
  - name: ErpConnector
    source: openapi
    base_url: "${ErpApiBaseUrl}"
    auth: oauth2
    operations:
      - name: GetProductUpdates
        description: Retrieves product catalog records modified after a given timestamp.
        parameters:
          - name: modified_since
            type: string
            format: datetime
          - name: page_size
            type: integer
            default: 500
      - name: GetPurchaseOrders
        description: Retrieves purchase order lines modified after a given timestamp.
        parameters:
          - name: modified_since
            type: string
            format: datetime
          - name: page_size
            type: integer
            default: 500
      - name: GetHealthStatus
        description: Probe endpoint for connector health check.
        path: /health
  - name: AllocationConnector
    source: openapi
    base_url: "${AllocationApiBaseUrl}"
    auth: oauth2
    operations:
      - name: GetInventorySnapshot
        description: Retrieves the current full inventory snapshot for all stores and products.
        parameters:
          - name: snapshot_date
            type: string
            format: date
      - name: GetStockMovements
        description: Retrieves stock movements posted after a given timestamp.
        parameters:
          - name: since_timestamp
            type: string
            format: datetime
          - name: page_size
            type: integer
            default: 1000
      - name: GetTransferOrders
        description: Retrieves transfer orders modified after a given timestamp.
        parameters:
          - name: modified_since
            type: string
            format: datetime
      - name: GetHealthStatus
        description: Probe endpoint for connector health check.
        path: /health

  - name: WeatherConnector
    source: openapi
    base_url: "${WeatherApiBaseUrl}"
    auth: api_key
    api_key_header: X-Api-Key
    api_key_variable: "${WeatherApiKey}"
    operations:
      - name: GetDailyWeather
        description: Retrieves daily weather observations for a given location and date range.
        parameters:
          - name: latitude
            type: decimal
          - name: longitude
            type: decimal
          - name: start_date
            type: string
            format: date
          - name: end_date
            type: string
            format: date
      - name: GetWeatherEvents
        description: Retrieves extreme weather event flags for a location and date range.
        parameters:
          - name: latitude
            type: decimal
          - name: longitude
            type: decimal
          - name: start_date
            type: string
            format: date
          - name: end_date
            type: string
            format: date
      - name: GetHealthStatus
        description: Probe endpoint for connector health check.
        path: /health

  - name: EventsCalendarConnector
    source: openapi
    base_url: "${EventsCalendarApiBaseUrl}"
    auth: api_key
    api_key_header: X-Api-Key
    api_key_variable: "${EventsCalendarApiKey}"
    operations:
      - name: GetEventsNearLocation
        description: >
          Retrieves publicly listed events within a specified radius of a location
          for a given date range.
        parameters:
          - name: latitude
            type: decimal
          - name: longitude
            type: decimal
          - name: radius_km
            type: integer
            default: 5
          - name: start_date
            type: string
            format: date
          - name: end_date
            type: string
            format: date
      - name: GetPublicHolidays
        description: Retrieves public holidays for a given country and year.
        parameters:
          - name: country_code
            type: string
          - name: year
            type: integer
      - name: GetHealthStatus
        description: Probe endpoint for connector health check.
        path: /health

  - name: SocialMediaConnector
    source: openapi
    base_url: "${SocialMediaApiBaseUrl}"
    auth: api_key
    api_key_header: X-Api-Key
    api_key_variable: "${SocialMediaApiKey}"
    operations:
      - name: GetBrandMentions
        description: >
          Retrieves daily brand mention counts and aggregate sentiment scores for
          one or more brand terms over a date range.
        parameters:
          - name: brand_terms
            type: array
            items: string
          - name: geographic_market
            type: string
          - name: start_date
            type: string
            format: date
          - name: end_date
            type: string
            format: date
      - name: GetTrendingTopics
        description: >
          Returns daily trending topic flags for brand or product hashtags in
          a given geographic market over a date range.
        parameters:
          - name: hashtags
            type: array
            items: string
          - name: geographic_market
            type: string
          - name: start_date
            type: string
            format: date
          - name: end_date
            type: string
            format: date
      - name: GetHealthStatus
        description: Probe endpoint for connector health check.
        path: /health

data_platform_extensions:
  synapse_link:
    enabled: true
    tables:
      - SalesTransactions
      - BasketDetails
      - TenderMix
      - InventorySnapshots
      - StockMovements
      - PurchaseOrders
      - ProductCatalog
      - StoreMaster
    purpose: Historical and high-volume analytical workloads (2+ years of transactions)
      - DemandForecasts
      - SentimentResults
      - DocumentExtractionResults
      - CustomerFeedback
    purpose: Historical and high-volume analytical workloads
    export_mode: incremental
    storage_account_url: "${DataLakeStorageAccountUrl}"
    synapse_workspace_url: "${SynapseWorkspaceUrl}"

pipeline_monitoring:
  health_table: PipelineHealth
  alert_channel: "${PipelineAlertTeamsChannelId}"
  pipelines:
    - name: PosDataSync
      expected_schedule: daily
      sla_completion_by: "06:00 UTC"
      alert_on_failure: true
      alert_on_sla_breach: true
    - name: ErpDataSync
      expected_schedule: daily
      sla_completion_by: "07:00 UTC"
      alert_on_failure: true
      alert_on_sla_breach: true
    - name: AllocationDataSync
      expected_schedule: hourly
      sla_latency_minutes: 30
      alert_on_failure: true
      alert_on_sla_breach: true
    - name: KpiCacheRefresh
      expected_schedule: every_4_hours
      sla_latency_minutes: 45
      alert_on_failure: true
      alert_on_sla_breach: true
    - name: AnomalyDetection
      expected_schedule: daily
      sla_completion_by: "08:00 UTC"
      alert_on_failure: true
      alert_on_sla_breach: true

ai_builder_models:
  - name: DemandForecastingModel
    display_name: Demand Forecasting
    type: prediction
    model_id_variable: "${DemandForecastingModelId}"
    description: >
      Predicts next-period demand by SKU and store combination. Trained on 2+ years of
      historical sales data incorporating seasonality, promotions, and trend signals.
    training_data:
      dataverse_table: SalesTransactions
      feature_columns:
        - ProductId
        - StoreId
        - TransactionDate
        - UnitsSold
        - Channel
      label_column: UnitsSold
      minimum_training_rows: 10000
    performance_targets:
      mean_absolute_percentage_error_max: 0.15
      r_squared_min: 0.75
    retraining:
      schedule: "${ModelRetrainingSchedule}"
      minimum_new_rows_to_trigger: 5000
      ab_testing_enabled: true
      ab_test_traffic_pct: 10

  - name: CategoryClassificationModel
    display_name: Category Classification
    type: text_classification
    model_id_variable: "${CategoryClassificationModelId}"
    description: >
      Classifies new products into merchandising categories based on product name,
      description, material, and target demographic attributes.
    training_data:
      dataverse_table: ProductCatalog
      feature_columns:
        - SKU
        - Brand
        - SubCategory
        - Season
      label_column: Category
      filter: "LifecycleStatus eq 'Active'"
      minimum_training_rows: 500
    performance_targets:
      accuracy_min: 0.85
      precision_min: 0.80
      recall_min: 0.80
    retraining:
      schedule: "${ModelRetrainingSchedule}"
      minimum_new_rows_to_trigger: 100
      ab_testing_enabled: false

  - name: SentimentAnalysisModel
    display_name: Sentiment Analysis
    type: sentiment_analysis
    model_id_variable: "${SentimentAnalysisModelId}"
    description: >
      Analyzes customer feedback from surveys, reviews, and social media.
      Returns positive, neutral, and negative sentiment scores and key themes
      aggregated by product category and brand.
    training_data:
      source: CustomerFeedback
      feature_columns:
        - FeedbackText
        - FeedbackSource
        - Category
        - Brand
      label_column: SentimentLabel
      minimum_training_rows: 2000
    performance_targets:
      accuracy_min: 0.80
      f1_score_min: 0.78
    retraining:
      schedule: "${ModelRetrainingSchedule}"
      minimum_new_rows_to_trigger: 500
      ab_testing_enabled: false

  - name: DocumentProcessingModel
    display_name: Document Processing
    type: document_processing
    model_id_variable: "${DocumentProcessingModelId}"
    description: >
      Extracts structured fields and line items from supplier invoices, delivery notes,
      and competitor price sheets using AI Builder form processing capabilities.
    document_types:
      - label: supplier invoice
        fields:
          - SupplierName
          - DocumentDate
          - InvoiceNumber
          - LineItems
          - TotalAmount
          - CurrencyCode
      - label: delivery note
        fields:
          - SupplierName
          - DeliveryDate
          - PurchaseOrderNumber
          - ReceivedQuantities
          - Discrepancies
      - label: competitor price sheet
        fields:
          - CompetitorName
          - EffectiveDate
          - ProductMatches
          - PriceComparisons
    performance_targets:
      field_extraction_accuracy_min: 0.90
    retraining:
      schedule: "${ModelRetrainingSchedule}"
      minimum_new_documents_to_trigger: 50
      ab_testing_enabled: false

channels:
  - type: microsoft_teams
    enabled: true
    require_admin_approval: false
