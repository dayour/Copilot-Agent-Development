# Copilot Studio Solution Definition — Power Analysis (Clothing)
# This file defines the exportable solution components for the Power Analysis agent.
# Import this into your Copilot Studio / Power Platform environment.

solution:
  name: ClothingPowerAnalysis
  display_name: "Clothing — Power Analysis"
  version: "2.3.0"
  publisher: Copilot Agent Development
  description: >
    Deep reasoning analytics solution for the Power Analysis agent in the
    Clothing vertical. Provides decomposition analysis, trend detection,
    anomaly identification, what-if simulation, and recommendation generation
    backed by Dataverse and Power BI semantic models. Version 2.0 adds AI Builder
    models for demand forecasting, category classification, sentiment analysis,
    and document processing.

environment_variables:
  - name: PowerBiWorkspaceId
    display_name: Power BI Workspace ID
    type: string
    description: GUID of the Power BI workspace containing the retail semantic model.
    default_value: ""

  - name: PowerBiDatasetId
    display_name: Power BI Dataset ID
    type: string
    description: GUID of the primary retail semantic model (dataset) in Power BI.
    default_value: ""

  - name: SalesDashboardReportId
    display_name: Sales Dashboard Report ID
    type: string
    description: GUID of the sales performance Power BI report.
    default_value: ""

  - name: InventoryReportId
    display_name: Inventory Report ID
    type: string
    description: GUID of the inventory analysis Power BI report.
    default_value: ""

  - name: PosApiBaseUrl
    display_name: POS API Base URL
    type: string
    description: Base URL for POS transaction synchronization endpoint.
    default_value: ""

  - name: ErpApiBaseUrl
    display_name: ERP API Base URL
    type: string
    description: Base URL for ERP product and inventory cost synchronization endpoint.
    default_value: ""

  - name: AllocationApiBaseUrl
    display_name: Allocation API Base URL
    type: string
    description: Base URL for inventory snapshot and allocation updates.
    default_value: ""

  - name: SynapseWorkspaceUrl
    display_name: Synapse Workspace URL
    type: string
    description: Azure Synapse Analytics workspace URL for Dataverse Synapse Link historical workloads.
    default_value: ""

  - name: DataLakeStorageAccountUrl
    display_name: Data Lake Storage Account URL
    type: string
    description: ADLS Gen2 storage account URL for Synapse Link export target.
    default_value: ""

  - name: PipelineAlertTeamsChannelId
    display_name: Pipeline Alert Teams Channel ID
    type: string
    description: Microsoft Teams channel ID for pipeline failure and health alerts.
    default_value: ""

  - name: KpiCacheRefreshIntervalHours
    display_name: KPI Cache Refresh Interval (Hours)
    type: integer
    description: How frequently (in hours) the KPI cache refresh flow runs. Default is 4.
    default_value: "4"

  - name: PosSyncLastTimestampVariableName
    display_name: POS Sync Last Timestamp Variable Name
    type: string
    description: Name of the environment variable used to persist the last successful POS sync timestamp for incremental change tracking.
    default_value: "PosSyncLastSuccessfulTimestamp"

  - name: ErpSyncLastTimestampVariableName
    display_name: ERP Sync Last Timestamp Variable Name
    type: string
    description: Name of the environment variable used to persist the last successful ERP sync timestamp for delta sync.
    default_value: "ErpSyncLastSuccessfulTimestamp"

  - name: AllocationSyncLastTimestampVariableName
    display_name: Allocation Sync Last Timestamp Variable Name
    type: string
    description: Name of the environment variable used to persist the last successful allocation sync timestamp for incremental movement loads.
    default_value: "AllocationSyncLastSuccessfulTimestamp"

  - name: PosSyncMaxRetries
    display_name: POS Sync Max Retries
    type: integer
    description: Maximum number of retry attempts for POS sync before marking the pipeline run as failed.
    default_value: "3"

  - name: ErpSyncMaxRetries
    display_name: ERP Sync Max Retries
    type: integer
    description: Maximum number of retry attempts for ERP sync before marking the pipeline run as failed.
    default_value: "3"

  - name: AllocationSyncMaxRetries
    display_name: Allocation Sync Max Retries
    type: integer
    description: Maximum number of retry attempts for Allocation sync before marking the pipeline run as failed.
    default_value: "3"

  - name: AnalyticsTeamsChannelId
    display_name: Analytics Teams Channel ID
    type: string
    description: Microsoft Teams channel ID for automated KPI alert notifications.
    default_value: ""

  - name: ScheduledReportsTeamsChannelId
    display_name: Scheduled Reports Teams Channel ID
    type: string
    description: Microsoft Teams channel ID for delivery of scheduled report outputs.
    default_value: ""

  - name: ReportDefaultRecipients
    display_name: Report Default Recipients
    type: string
    description: Comma-separated list of default email recipients for scheduled reports.
    default_value: ""

  - name: BiGlossaryLibraryUrl
    display_name: BI Glossary SharePoint URL
    type: string
    description: SharePoint document library URL containing KPI definitions and BI glossary.
    default_value: ""

  - name: AIBuilderEnvironmentId
    display_name: AI Builder Environment ID
    type: string
    description: GUID of the Power Platform environment where AI Builder models are registered.
    default_value: ""

  - name: DemandForecastingModelId
    display_name: Demand Forecasting Model ID
    type: string
    description: AI Builder model ID for the demand forecasting prediction model.
    default_value: ""

  - name: CategoryClassificationModelId
    display_name: Category Classification Model ID
    type: string
    description: AI Builder model ID for the product category text classification model.
    default_value: ""

  - name: SentimentAnalysisModelId
    display_name: Sentiment Analysis Model ID
    type: string
    description: AI Builder model ID for the customer feedback sentiment analysis model.
    default_value: ""

  - name: DocumentProcessingModelId
    display_name: Document Processing Model ID
    type: string
    description: AI Builder model ID for the document processing (form recognition) model.
    default_value: ""

  - name: SentimentAlertThreshold
    display_name: Sentiment Alert Threshold
    type: decimal
    description: >
      Negative sentiment percentage threshold that triggers a Teams alert.
      Default is 0.4 (40% negative feedback within the selected period).
    default_value: "0.4"

  - name: ModelRetrainingSchedule
    display_name: Model Retraining Schedule
    type: string
    description: >
      Schedule for periodic AI Builder model retraining. Accepts plain-text values
      (e.g., "monthly", "weekly") or a cron expression (e.g., "0 0 1 * *" for the
      first day of each calendar month at midnight).
    default_value: "monthly"

  - name: WeatherApiBaseUrl
    display_name: Weather API Base URL
    type: string
    description: Base URL for the weather data API used by the CrossDomainCorrelation flow.
    default_value: ""

  - name: WeatherApiKey
    display_name: Weather API Key
    type: string
    description: API key for authenticating requests to the weather data service.
    default_value: ""

  - name: EventsCalendarApiBaseUrl
    display_name: Events Calendar API Base URL
    type: string
    description: Base URL for the local events calendar API used by the CrossDomainCorrelation flow.
    default_value: ""

  - name: EventsCalendarApiKey
    display_name: Events Calendar API Key
    type: string
    description: API key for the local events calendar service.
    default_value: ""

  - name: SocialMediaApiBaseUrl
    display_name: Social Media API Base URL
    type: string
    description: Base URL for the social media sentiment API used by the CrossDomainCorrelation flow.
    default_value: ""

  - name: SocialMediaApiKey
    display_name: Social Media API Key
    type: string
    description: API key for the social media data service.
    default_value: ""

  - name: AnomalyDetectionStdDevThreshold
    display_name: Anomaly Detection Standard Deviation Threshold
    type: decimal
    description: >
      Number of standard deviations from the regional mean required to classify a store as an
      outlier in the AnomalyDetection flow. Default is 2.0 (flags stores 2+ std devs from mean).
    default_value: "2.0"

  - name: CorrelationSignificanceLevel
    display_name: Correlation Significance Level
    type: decimal
    description: >
      p-value threshold below which a correlation is classified as statistically significant
      in the CrossDomainCorrelation flow. Default is 0.05.
    default_value: "0.05"

  - name: ElasticityDataLookbackDays
    display_name: Elasticity Data Lookback Days
    type: integer
    description: >
      Number of days of historical sales data used to calculate price and promotion elasticity
      in the WhatIfScenario flow. Default is 365.
    default_value: "365"

  - name: TrendAnalysisConfidenceLevel
    display_name: Trend Analysis Confidence Level
    type: decimal
    description: >
      Confidence level used when calculating confidence intervals in the TrendAnalysis flow.
      Expressed as a decimal between 0 and 1. Default is 0.95 (95% confidence intervals).
    default_value: "0.95"

components:
  dataverse_tables:
    - name: SalesTransactions
      display_name: Sales Transactions
      description: Transaction-level sales facts ingested from POS.
      primary_key: SalesTransactionId
      columns:
        - name: SalesTransactionId
          type: string
        - name: TransactionDate
          type: datetime
        - name: StoreId
          type: lookup
          references: StoreMaster
        - name: ProductId
          type: lookup
          references: ProductCatalog
        - name: Channel
          type: string
        - name: UnitsSold
          type: decimal
        - name: NetSalesAmount
          type: currency
        - name: GrossMarginAmount
          type: currency

    - name: ProductCatalog
      display_name: Product Catalog
      description: Product and assortment dimensions from ERP.
      primary_key: ProductId
      columns:
        - name: ProductId
          type: string
        - name: SKU
          type: string
        - name: Brand
          type: string
        - name: Category
          type: string
        - name: SubCategory
          type: string
        - name: Season
          type: string
        - name: LifecycleStatus
          type: string
        - name: StandardCost
          type: currency

    - name: StoreMaster
      display_name: Store Master
      description: Store hierarchy and segmentation data.
      primary_key: StoreId
      columns:
        - name: StoreId
          type: string
        - name: StoreName
          type: string
        - name: Region
          type: string
        - name: Country
          type: string
        - name: Format
          type: string
        - name: Cluster
          type: string
        - name: OpeningDate
          type: date

    - name: InventorySnapshots
      display_name: Inventory Snapshots
      description: Daily and intraday inventory positions from allocation systems.
      primary_key: SnapshotId
      columns:
        - name: SnapshotId
          type: string
        - name: SnapshotDate
          type: datetime
        - name: StoreId
          type: lookup
          references: StoreMaster
        - name: ProductId
          type: lookup
          references: ProductCatalog
        - name: UnitsOnHand
          type: decimal
        - name: UnitsReceived
          type: decimal
        - name: InventoryCost
          type: currency
        - name: AvgWeeklySales
          type: decimal
        - name: WeeksCover
          type: calculated
          formula: "UnitsOnHand / AvgWeeklySales"
        - name: ReorderPoint
          type: decimal

    - name: BasketDetails
      display_name: Basket Details
      description: Line-item basket contents per POS transaction, ingested in the daily POS batch sync.
      primary_key: BasketDetailId
      columns:
        - name: BasketDetailId
          type: string
        - name: SalesTransactionId
          type: lookup
          references: SalesTransactions
        - name: ProductId
          type: lookup
          references: ProductCatalog
        - name: LineNumber
          type: integer
        - name: Quantity
          type: decimal
        - name: UnitPrice
          type: currency
        - name: LineNetAmount
          type: currency
        - name: LineDiscountAmount
          type: currency
        - name: LineGrossMarginAmount
          type: currency
        - name: PromotionCode
          type: string

    - name: TenderMix
      display_name: Tender Mix
      description: Payment method breakdown per POS transaction, ingested in the daily POS batch sync.
      primary_key: TenderMixId
      columns:
        - name: TenderMixId
          type: string
        - name: SalesTransactionId
          type: lookup
          references: SalesTransactions
        - name: TenderType
          type: string
          description: "Payment method: Cash, Card, Digital Wallet, Gift Card, Loyalty Points."
        - name: TenderAmount
          type: currency
        - name: TenderCurrency
          type: string
        - name: TenderSequence
          type: integer

    - name: PurchaseOrders
      display_name: Purchase Orders
      description: ERP purchase order headers and lines synced daily for open-to-buy and cost tracking.
      primary_key: PurchaseOrderId
      columns:
        - name: PurchaseOrderId
          type: string
        - name: ProductId
          type: lookup
          references: ProductCatalog
        - name: StoreId
          type: lookup
          references: StoreMaster
        - name: OrderDate
          type: date
        - name: ExpectedDeliveryDate
          type: date
        - name: OrderedQuantity
          type: decimal
        - name: ReceivedQuantity
          type: decimal
        - name: OutstandingQuantity
          type: calculated
          formula: "OrderedQuantity - ReceivedQuantity"
        - name: UnitCost
          type: currency
        - name: TotalOrderValue
          type: currency
        - name: POStatus
          type: string
          description: "Status: Open, Partially Received, Closed, Cancelled."
        - name: SupplierCode
          type: string
        - name: ModifiedDate
          type: datetime
          description: Source ERP last-modified timestamp used for delta sync.

    - name: StockMovements
      display_name: Stock Movements
      description: Incremental inventory movement records from the allocation system, synced hourly.
      primary_key: StockMovementId
      columns:
        - name: StockMovementId
          type: string
        - name: MovementDate
    - name: DemandForecasts
      display_name: Demand Forecasts
      description: >
        AI Builder demand forecasting model outputs stored per SKU, store,
        and forecast horizon. Used for replenishment planning and trend validation.
      primary_key: ForecastId
      columns:
        - name: ForecastId
          type: string
        - name: ForecastDate
          type: datetime
        - name: StoreId
          type: lookup
          references: StoreMaster
        - name: ProductId
          type: lookup
          references: ProductCatalog
        - name: MovementType
          type: string
          description: "Type: Sale, Return, Transfer In, Transfer Out, Adjustment, Write-Off."
        - name: QuantityChange
          type: decimal
          description: Positive for inbound movements; negative for outbound.
        - name: ReferenceId
          type: string
          description: Source system reference (TransactionId, TransferOrderId, or AdjustmentId).
        - name: PostedTimestamp
          type: datetime
          description: UTC timestamp when the movement was posted in the source system.

    - name: TransferOrders
      display_name: Transfer Orders
      description: Inter-store and DC-to-store transfer orders from the allocation system, synced hourly.
      primary_key: TransferOrderId
      columns:
        - name: TransferOrderId
          type: string
        - name: ProductId
          type: lookup
          references: ProductCatalog
        - name: FromStoreId
          type: lookup
          references: StoreMaster
        - name: ToStoreId
          type: lookup
          references: StoreMaster
        - name: RequestedDate
          type: date
        - name: ExpectedArrivalDate
          type: date
        - name: TransferQuantity
          type: decimal
        - name: TransferStatus
          type: string
          description: "Status: Requested, Approved, In Transit, Received, Cancelled."
        - name: ModifiedTimestamp
          type: datetime
          description: UTC timestamp for incremental change tracking.

    - name: KpiCache
      display_name: KPI Cache
      description: >
        Pre-calculated KPIs and aggregated metrics refreshed from Power BI every 4 hours.
        Used to serve common agent queries without real-time DAX execution.
      primary_key: KpiCacheId
      columns:
        - name: KpiCacheId
          type: string
        - name: CacheTimestamp
          type: datetime
          description: UTC timestamp when this cache row was generated.
        - name: GrainType
          type: string
          description: "Aggregation grain: StoreScorecard, CategoryPerformance, RegionalSummary."
        - name: DimensionKey
          type: string
          description: "Dimension identifier (StoreId, CategoryCode, RegionCode, or 'ALL')."
        - name: PeriodKey
          type: string
          description: "Period identifier in format YYYY-Www (week) or YYYY-MM (month)."
        - name: SellThroughRatePct
          type: decimal
        - name: GmroiValue
          type: decimal
        - name: WeeksCoverValue
          type: decimal
        - name: StockTurnValue
          type: decimal
        - name: NetSalesAmount
          type: currency
        - name: GrossMarginAmount
          type: currency
        - name: GrossMarginPct
          type: decimal
        - name: UnitsOnHand
          type: decimal
        - name: OpenToBuyValue
          type: currency

    - name: PipelineHealth
      display_name: Pipeline Health
      description: >
        Tracks every pipeline run outcome. Agents query this table to report on
        data feed health and surface pipeline failures to operations teams.
      primary_key: PipelineHealthId
      columns:
        - name: PipelineHealthId
          type: string
        - name: PipelineName
          type: string
          description: "Name of the pipeline: PosDataSync, ErpDataSync, AllocationDataSync, KpiCacheRefresh."
        - name: RunStartTimestamp
          type: datetime
        - name: RunEndTimestamp
          type: datetime
        - name: RunStatus
          type: string
          description: "Status: Running, Succeeded, Failed, PartialFailure, Skipped."
        - name: RecordsProcessed
          type: integer
        - name: RecordsFailed
          type: integer
        - name: ErrorCode
          type: string
        - name: ErrorMessage
          type: string
        - name: RetryAttempt
          type: integer
          description: "0 for the initial attempt; increments by 1 for each retry."
        - name: DataQualityChecksPassed
          type: boolean
        - name: DataQualityFailureDetails
          type: string
          description: JSON summary of any failed data quality checks.
        - name: SourceSystemTimestamp
          type: datetime
          description: Watermark timestamp from the source system used for this run.
        - name: CorrelationId
          type: string
          description: Power Automate flow run correlation ID for end-to-end trace.
        - name: ForecastHorizon
          type: string
        - name: PredictedUnits
          type: decimal
        - name: ConfidenceLow
          type: decimal
        - name: ConfidenceHigh
          type: decimal
        - name: SeasonalityIndex
          type: decimal
        - name: PromotionImpact
          type: decimal
        - name: KeyDrivers
          type: string
        - name: ModelVersion
          type: string

    - name: SentimentResults
      display_name: Sentiment Analysis Results
      description: >
        AI Builder sentiment analysis outputs aggregated by product category,
        brand, feedback source, and analysis period.
      primary_key: SentimentResultId
      columns:
        - name: SentimentResultId
          type: string
        - name: AnalysisDate
          type: datetime
        - name: Category
          type: string
        - name: Brand
          type: string
        - name: FeedbackSource
          type: string
        - name: PeriodLabel
          type: string
        - name: OverallScore
          type: decimal
        - name: PositivePct
          type: decimal
        - name: NeutralPct
          type: decimal
        - name: NegativePct
          type: decimal
        - name: TopPositiveThemes
          type: string
        - name: TopNegativeThemes
          type: string
        - name: AlertTriggered
          type: boolean
        - name: ModelVersion
          type: string

    - name: DocumentExtractionResults
      display_name: Document Extraction Results
      description: >
        Structured data extracted by the AI Builder document processing model from
        uploaded supplier invoices, delivery notes, and competitor price sheets.
      primary_key: ExtractionId
      columns:
        - name: ExtractionId
          type: string
        - name: ExtractionDate
          type: datetime
        - name: DocumentType
          type: string
        - name: SupplierName
          type: string
        - name: DocumentDate
          type: date
        - name: LineItemCount
          type: integer
        - name: TotalValue
          type: currency
        - name: DiscrepancyCount
          type: integer
        - name: ExtractedPayload
          type: string
        - name: ReviewStatus
          type: string
        - name: ModelVersion
          type: string

    - name: CustomerFeedback
      display_name: Customer Feedback
      description: >
        Raw customer feedback records from surveys, reviews, and social media ingested
        for sentiment analysis model training and inference.
      primary_key: FeedbackId
      columns:
        - name: FeedbackId
          type: string
        - name: FeedbackDate
          type: datetime
        - name: FeedbackText
          type: string
        - name: FeedbackSource
          type: string
        - name: Category
          type: string
        - name: Brand
          type: string
        - name: SentimentLabel
          type: string

    - name: AnomalyAlerts
      display_name: Anomaly Alerts
      description: >
        Stores anomaly alert records written by the AnomalyDetection flow when a store's
        metric value deviates 2 or more standard deviations from the regional mean.
        Categorizes anomalies as positive (overperformance) or negative (underperformance).
      primary_key: AnomalyAlertId
      columns:
        - name: AnomalyAlertId
          type: string
        - name: DetectedAt
          type: datetime
          description: UTC timestamp when the anomaly was detected.
        - name: StoreId
          type: lookup
          references: StoreMaster
        - name: RegionCode
          type: string
          description: Region to which the store belongs, used for regional mean calculation.
        - name: MetricName
          type: string
          description: Name of the KPI metric that triggered the anomaly (e.g., NetSalesAmount, GrossMarginPct).
        - name: MetricValue
          type: decimal
          description: Observed metric value for the store in the detection period.
        - name: RegionalMean
          type: decimal
          description: Mean metric value across all stores in the same region and period.
        - name: RegionalStdDev
          type: decimal
          description: Standard deviation of the metric across stores in the same region and period.
        - name: ZScore
          type: decimal
          description: Number of standard deviations the store's metric value is from the regional mean.
        - name: AnomalyType
          type: choice
          options: [positive, negative]
          description: "positive = overperformance (z-score above threshold); negative = underperformance (z-score below negative threshold)."
        - name: Severity
          type: choice
          options: [low, medium, high, critical]
          description: "Severity band based on absolute z-score: 2.0-2.5 = low, 2.5-3.0 = medium, 3.0-4.0 = high, 4.0+ = critical."
        - name: DetectionPeriod
          type: string
          description: "Date or period label for which the anomaly was detected (e.g., 2026-03-02)."
        - name: Status
          type: choice
          options: [new, acknowledged, resolved]
          default: new
        - name: AcknowledgedBy
          type: string
        - name: AcknowledgedAt
          type: datetime
        - name: ResolvedAt
          type: datetime
        - name: ResolutionNotes
          type: string
        - name: CorrelationId
          type: string
          description: Flow run correlation ID linking this alert to the AnomalyDetection flow run.

    - name: AlertRules
      display_name: Alert Rules
      description: >
        Configurable alert threshold definitions that the agent evaluates to detect
        metric breaches across stores, regions, and categories.
      primary_key: AlertRuleId
      columns:
        - name: AlertRuleId
          type: string
        - name: RuleName
          type: string
        - name: Metric
          type: string
        - name: Operator
          type: choice
          options: [less_than, greater_than, less_than_or_equal, greater_than_or_equal, equals]
        - name: Threshold
          type: decimal
        - name: ThresholdUnit
          type: string
        - name: Scope
          type: choice
          options: [store, region, category, enterprise]
        - name: ScopeValue
          type: string
        - name: CompoundLogic
          type: choice
          options: [none, AND, OR]
          default: none
        - name: SecondaryMetric
          type: string
        - name: SecondaryOperator
          type: choice
          options: [less_than, greater_than, less_than_or_equal, greater_than_or_equal, equals]
        - name: SecondaryThreshold
          type: decimal
        - name: EvaluationFrequency
          type: choice
          options: [real_time, hourly, daily, weekly]
          default: daily
        - name: Owner
          type: string
        - name: OwnerEntraId
          type: string
        - name: IsActive
          type: boolean
          default: true
        - name: CreatedOn
          type: datetime
        - name: ModifiedOn
          type: datetime

    - name: AlertHistory
      display_name: Alert History
      description: >
        Log of all triggered alert events with lifecycle status tracking from
        new through acknowledged to resolved.
      primary_key: AlertHistoryId
      columns:
        - name: AlertHistoryId
          type: string
        - name: AlertRuleId
          type: lookup
          references: AlertRules
        - name: TriggeredAt
          type: datetime
        - name: MetricValue
          type: decimal
        - name: ThresholdValue
          type: decimal
        - name: Scope
          type: string
        - name: ScopeValue
          type: string
        - name: Status
          type: choice
          options: [new, acknowledged, resolved]
          default: new
        - name: AcknowledgedBy
          type: string
        - name: AcknowledgedAt
          type: datetime
        - name: ResolvedAt
          type: datetime
        - name: ResolutionNotes
          type: string

    - name: SavedAnalyses
      display_name: Saved Analyses
      description: >
        Persisted analysis snapshots including query parameters, result data,
        generated insights, and sharing metadata.
      primary_key: SavedAnalysisId
      columns:
        - name: SavedAnalysisId
          type: string
        - name: AnalysisName
          type: string
        - name: QueryParameters
          type: string
        - name: ResultSnapshot
          type: string
        - name: GeneratedInsights
          type: string
        - name: AnalysisType
          type: choice
          options: [sales_performance, root_cause, inventory, trend, what_if, anomaly]
        - name: SavedAt
          type: datetime
        - name: Owner
          type: string
        - name: OwnerEntraId
          type: string
        - name: SharedWith
          type: string
        - name: IsShared
          type: boolean
          default: false

    - name: ScheduledReports
      display_name: Scheduled Reports
      description: >
        Definitions for scheduled report delivery, including cron schedule, query
        parameters, recipients, and output format. Each active record corresponds
        to a live Power Automate recurrence flow.
      primary_key: ScheduledReportId
      columns:
        - name: ScheduledReportId
          type: string
        - name: ReportName
          type: string
        - name: CronSchedule
          type: string
        - name: HumanReadableSchedule
          type: string
        - name: QueryDefinition
          type: string
        - name: Recipients
          type: string
        - name: OutputFormat
          type: choice
          options: [teams, email, pdf]
          default: email
        - name: FlowRunId
          type: string
        - name: Owner
          type: string
        - name: OwnerEntraId
          type: string
        - name: IsActive
          type: boolean
          default: true
        - name: CreatedOn
          type: datetime
        - name: LastRunAt
          type: datetime
        - name: NextRunAt
          type: datetime

  relationships:
