# Copilot Studio Solution Definition — Virtual Coach (Clothing)
# This file defines the exportable solution components for the Virtual Coach agent.
# Import this into your Copilot Studio / Power Platform environment.

solution:
  name: ClothingVirtualCoach
  display_name: "Clothing — Virtual Coach"
  version: "1.0.0"
  publisher: Copilot Agent Development
  description: >
    Showcase solution for the Virtual Coach agent in the Clothing vertical.
    Includes the agent definition, topics, knowledge source bindings,
    environment variable declarations, and Power Automate flow references.

environment_variables:
  - name: ManagerTeamsChannelId
    display_name: Manager Teams Channel ID
    type: string
    description: Microsoft Teams channel ID for manager escalation notifications.
    default_value: ""

  - name: ProductCatalogueLibraryUrl
    display_name: Product Catalogue SharePoint URL
    type: string
    description: SharePoint document library URL containing product knowledge and care guides.
    default_value: ""

  - name: StylingGuideLibraryUrl
    display_name: Styling Guide SharePoint URL
    type: string
    description: SharePoint document library URL containing styling tips and lookbooks.
    default_value: ""

  - name: StorePolicyLibraryUrl
    display_name: Store Policy SharePoint URL
    type: string
    description: SharePoint document library URL containing store and HR policies.
    default_value: ""

  - name: VisualMerchandisingLibraryUrl
    display_name: Visual Merchandising SharePoint URL
    type: string
    description: SharePoint document library URL containing planograms and display standards.
    default_value: ""

  - name: DailyBriefingLibraryUrl
    display_name: Daily Briefing SharePoint URL
    type: string
    description: SharePoint document library URL containing daily shift briefings and targets.
    default_value: ""

components:
  agents:
    - name: VirtualCoach
      template_file: ../templates/agent-template.yaml
      knowledge_sources:
        - id: product-catalogue-library
          type: sharepoint
          url: "${ProductCatalogueLibraryUrl}"
        - id: styling-guide-library
          type: sharepoint
          url: "${StylingGuideLibraryUrl}"
        - id: store-policy-library
          type: sharepoint
          url: "${StorePolicyLibraryUrl}"
        - id: visual-merchandising-library
          type: sharepoint
          url: "${VisualMerchandisingLibraryUrl}"
        - id: daily-briefing-library
          type: sharepoint
          url: "${DailyBriefingLibraryUrl}"
      authentication:
        type: azure_ad
        tenant_restriction: true

  power_automate_flows:
    - name: SendManagerTeamsNotification
      description: Posts an escalation notification to the manager Teams channel.
      trigger: copilot_studio_topic_action
      connector: microsoft_teams

connections:
  - connector: microsoft_teams
    display_name: Microsoft Teams

channels:
  - type: microsoft_teams
    enabled: true
    require_admin_approval: false
